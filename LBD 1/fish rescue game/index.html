function _spawnSplashAtFish(fish) {
  const fishRect = fish.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  const cx = (fishRect.left - gameRect.left) + fishRect.width * 0.42;
  const cy = (fishRect.top  - gameRect.top)  + fishRect.height * 0.70;
  const xPct = (cx / gameRect.width)  * 100;
  const yPct = (cy / gameRect.height) * 100;
  _spawnSplashAt(xPct, yPct);
}

function _currentFishLeftPct(fish) {
  const fishRect = fish.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  return ((fishRect.left - gameRect.left) / gameRect.width) * 100;
}

/* Per-color tint for the wrong-stream water burst. Painted as the
   inner radial-gradient stop via the --wrong-burst-color CSS var so
   the burst reads as a colored splash matching the offending fish. */
const WRONG_BURST_COLOR = {
  green:  'rgba(80,220,120,.9)',
  red:    'rgba(255,100,90,.9)',
  yellow: 'rgba(255,220,70,.9)',
  pink:   'rgba(255,120,210,.9)'
};

/* Water burst spawned behind the fish on a wrong-stream hit. Reads as
   a colored push of water that knocks the fish back. Cleans itself up. */
function createWrongWaterBurst(xPct, yPct, color) {
  const burst = document.createElement('div');
  burst.className = 'wrong-water-burst';
  burst.style.left = xPct + '%';
  burst.style.top  = yPct + '%';
  burst.style.setProperty(
    '--wrong-burst-color',
    WRONG_BURST_COLOR[color] || 'rgba(145,220,255,.9)'
  );
  if (color) burst.dataset.color = color;
  game.appendChild(burst);
  setTimeout(() => burst.remove(), 950);
}

/* Quick burst of small bubbles around a stage-% point. Used together
   with the wrong-water-burst to read as splashing water around the
   recoiling fish. Bubbles drift up + outward and fade. */
function spawnWrongBubblesAt(xPct, yPct, count = 8) {
  for (let i = 0; i < count; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 0.6 + Math.random() * 1.0;
    const dx = (Math.random() - 0.5) * 8;
    const dy = (Math.random() - 0.5) * 6;
    b.style.width  = size + '%';
    b.style.height = size + '%';
    b.style.left   = (xPct + dx) + '%';
    b.style.top    = (yPct + dy) + '%';
    b.style.zIndex = '14';
    const dur = 0.9 + Math.random() * 0.5;
    b.style.animationDuration = dur.toFixed(2) + 's';
    b.style.animationDelay    = (-Math.random() * 0.2).toFixed(2) + 's';
    b.style.animationIterationCount = '1';
    const r = (range) => (Math.random() * range - range / 2).toFixed(1) + 'px';
    b.style.setProperty('--sway-a', r(12));
    b.style.setProperty('--sway-b', r(16));
    b.style.setProperty('--sway-c', r(14));
    b.style.setProperty('--sway-d', r(12));
    game.appendChild(b);
    setTimeout(() => b.remove(), dur * 1000 + 120);
  }
}

/* Freeze EVERY unresolved fish on the stage — both gameFish and
   activeWaveFish — at its current X. Journey timers + collision
   watchers are killed so background fish can't drift forward (or
   trigger a phantom pond arrival) while the wrong popup is up.
   Paired with resumeFishAfterWrongPopup() which restarts only the
   fish flagged here. */
function freezeAllMovingFishForWrong() {
  const seen = new Set();
  const all = [...gameFish, ...activeWaveFish];
  all.forEach(f => {
    if (!f || seen.has(f)) return;
    seen.add(f);
    if (!f.parentNode || f.dataset.resolved === '1') return;

    if (f.dataset.timer) {
      clearTimeout(parseInt(f.dataset.timer));
      f.dataset.timer = '';
    }
    _stopCollisionWatch(f);

    const x = _currentFishLeftPct(f);
    f.style.transition = 'none';
    f.style.left = x.toFixed(4) + '%';
    f.dataset.frozenForWrongPopup = '1';
  });
}

function resumeFishAfterWrongPopup() {
  const seen = new Set();
  const all = [...gameFish, ...activeWaveFish];
  all.forEach(f => {
    if (!f || seen.has(f)) return;
    seen.add(f);
    if (!f.parentNode || f.dataset.resolved === '1') return;
    if (f.dataset.frozenForWrongPopup !== '1') return;
    f.dataset.frozenForWrongPopup = '0';
    resumeFishJourneyFromCurrentX(f);
  });
}

/* Push back every unresolved fish in the current wave together so a
   multi-fish wave recoils as a group rather than one-by-one. The
   recoil itself does NOT restart journeys — that happens in
   resumeFishAfterWrongPopup() once the popup closes. Falls back to a
   single-fish push if the wave list is empty. */
async function pushBackWrongWave(triggerFish) {
  const wrongGroup = activeWaveFish.filter(f =>
    f &&
    f.parentNode &&
    f.dataset.resolved !== '1'
  );

  if (!wrongGroup.length) {
    await playWrongWavePush(triggerFish);
    return;
  }

  // Mark each member as in-flight so other handlers ignore it for
  // the duration of the recoil.
  wrongGroup.forEach(f => { f.dataset.handling = '1'; });

  await Promise.all(wrongGroup.map(f => playWrongWavePush(f)));

  wrongGroup.forEach(f => {
    f.classList.remove('wrong');
    f.dataset.handling = '0';
  });
}

async function playWrongWavePush(fish) {
  if (fish.dataset.timer) clearTimeout(parseInt(fish.dataset.timer));

  fish.dataset.animState = 'wrong';

  const gameRect = game.getBoundingClientRect();
  const fishRect = fish.getBoundingClientRect();
  const fishWidthPct = (fishRect.width / gameRect.width) * 100;
  const halfW = fishWidthPct / 2;

  const minX = 0.5 + halfW;
  const maxX = 99.5 - halfW;

  const currentLeft = _currentFishLeftPct(fish);
  const frozenLeft = Math.max(minX, Math.min(maxX, currentLeft));

  fish.style.transition = 'none';
  fish.style.left = `${frozenLeft.toFixed(4)}%`;
  fish.offsetWidth;

  // Spawn the gamified water burst BEHIND the fish (its leading edge
  // is on the left, water comes from there) and a flurry of bubbles
  // around the fish at the moment of impact.
  const burstCenterX = frozenLeft + halfW;            // fish center X
  const burstCenterY = ((fishRect.top - gameRect.top) / gameRect.height) * 100
                     + (fishRect.height / gameRect.height) * 50;
  createWrongWaterBurst(burstCenterX, burstCenterY, fish.dataset.color);
  spawnWrongBubblesAt(burstCenterX, burstCenterY, 10);

  // Combined recoil: vertical arc (jump ~50px) + wobble rotate ~10deg
  // while the fish is shoved back to its safe-right slot. The arc and
  // wobble are driven on `transform`; horizontal travel uses `left`
  // with an ease-out transition so the two layers can run together.
  const safeRight = parseFloat(fish.dataset.safeRightX || '88');
  const targetLeft = Math.max(minX, Math.min(maxX, safeRight));
  const pushDur = 650;
  const ARC_PX = 50;

  const wobble = fish.animate([
    { transform: 'translateY(0) rotate(0deg)' },
    { transform: `translateY(-${ARC_PX * 0.4}px) rotate(-8deg)`, offset: 0.25 },
    { transform: `translateY(-${ARC_PX}px) rotate(10deg)`,       offset: 0.55 },
    { transform: `translateY(-${ARC_PX * 0.35}px) rotate(-6deg)`, offset: 0.8 },
    { transform: 'translateY(0) rotate(0deg)' }
  ], { duration: pushDur, easing: 'cubic-bezier(0.2, 0.7, 0.3, 1)', fill: 'none' });

  fish.style.transition = `left ${pushDur}ms cubic-bezier(0.2, 0.7, 0.3, 1)`;
  fish.style.left = `${targetLeft.toFixed(4)}%`;
  await delay(pushDur + 20);
  try { wobble.cancel(); } catch {}

  fish.style.transition = 'none';
  fish.style.left = `${targetLeft.toFixed(4)}%`;
  fish.style.transform = '';
  fish.offsetWidth;
  fish.dataset.animState = 'idle';
  return targetLeft;
}

/* ---------- Idle hand-nudge during gameplay ----------
   While a fish is journeying in a lane that doesn't match its target
   color, watch for inaction. If the player stays idle for IDLE_MS we
   put the hand-icon on whichever direction button would move the fish
   one step closer to its correct lane, and we keep the target stream
   pulsing. Resolved or lane-matched fish never trigger the nudge. */
const IDLE_MS = 3000;
let idleNudgeTimer = null;
let idleNudgeFish = null;

function _correctDirectionButton(fish) {
  if (!fish) return null;
  const targetLane = laneIndexOfColor(fish.dataset.color);
  const currentLane = parseInt(fish.dataset.lane);
  if (Number.isNaN(currentLane) || currentLane === targetLane) return null;
  return targetLane < currentLane ? upBtn : downBtn;
}

function stopIdleNudge() {
  if (idleNudgeTimer) { clearTimeout(idleNudgeTimer); idleNudgeTimer = null; }
  idleNudgeFish = null;
  removeHand();
}

/* Shared nudge-arming function. Wipes any existing hand + timer, then
   starts a fresh IDLE_MS countdown that — if it fires while the fish
   is still in a wrong lane — drops the hand on the correct direction
   button and pulses the target stream/pond. Used by handleUserMove and
   by the wrong-answer handlers. */
function resetHandNudgeTimer(fish) {
  removeHand();
  if (idleNudgeTimer) { clearTimeout(idleNudgeTimer); idleNudgeTimer = null; }
  idleNudgeFish = null;

  if (!fish || fish.dataset.resolved === '1' || !fish.parentNode) return;
  // Don't arm if the fish is already on the correct lane.
  if (!_correctDirectionButton(fish)) return;

  idleNudgeFish = fish;
  idleNudgeTimer = setTimeout(() => {
    if (!gameOn && !game.classList.contains('tutorial')) return;
    if (!fish.parentNode || fish.dataset.resolved === '1') return;
    const btn = _correctDirectionButton(fish);
    if (!btn) return;
    setStreamTarget(fish.dataset.color);
    addHand(btn);
  }, IDLE_MS);
}

/* Back-compat alias — older call sites still arm by fish reference. */

function noteUserInteraction() {
  // Wipe the hand + timer; re-arming happens AFTER the jump lands via
  // handleUserMove so the hand never reappears mid-tap.
  removeHand();
  if (idleNudgeTimer) { clearTimeout(idleNudgeTimer); idleNudgeTimer = null; }
}

/* Find the lead (leftmost) fish in the active wave — the one currently
   in command of the direction buttons. Used by handleUserMove so the
   re-arm post-delay can check the correct fish's lane. */
function getLeadFish() {
  if (activeFish && gameFish.includes(activeFish) && activeFish.dataset.resolved !== '1') {
    return activeFish;
  }
  let lead = null, leadLeft = Infinity;
  activeWaveFish.forEach(f => {
    if (!gameFish.includes(f)) return;
    if (f.dataset.resolved === '1') return;
    const rect = f.getBoundingClientRect();
    if (rect.left < leadLeft) { leadLeft = rect.left; lead = f; }
  });
  return lead;
}

/* One entry point for every Up/Down button press in both tutorial and
   main game. Removes the hand immediately, clears any pending nudge
   timer, fires the actual move, and re-arms the 3-second idle watch
   AFTER the jump lands so the hand never loops while the player taps. */
let _postMoveTimer = null;
function handleUserMove(dir) {
  if (inputLocked) return;
  const fish = getLeadFish();

  removeHand();
  if (idleNudgeTimer) { clearTimeout(idleNudgeTimer); idleNudgeTimer = null; }
  if (_postMoveTimer) { clearTimeout(_postMoveTimer); _postMoveTimer = null; }

  if (game.classList.contains('tutorial')) {
    moveActiveFish(dir);
  } else {
    moveLeadFish(dir);
  }

  _postMoveTimer = setTimeout(() => {
    _postMoveTimer = null;
    if (!fish || !fish.parentNode || fish.dataset.resolved === '1') return;
    const targetLane = laneIndexOfColor(fish.dataset.color);
    const currentLane = parseInt(fish.dataset.lane);
    if (currentLane !== targetLane) {
      resetHandNudgeTimer(fish);
    }
  }, JUMP_DURATION_MS + 100);
}

function resumeFishJourneyFromCurrentX(fish) {
  // Duration is computed from remaining distance / constant speed
  // inside startFishJourney, so the resumed leg keeps the same
  // visible swim rate as the rest of the journey.
  startFishJourney(fish);
}

/* ---------- Bounding-box collision watch ----------
   Continuously checks the fish's leading edge against the pond at the
   end of its current lane. Triggers onFishReachedEnd the MOMENT they
   meet (fishRect.left <= pondRect.right) so success/wrong reacts at
   the contact point rather than after the fish drifts past the pond. */
const _collisionWatchers = new WeakMap();
function _stopCollisionWatch(fish) {
  const id = _collisionWatchers.get(fish);
  if (id) cancelAnimationFrame(id);
  _collisionWatchers.delete(fish);
}
function _dispatchFishArrival(fish) {
  if (game.classList.contains('tutorial')) {
    onTutorialFishReachedPond(fish);
  } else {
    onFishReachedEnd(fish);
  }
}
function startCollisionWatch(fish) {
  _stopCollisionWatch(fish);
  const tick = () => {
    if (!gameOn || !gameFish.includes(fish) || fish.dataset.resolved === '1') {
      _collisionWatchers.delete(fish);
      return;
    }
    // Don't poll during a lane-change jump — let it finish, then check.
    if (fish.dataset.jumping === '1') {
      _collisionWatchers.set(fish, requestAnimationFrame(tick));
      return;
    }
    const lane = parseInt(fish.dataset.lane);
    const laneColor = COLORS[lane];
    const pond = laneColor ? document.querySelector(`.pond[data-color="${laneColor}"]`) : null;
    if (!pond) {
      _collisionWatchers.set(fish, requestAnimationFrame(tick));
      return;
    }
    const fishRect = fish.getBoundingClientRect();
    const pondRect = pond.getBoundingClientRect();
    if (fishRect.left <= pondRect.right) {
      _collisionWatchers.delete(fish);
      _dispatchFishArrival(fish);
      return;
    }
    _collisionWatchers.set(fish, requestAnimationFrame(tick));
  };
  _collisionWatchers.set(fish, requestAnimationFrame(tick));
}

function _ensureWrongPanelBubbles() {
  // Wrong-panel bubble overlay removed — popup is now plain.
  const panel = wrongOverlay.querySelector('.wrong-panel');
  if (!panel) return;
  const host = panel.querySelector('.wrong-panel-bubbles');
  if (host) host.remove();
}

/* ---------- Final pond hop on success ----------
   Fish makes a smooth arc that ENDS exactly on the pond's mathematical
   centre (X and Y). The anchor uses pond center → fish center, so the
   fish never lands above/below/left/right of the bullseye. The hop has
   a tiny anticipation crouch on takeoff and a squash-stretch settle on
   landing. The colorful splash blooms at the landing point and the
   fish then fades out via .success-vanish in the caller. */
async function playPondArcJump(fish, laneColor) {
  const pond = document.querySelector(`.pond[data-color="${laneColor}"]`);
  if (!pond) return;

  const gameRect = game.getBoundingClientRect();
  const pondRect = pond.getBoundingClientRect();
  const fishRect = fish.getBoundingClientRect();

  // Pond centre in stage % — fish CENTRE will be aligned to this point.
  const pondCxPct = ((pondRect.left + pondRect.width  * 0.5 - gameRect.left) / gameRect.width)  * 100;
  const pondCyPct = ((pondRect.top  + pondRect.height * 0.5 - gameRect.top)  / gameRect.height) * 100;

  // Fish box dimensions in stage % — needed to convert centre-anchor
  // into the top-left (left/top) the style system uses.
  const fishWpct = (fishRect.width  / gameRect.width)  * 100;
  const fishHpct = (fishRect.height / gameRect.height) * 100;

  const startX = _currentFishLeftPct(fish);
  const startY = parseFloat(fish.style.top)
    || (laneCenterPercent(parseInt(fish.dataset.lane)) - DESIGN.fish.centerOffsetY);

  // End anchors so the fish CENTER == pond CENTER.
  const landingX = pondCxPct - fishWpct / 2;
  const landingY = pondCyPct - fishHpct / 2;

  const HOP_MS = 640;
  const HOP_ARC_PX = 130;

  fish.dataset.jumping = '1';
  fish.dataset.motionDone = '0';
  fish.classList.remove('float');
  _playJumpAnim(fish, HOP_MS + 220);
  fish.dataset.animState = 'success';

  // Tiny anticipation crouch BEFORE the leap — playful "ready, set..."
  // beat. Only translate/rotate/uniform-scale, so the fish silhouette
  // never distorts. Aspect ratio 860:600 is preserved at every frame.
  fish.style.transition = 'transform 130ms ease-out';
  fish.style.transform = 'translateY(2px) rotate(-4deg) scale(0.96)';
  await delay(130);

  // Spawn a small takeoff splash right under the fish so the leap has
  // a clear "push off the water" beat, matching the landing splash.
  _spawnTakeoffSplashUnderFish(fish, laneColor);

  const startTs = performance.now();

  await new Promise(resolve => {
    function frame(now) {
      const t = Math.min(1, (now - startTs) / HOP_MS);
      // Smooth ease-in-out toward the landing centre.
      const ease = t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;

      const x = startX + (landingX - startX) * ease;
      const y = startY + (landingY - startY) * ease;
      // Sin-curve vertical lift — clean visible arc on top of y travel.
      const arcPx = -Math.sin(t * Math.PI) * HOP_ARC_PX;
      const rotate = Math.sin(t * Math.PI) * -8;

      fish.style.transition = 'none';
      fish.style.left = x.toFixed(4) + '%';
      fish.style.top  = y.toFixed(4) + '%';
      fish.style.transform = `translateY(${arcPx}px) rotate(${rotate}deg)`;

      if (t < 1) requestAnimationFrame(frame);
      else resolve();
    }
    requestAnimationFrame(frame);
  });

  // Snap to exact bullseye and play a quick UNIFORM-scale bounce so the
  // landing reads as weighted and playful — but the fish shape itself
  // never stretches or skews. Only translate / rotate / uniform scale
  // are used here, so the 860:600 aspect ratio is preserved exactly.
  fish.style.transition = 'none';
  fish.style.left = landingX.toFixed(4) + '%';
  fish.style.top  = landingY.toFixed(4) + '%';
  fish.style.transform = 'translateY(0) rotate(0deg) scale(0.86)';

  // Splash + droplets + bubbles spawn AT the pond centre.
  spawnSuccessWaterRippleAtFish(fish, laneColor);

  // Pop → settle: a small uniform scale bounce. Never distorts the
  // sprite because both axes scale by the same factor every frame.
  await delay(110);
  fish.style.transition = 'transform 140ms ease-out';
  fish.style.transform = 'rotate(0deg) scale(1.10)';
  await delay(140);
  fish.style.transition = 'transform 160ms cubic-bezier(.5,1.8,.4,1)';
  fish.style.transform = 'rotate(0deg) scale(1)';
  await delay(160);
  fish.style.transition = '';

  fish.dataset.motionDone = '1';
  fish.dataset.jumping = '0';
}

/* Wrong-condition mini hint pill — disabled. The wrong-condition popup
   itself carries the message, so we no longer overlay an extra text
   label above the stage. Kept as a no-op so any stale call sites stay
   safe and never render the pill. */
let _miniHintEl = null;
let _miniHintTimer = null;

async function showWrongConditionPopup(fishColor) {
  wrongOverlay.classList.remove('hidden');
  wrongOverlay.classList.remove('fade-out');
  // "Oops! Not the correct stream." — narrate and type the line in lock-step.
  playTutorialVO('wrong');
  typeWrongPanelText('Oops!\nNot the correct stream.');
  const wrongArt = WRONG_FISH_IMG[fishColor] || WRONG_FISH_IMG.green;
  wrongPanelFish.style.backgroundImage = `url('${wrongArt}')`;
  _ensureWrongPanelBubbles();
  // 4-second hold so the player has time to read the popup. Backdrop
  // is dimmed to 50% black via .wrong-overlay's background; gameplay
  // continues underneath because the overlay is pointer-events:none.
  await delay(4000);
  wrongOverlay.classList.add('fade-out');
  await delay(260);
  wrongOverlay.classList.add('hidden');
  wrongOverlay.classList.remove('fade-out');
}

/* Real arc jump driven by requestAnimationFrame. Reads the fish's
   current left/top, interpolates toward (endX, endY) where endY is
   the lane-center top for the destination lane, and lifts the fish
   visually with a sin-curve translateY of jumpHeight pixels — so the
   motion reads as a clean visible hop, not a diagonal slide.
   Options:
     duration   — total jump duration in ms (default 480)
     forward    — % stage width to nudge fish leftward during jump (default 8)
     jumpHeight — pixel height of the arc lift (default 70). */
function animateJumpArc(fish, endLane, options = {}) {
  return new Promise(resolve => {
    const startX = parseFloat(fish.style.left);
    const startY = parseFloat(fish.style.top);
    const endX = Math.max(2, startX - (options.forward != null ? options.forward : 8));
    const endY = laneCenterPercent(endLane) - DESIGN.fish.centerOffsetY;
    const duration = options.duration || 480;
    const jumpHeight = options.jumpHeight || 95;

    const start = performance.now();

    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      // Smooth ease-in-out for a clean visible hop between lanes.
      const ease = t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;

      const x = startX + (endX - startX) * ease;
      const y = startY + (endY - startY) * ease;

      // Vertical arc + slight rotation. NO scale — fish width stays constant.
      const arcPx = -Math.sin(t * Math.PI) * jumpHeight;
      const rotate = Math.sin(t * Math.PI) * -12;

      fish.style.left = x + "%";
      fish.style.top = y + "%";
      fish.style.transform = `translateY(${arcPx}px) rotate(${rotate}deg)`;

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        fish.style.left = endX + "%";
        fish.style.top = endY + "%";
        fish.style.transform = "";
        resolve();
      }
    }

    requestAnimationFrame(frame);
  });
}

function positionFishInLane(fish, laneIndex, opts = {}) {
  if (fish.dataset.jumping === '1') return;

  const animate = opts.animate !== false;
  const prevLane = parseInt(fish.dataset.lane);
  const newTop = laneCenterPercent(laneIndex) - DESIGN.fish.centerOffsetY;

  if (animate && Number.isFinite(prevLane) && prevLane !== laneIndex && fish.dataset.resolved !== '1') {
    // Splash at takeoff while fish is still visually at the old lane
    _spawnSplashAtFish(fish);

    const oldTop = laneCenterPercent(prevLane) - DESIGN.fish.centerOffsetY;
    const currentLeftPct = _currentFishLeftPct(fish);

    // Snap to OLD visual position before kicking off the arc so the
    // animation interpolates left/top from old → new directly, not
    // from the in-flight transition value.
    fish.style.transition = 'none';
    fish.style.top  = oldTop + '%';
    fish.style.left = currentLeftPct.toFixed(4) + '%';
    fish.offsetWidth;

    fish.dataset.lane = laneIndex;
    fish.dataset.jumping = '1';
    fish.dataset.motionDone = '0';
    fish.classList.remove('float');

    // GIF swap + arc, started in lockstep so they read as one fluid
    // jump. The GIF restarts from frame 0 via cache-bust inside
    // setFishJumpGif().
    _playJumpAnim(fish, JUMP_DURATION_MS);

    animateJumpArc(fish, laneIndex, { duration: JUMP_DURATION_MS, forward: 8 }).then(() => {
      // Landing splash at the new lane center.
      _spawnSplashAtFish(fish);
      fish.dataset.motionDone = '1';
      // Restore idle (PNG) + float ONLY once both the GIF window AND
      // the arc have finished. Whichever finishes last performs the
      // actual restore — see _playJumpAnim for the matching guard.
      if (!_gifSwaps.has(fish)) {
        setFishIdle(fish);
        fish.classList.add('float');
        fish.dataset.jumping = '0';
      }

      // After the jump lands, restart the leftward journey from the
      // new position. Tutorial and main-game fish share the same swim
      // logic so motion speed stays consistent across modes.
      if (gameOn && fish.dataset.resolved !== '1') {
        if (gameFish.includes(fish) && fish.dataset.handling !== '1') {
          resumeFishJourneyFromCurrentX(fish);
        }
      }
    });
  } else {
    fish.style.top = newTop + '%';
    fish.dataset.lane = laneIndex;
  }
}


/* ===========================================================
   TUTORIAL AUTO-SWIM
   Each tutorial fish drifts gently leftward on its own so the
   screen feels alive, not static. The user changes lane with the
   buttons; when the fish touches a pond, success (matching lane)
   or wrong-recoil (mismatched lane) is triggered.
   =========================================================== */
const TUTORIAL_SWIM_STEP_PCT = 0.075;   // % stage width per frame
const TUTORIAL_PARK_X_PCT   = 8;       // hard floor — won't underflow

function stopFishAutoSwim(fish) {
  if (!fish) return;
  fish.dataset.autoSwim = '0';
}
function autoSwimLoop(fish) {
  if (!fish || !fish.parentNode) return;
  if (fish.dataset.autoSwim !== '1') return;
  if (fish.dataset.resolved === '1') return;

  // Wait for any in-flight jump (lane change) or wrong-recoil.
  if (fish.dataset.jumping === '1' || fish.dataset.animState === 'wrong') {
    requestAnimationFrame(() => autoSwimLoop(fish));
    return;
  }

  const currentX = parseFloat(fish.style.left) || 88;
  const nextX = Math.max(TUTORIAL_PARK_X_PCT, currentX - TUTORIAL_SWIM_STEP_PCT);
  fish.style.left = nextX + '%';

  _checkTutorialPondTouch(fish);

  requestAnimationFrame(() => autoSwimLoop(fish));
}

function _checkTutorialPondTouch(fish) {
  if (fish.dataset.jumping === '1') return;
  if (fish.dataset.resolved === '1') return;
  const lane = parseInt(fish.dataset.lane);
  const laneColor = COLORS[lane];
  if (!laneColor) return;
  const pond = document.querySelector(`.pond[data-color="${laneColor}"]`);
  if (!pond) return;
  const fishRect = fish.getBoundingClientRect();
  const pondRect = pond.getBoundingClientRect();
  if (fishRect.left <= pondRect.right) {
    stopFishAutoSwim(fish);
    onTutorialFishReachedPond(fish);
  }
}

async function onTutorialFishReachedPond(fish) {
  if (!fish || fish.dataset.resolved === '1') return;
  if (fish.dataset.handling === '1') return;
  fish.dataset.handling = '1';

  // Stop any in-flight journey timer/watcher so we don't double-dispatch
  // while the success/wrong sequence runs.
  _stopCollisionWatch(fish);
  if (fish.dataset.timer) {
    clearTimeout(parseInt(fish.dataset.timer));
    fish.dataset.timer = '';
  }

  // Freeze at the contact point.
  const contactLeftPct = _currentFishLeftPct(fish);
  fish.style.transition = 'none';
  fish.style.left = contactLeftPct.toFixed(4) + '%';
  fish.offsetWidth;

  const lane = parseInt(fish.dataset.lane);
  const fishColor = fish.dataset.color;
  const laneColor = COLORS[lane];

  if (fishColor === laneColor) {
    // Correct! Pond dive + success.
    fish.dataset.resolved = '1';
    inputLocked = true;
    const pond = document.querySelector(`.pond[data-color="${laneColor}"]`);
    playYippee();

    await playPondArcJump(fish, laneColor);
    pond.classList.add('filled');

    fish.classList.add('success-vanish');
    await delay(420);
    fish.remove();
    setTimeout(() => pond.classList.remove('filled'), 1800);
    inputLocked = false;
  } else {
    // Wrong lane — gentle blast-back, no lives lost in tutorial.
    removeHand();
    if (idleNudgeTimer) { clearTimeout(idleNudgeTimer); idleNudgeTimer = null; }

    const wrongCount = parseInt(fish.dataset.wrongCount || '0') + 1;
    fish.dataset.wrongCount = String(wrongCount);

    fish.dataset.handling = '0';

    // Freeze the stage so nothing drifts behind the popup. The push-away recoil
    // plays FIRST; only after it finishes does the "Oops!" board appear.
    freezeAllMovingFishForWrong();

    inputLocked = true;
    try {
      await pushBackWrongWave(fish);
    } catch (_) { /* recoil errors must not deadlock the tutorial */ }
    await showWrongConditionPopup(fish.dataset.color).catch(() => {});
    inputLocked = false;

    resumeFishAfterWrongPopup();

    // First miss is a silent try-again; only later misses pull up the
    // guidance hand after 3s of idle.
    if (wrongCount > 1) {
      resetHandNudgeTimer(fish);
    }
  }
}

/* Pulse the hand on whichever direction button moves the fish one
   step closer to its target lane. Pulled by spawn, after lane change,
   and after recoil. */

/* Resolves once the tutorial fish is removed from the DOM (i.e.,
   success vanish completed). */
function waitForTutorialFishResolve(fish) {
  return new Promise(resolve => {
    const tick = () => {
      if (!fish || !document.body.contains(fish)) { resolve(); return; }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

/* ---------- Hand helper ---------- */
function addHand(btn) {
  removeHand();
  const hand = document.createElement('div');
  hand.className = 'hand';
  hand.id = 'tut-hand';
  btn.appendChild(hand);
}
function removeHand() {
  const h = $('tut-hand');
  if (h) h.remove();
}

/* ---------- Apply a tutorial scene preset ----------
   opts.deferSpeech: apply everything EXCEPT the speech bubble, so the
   caller can let Gogo finish gliding to the new spot first and only
   then pop the bubble in (keeping its tail anchored to his head). */
function applyScene(sceneName, opts = {}) {
  const scene = TUTORIAL_SCENES[sceneName];
  if (!scene) return;
  // Track the active scene so showOcean()/buildFishCluster() can switch
  // to the confused-only layout. Set before any showOcean/showFishCluster
  // call below so they read the correct scene.
  currentSceneName = sceneName;

  // Full-scene image scenes REPLACE the dynamic composition with a
  // single pre-rendered SVG/PNG. Hide every dynamic element so the
  // static image is what the player sees.
  if (scene.fullSceneImage) {
    if (fullSceneImage) {
      fullSceneImage.style.backgroundImage = `url('${scene.fullSceneImage}')`;
      fullSceneImage.classList.remove('hidden');
      // Trigger fade-in next frame.
      requestAnimationFrame(() => fullSceneImage.classList.add('show'));
    }
    cinematicDim.classList.add('hidden');
    hideOcean();
    hideGenie();
    speech.classList.add('hidden');
    controls.classList.add('hidden');
    removeHand();
    hideFishCluster();
    clearStreamTarget();
    game.classList.remove('pulse-streams', 'pulse-ponds', 'pulse-buttons');
    return;
  }
  // Leaving a full-scene image — fade it out.
  if (fullSceneImage && !fullSceneImage.classList.contains('hidden')) {
    fullSceneImage.classList.remove('show');
    setTimeout(() => fullSceneImage.classList.add('hidden'), 320);
  }

  cinematicDim.classList.toggle('hidden', !scene.dim);
  if (scene.ocean) showOcean(); else hideOcean();
  if (scene.controls) controls.classList.remove('hidden');
  else controls.classList.add('hidden');
  setGenieFromPreset(scene.genie);
  if (!opts.deferSpeech) {
    // Interactive scenes apply their speech here (showAuto defers it).
    // setSpeechFromPreset builds the words, positions the bubble + tail, then
    // starts the VO-synced word-by-word reveal.
    const typeOpts = sceneTypeOpts(scene);
    setSpeechFromPreset(scene.speech, typeOpts, scene.bubbleAnchor);
  }
  game.classList.toggle('pulse-streams', !!scene.pulseStreams);
  game.classList.toggle('pulse-ponds', !!scene.pulsePonds);
  game.classList.toggle('pulse-buttons', !!scene.pulseButtons);
  if (scene.highlightButton === 'down') {
    downBtn.classList.add('highlight');
    upBtn.classList.remove('highlight');
  } else if (scene.highlightButton === 'up') {
    upBtn.classList.add('highlight');
    downBtn.classList.remove('highlight');
  } else {
    upBtn.classList.remove('highlight');
    downBtn.classList.remove('highlight');
  }
  if (scene.handButton === 'down')  addHand(downBtn);
  else if (scene.handButton === 'up') addHand(upBtn);
  else removeHand();
  if (scene.showCluster) showFishCluster();
  else hideFishCluster();
  if (scene.pulseTargetStream) setStreamTarget(scene.pulseTargetStream);
  else clearStreamTarget();
  // Static ponds.svg backdrop replaces the dynamic stream/box/pond
  // layers when scene.swapToPonds is true.
  if (scene.swapToPonds) {
    game.classList.add('show-ponds-svg');
    if (pondsSvg) pondsSvg.classList.remove('hidden');
  } else {
    game.classList.remove('show-ponds-svg');
    if (pondsSvg) pondsSvg.classList.add('hidden');
  }
}

function moveActiveFish(dir) {
  if (inputLocked) return;
  if (!activeFish) return;
  if (activeFish.dataset.jumping === '1') return;
  let lane = parseInt(activeFish.dataset.lane);
  lane = Math.max(0, Math.min(3, lane + dir));
  positionFishInLane(activeFish, lane);
  // The hand is wiped + re-armed by handleUserMove; do NOT re-add it
  // here so the animated hand never loops inside the button mid-tap.
}

/* ===========================================================
   TUTORIAL FLOW — preset driven
   =========================================================== */
async function runTutorial() {
  game.classList.add('tutorial');
  let tutorialState = 'introAutoScreens';

  controls.classList.add('hidden');
  upBtn.onclick = null;
  downBtn.onclick = null;
  upBtn.classList.remove('highlight');
  downBtn.classList.remove('highlight');
  removeHand();

  const autoGap = 350;
  // Auto-narration scenes: type the line, hold long enough for a 1st
  // grader to actually read it, then VANISH the bubble before moving
  // on. The next scene pops a fresh bubble back in via applyScene().
  // Hold time = scene.holdMs (per-scene override) or 2500ms default.
  // Pre-rendered fullSceneImage scenes hold for their own configured
  // duration instead of waiting on the typewriter.
  const showAuto = async (sceneName) => {
    const scene = TUTORIAL_SCENES[sceneName];
    // Pre-rendered full-scene images replace the whole composition — no
    // gliding genie/bubble to coordinate, so keep the simple path.
    if (scene && scene.fullSceneImage) {
      applyScene(sceneName);
      await delay(scene.holdMs || 2500);
      await delay(autoGap);
      return;
    }
    // Smooth scene change: note Gogo's spot, apply the scene WITHOUT its
    // bubble (so he glides to the new position via his CSS transition),
    // wait for him to arrive, THEN pop the bubble in anchored to his head.
    const genieWasHidden = genie.classList.contains('hidden');
    const prevLeft   = parseFloat(genie.style.left);
    const prevBottom = parseFloat(genie.style.bottom);
    applyScene(sceneName, { deferSpeech: true });
    const g = scene && scene.genie;
    const moved = !genieWasHidden && g && (
      Math.abs((typeof g.left   === 'number' ? g.left   : prevLeft)   - prevLeft)   > 0.1 ||
      Math.abs((typeof g.bottom === 'number' ? g.bottom : prevBottom) - prevBottom) > 0.1
    );
    // Wait the full glide when he travels; a short breath when he stays
    // put; nothing when he just faded in fresh (no glide to wait on).
    await delay(moved ? GENIE_GLIDE_MS : (genieWasHidden ? 0 : 140));
    // Start the scene's synced voice-over the instant the bubble pops in;
    // the returned opts pace the typewriter to the VO's real duration so
    // the words appear in step with the spoken line.
    const typeOpts = sceneTypeOpts(scene);
    transitionSpeechToPreset(scene, typeOpts);
    await waitForSpeechDone();
    // For VO scenes, linger until the voice finishes (covers reduced-motion,
    // where typing is instant) plus a short tail; otherwise use the preset hold.
    if (scene && scene.vo) await waitForVoTail(scene.vo, (scene.holdMs) || 600);
    else await delay((scene && scene.holdMs) || 2500);
    // Dissolve the bubble before the next scene; Gogo stays and glides on.
    await fadeOutSpeechSmooth();
    await delay(autoGap);
  };

  // 1–8: Auto narration (no user input)
  tutorialState = 'introAutoScreens';
  await showAuto('welcome');
  await showAuto('streamGuide');
  await showAuto('eachStream');
  // leadsToPond uses the SAME standard scene transition as every other
  // tutorial screen (old speech fades, Gogo glides via his normal CSS
  // transition, new speech pops in) — no special pond-travel slide.
  await showAuto('leadsToPond');
  await showAuto('ready');
  await showAuto('confused');
  await showAuto('thinking');
  await showAuto('useButtons');

  /* ---- Pink fish: green → red → yellow → pink (down x3) ---- */
  tutorialState = 'pinkFishDownTutorial';
  // Spawn the tutorial fish at the RIGHT END of the stream (the same
  // spot where real gameplay fish enter), and DO NOT drift horizontally
  // on this screen — the user only sees the pulse on the pink fish +
  // pink stream to communicate the rule.
  activeFish = spawnFish('pink', 0, 88);
  activeFish.classList.add('active');
  activeFish.style.transition = 'none';
  activeFish.dataset.resolved = '0';
  activeFish.dataset.safeRightX = '88';
  gameFish = [activeFish];
  activeWaveFish = [activeFish];
  gameOn = true;
  inputLocked = false;
  // Let the pink fish swim OUT OF the ocean crowd before the lesson (same emerge
  // as the game rounds).
  await _tutorialFishEmerge(activeFish, 'pink', 0);
  applyScene('pinkCorrect');
  await waitForSpeechDone();
  game.classList.add('teach-pink');
  await delay(3000);
  game.classList.remove('teach-pink');
  // End of "pink fish goes into the pink stream" — vanish genie and
  // bubble together before the next scene pops in.
  await vanishTutorialGuide();
  await delay(autoGap);

  // INTERACTIVE TUTORIAL 1: Tap down (enable only after genie vanishes)
  applyScene('tapDown');
  await waitForSpeechDone();
  await delay(2000);
  // Synced fade: genie + thought-box drop together. Controls unlock
  // ONLY after the vanish completes so the first tap can't fire
  // mid-fade and miss the active fish.
  await vanishTutorialGuide();
  controls.classList.remove('hidden');

  // Wire the buttons and let the fish auto-swim toward the pond. The
  // hand pulses on whichever direction button moves the fish closer
  // to its correct lane.
  const onTutorialBtnDown1 = () => handleUserMove(1);
  const onTutorialBtnUp1   = () => handleUserMove(-1);
  downBtn.addEventListener('click', onTutorialBtnDown1);
  upBtn.addEventListener('click', onTutorialBtnUp1);
  // No immediate hand — the tapDown scene already placed it; once the
  // player taps it disappears and only returns after 3s of idle.
  startFishJourney(activeFish);

  await waitForTutorialFishResolve(activeFish);

  downBtn.removeEventListener('click', onTutorialBtnDown1);
  upBtn.removeEventListener('click', onTutorialBtnUp1);
  removeHand();
  downBtn.classList.remove('highlight');
  gameFish = [];
  activeWaveFish = [];
  activeFish = null;
  await delay(400);

  /* ---- Green fish: pink → yellow → red → green (up x3) ---- */
  tutorialState = 'greenFishUpTutorial';
  // Spawn at right end of the pink lane — matches gameplay entry point.
  activeFish = spawnFish('green', 3, 88);
  activeFish.classList.add('active');
  activeFish.style.transition = 'none';
  activeFish.dataset.resolved = '0';
  activeFish.dataset.safeRightX = '88';
  gameFish = [activeFish];
  activeWaveFish = [activeFish];
  gameOn = true;
  inputLocked = false;
  // Let the green fish swim OUT OF the ocean crowd before the lesson.
  await _tutorialFishEmerge(activeFish, 'green', 3);
  applyScene('tapUp');
  await waitForSpeechDone();
  await delay(2000);
  // Synced fade — genie + thought-box vanish together.
  await vanishTutorialGuide();
  controls.classList.remove('hidden');
  controls.classList.remove('locked');

  // Same auto-swim setup as the pink-down tutorial.
  const onTutorialBtnDown2 = () => handleUserMove(1);
  const onTutorialBtnUp2   = () => handleUserMove(-1);
  downBtn.addEventListener('click', onTutorialBtnDown2);
  upBtn.addEventListener('click', onTutorialBtnUp2);
  // No immediate hand — the tapUp scene already placed it; once tapped
  // it disappears and only returns after 3s of idle in a wrong lane.
  startFishJourney(activeFish);

  await waitForTutorialFishResolve(activeFish);

  downBtn.removeEventListener('click', onTutorialBtnDown2);
  upBtn.removeEventListener('click', onTutorialBtnUp2);
  removeHand();
  upBtn.classList.remove('highlight');
  gameFish = [];
  activeWaveFish = [];
  gameOn = false;
  activeFish = null;

  controls.classList.add('hidden');
  tutorialState = 'normalGameStart';
  applyScene('guideCorrect');
  await waitForSpeechDone();
  await delay(2000);
  // Synced fade before main game starts.
  await vanishTutorialGuide();
  game.classList.remove('tutorial');
  startMainGame(1);
}

/* ===========================================================
   MAIN GAME
   =========================================================== */
/* Magical water-bubble wipe: a translucent water wave drifts in slowly from
   the right, lingers dreamily, then glides off-left to reveal the freshly-built
   main game. It carries layered floating bubbles (parallax fg/bg), occasional
   anticipation-burst bubbles, sparkles and a soft foam crest. Every element is
   randomized (size / delay / duration / sway) so nothing moves in lock-step.
   Purely decorative (pointer-events:none); cleans itself up after the sweep. */
/* The Bubble SVG, inlined as a data-URI (no asset file needed): a glossy
   translucent water bubble with a rim and a highlight. Used for every bubble in
   the merge transition. */
const _BUBBLE_RAW =
  "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>" +
    "<defs>" +
      // Body: a soft watery fill that is brightest at the core and fades to a
      // faint blue rim. Lower opacities so overlapping bubbles blend into a
      // dreamy foam instead of stacking into opaque white.
      "<radialGradient id='g' cx='38%' cy='34%' r='66%'>" +
        "<stop offset='0%' stop-color='#ffffff' stop-opacity='.62'/>" +
        "<stop offset='42%' stop-color='#e6f7ff' stop-opacity='.30'/>" +
        "<stop offset='80%' stop-color='#a9def5' stop-opacity='.20'/>" +
        "<stop offset='100%' stop-color='#6cc1ec' stop-opacity='.14'/>" +
      "</radialGradient>" +
      // Highlight: a SOFT-edged glow (radial → transparent) rather than a solid
      // white oval, so it never reads as a hard dot when many bubbles overlap.
      "<radialGradient id='h' cx='50%' cy='50%' r='50%'>" +
        "<stop offset='0%' stop-color='#ffffff' stop-opacity='.8'/>" +
        "<stop offset='55%' stop-color='#ffffff' stop-opacity='.22'/>" +
        "<stop offset='100%' stop-color='#ffffff' stop-opacity='0'/>" +
      "</radialGradient>" +
    "</defs>" +
    // Thin, faint rim so overlapping outlines stay soft, not a tangle of hard rings.
    "<circle cx='50' cy='50' r='47' fill='url(#g)' stroke='#ffffff' stroke-opacity='.32' stroke-width='1.2'/>" +
    "<ellipse cx='36' cy='31' rx='15' ry='11' fill='url(#h)'/>" +
  "</svg>";
const BUBBLE_SVG_URL = 'url("data:image/svg+xml,' + encodeURIComponent(_BUBBLE_RAW) + '")';

/* Bubble transition: a field of DISTINCT, non-overlapping bubbles streams in
   from the LEFT and RIGHT edges, fills the stage, holds a beat, then sweeps back
   out the way it came. Each bubble is positioned at its target (left/top) and the
   CSS keyframe flies it from an off-screen translate (--from) → 0 → back to --from.
   Edge bubbles arrive first and centre bubbles last, so the field "zips up" toward
   the middle. Bubbles are spaced so none ever collide. Purely decorative; self-cleans. */
function playWaterBubbleTransition() {
  const rand = (a, b) => a + Math.random() * (b - a);
  let layer = document.getElementById('gameTransition');
  if (!layer) {
    layer = document.createElement('div');
    layer.id = 'gameTransition';
    layer.className = 'game-transition';
    game.appendChild(layer);
  }
  layer.classList.remove('hidden');
  layer.innerHTML = '';
  const frag = document.createDocumentFragment();

  // Opaque water backdrop BEHIND the bubbles. It fades in with the incoming wave
  // and out as the bubbles recede, so the game screen is never visible through
  // any gap between bubbles — the bubbles are translucent, so they alone can't
  // guarantee full cover. This is what makes the transition fully opaque.
  const backdrop = document.createElement('div');
  backdrop.className = 'merge-backdrop';
  frag.appendChild(backdrop);

  const addBubble = (leftPct, topPct, sizePct) => {
    const b = document.createElement('div');
    b.className = 'merge-bubble';
    b.style.backgroundImage = BUBBLE_SVG_URL;
    // Quantize the width to a 0.5% grid so the browser rasterizes the bubble SVG
    // at only ~20 distinct sizes and REUSES those bitmaps across hundreds of
    // bubbles — that's what lets us run a high bubble count without lag.
    b.style.width = (Math.round(sizePct * 2) / 2).toFixed(1) + '%';
    b.style.left = leftPct.toFixed(1) + '%';
    b.style.top  = topPct.toFixed(1) + '%';
    // Enter from whichever edge the bubble's centre is nearer to, and recede the
    // same way. translate is in vw so it always clears the stage off-screen.
    const cx = leftPct + sizePct / 2;
    const fromLeft = cx < 50;
    b.style.setProperty('--from',  (fromLeft ? -rand(110, 155) : rand(110, 155)).toFixed(0) + 'vw');
    b.style.setProperty('--fromY', rand(-14, 14).toFixed(0) + 'vw');
    // Edge → centre wave: bubbles nearer the middle arrive (and leave) later, so
    // they "merge at the centre".
    const toCentre = 1 - Math.abs(cx - 50) / 50;          // 0 at edges, 1 at centre
    b.style.setProperty('--delay', (toCentre * 0.42).toFixed(2) + 's');
    b.style.setProperty('--dur',   rand(2.3, 2.7).toFixed(2) + 's');
    frag.appendChild(b);
  };

  // Non-overlapping bubble field. Bubbles are placed by rejection sampling in
  // PIXEL space: a candidate is kept only if it clears every bubble already
  // placed by a small gap, so no two bubbles ever collide or merge. Working in
  // px (not %) keeps the spacing true even though the stage is wider than tall.
  const rect = layer.getBoundingClientRect();
  const W = rect.width  || game.clientWidth  || window.innerWidth;
  const H = rect.height || game.clientHeight || window.innerHeight;
  const placed = [];                         // {x, y, r} bubble centres + radius, px
  const GAP   = -W * 0.009;                   // NEGATIVE → bubbles may overlap slightly for a seamless mass
  const rMin  = W * 0.008, rMax = W * 0.055;  // bubble radii (~1.6%–11% diameter); small ones fill gaps
  const TARGET = 460;                         // high count; raster reuse (quantized sizes) keeps it smooth
  let attempts = 0;
  while (placed.length < TARGET && attempts++ < 55000) {
    // Place big bubbles first, then progressively much smaller ones so the little
    // bubbles drop into the gaps the big ones leave. The max size shrinks almost
    // all the way to rMin by the end, so the final run is fine gap-filler bubbles.
    const curMax = rMax - (rMax - rMin) * (placed.length / TARGET) * 0.93;
    const r = rand(rMin, curMax);
    // Allow a slight spill past each edge so the field reaches the corners.
    const x = rand(-r * 0.5, W + r * 0.5);
    const y = rand(-r * 0.5, H + r * 0.5);
    let clear = true;
    for (let i = 0; i < placed.length; i++) {
      const p = placed[i], dx = x - p.x, dy = y - p.y;
      const min = r + p.r + GAP;
      if (dx * dx + dy * dy < min * min) { clear = false; break; }
    }
    if (!clear) continue;
    placed.push({ x, y, r });
    // addBubble wants the top-left corner (left = %width, top = %height) and the
    // diameter as %width; aspect-ratio:1 then renders a true circle in px.
    addBubble((x - r) / W * 100, (y - r) / H * 100, (2 * r) / W * 100);
  }

  layer.appendChild(frag);
  // in (~1.1s) + hold + recede (~1s) ≈ 2.6s, + max delay 0.42s, + a small tail.
  setTimeout(() => { layer.classList.add('hidden'); layer.innerHTML = ''; }, 3200);
}

function startMainGame(startLevelIdx = 0) {
  playWaterBubbleTransition();
  game.classList.remove('tutorial');
  game.classList.remove('pulse-streams', 'pulse-ponds', 'pulse-buttons', 'teach-pink', 'final-screen-active');
  hideGenie();
  hideSpeech();
  hideOcean();
  hideFishCluster();
  clearStreamTarget();
  stopIdleNudge();
  // Reset the per-round ocean staging: destination holes start hidden (the
  // first round's intro reveals them once the fish enters its stream), and any
  // any leftover promoted intro fish from a previous game is cleared.
  game.classList.add('holes-hidden');
  ocean.classList.remove('ocean-receding');
  ocean.style.opacity = '';
  if (typeof _clearPromotedFish === 'function') _clearPromotedFish();
  cinematicDim.classList.add('hidden');
  if (gameOverOverlay) gameOverOverlay.classList.add('hidden');
  if (finalPondScreen) finalPondScreen.classList.add('hidden');
  resumeGameplayMusic();
  if (wrongOverlay) {
    wrongOverlay.classList.add('hidden');
    wrongOverlay.classList.remove('fade-out');
  }
  controls.classList.remove('hidden');
  controls.classList.remove('locked');
  activeFish = null;
  if (SHOW_HUD) hud.classList.add('show');
  if (SHOW_LEVEL_BANNER) levelBanner.classList.add('show');

  score = 0;
  lives = 3;
  gameOn = true;
  inputLocked = false;
  currentLevelIdx = startLevelIdx;
  updateHUD();

  document.querySelectorAll('.fish').forEach(f => f.remove());
  gameFish = [];

  upBtn.onclick   = () => handleUserMove(-1);
  downBtn.onclick = () => handleUserMove(1);

  beginLevel(currentLevelIdx);
}

function buildLevelBanner(level) {
  levelBannerNum.textContent = (currentLevelIdx + 1);
  levelFishRow.innerHTML = '';
  level.fish.forEach((f, i) => {
    const icon = document.createElement('div');
    icon.className = 'level-fish-icon';
    icon.dataset.idx = i;
    applyFishArt(icon, f.color);
    levelFishRow.appendChild(icon);
  });
}

function markLevelIconUsed(idx) {
  const icons = levelFishRow.querySelectorAll('.level-fish-icon');
  if (icons[idx]) icons[idx].classList.add('used');
}

/* Single source of truth for what spawns when. If a level supplies a
   `waves` array, every fish inside one wave is spawned together; if it
   only supplies the flat `fish` list, each fish becomes its own wave
   (the old single-file behavior). */
function getLevelWaves(level) {
  if (Array.isArray(level.waves) && level.waves.length) return level.waves;
  if (Array.isArray(level.fish) && level.fish.length) return level.fish.map(f => [f]);
  return [];
}

function attachIdxToWaves(level) {
  // Banner icon indices come from the flat `fish` list when present;
  // otherwise fall back to flattening the waves so multi-fish levels
  // that omit `fish` still get sensible per-fish indices.
  const flat = (Array.isArray(level.fish) && level.fish.length)
    ? level.fish
    : getLevelWaves(level).flat();
  const pool = flat.map((f, i) => ({ color: f.color, start: f.start, idx: i, used: false }));
  const waves = getLevelWaves(level);
  return waves.map((wave) => wave.map((f) => {
    const hit = pool.find(p => !p.used && p.color === f.color && p.start === f.start);
    if (hit) hit.used = true;
    return { ...f, idx: hit ? hit.idx : 0 };
  }));
}

async function beginLevel(idx) {
  if (idx >= LEVELS.length) {
    finishGame(true);
    return;
  }
  const level = LEVELS[idx];
  if (SHOW_LEVEL_BANNER) buildLevelBanner(level);

  levelSpawnQueue = level.fish.map((f, i) => ({...f, idx: i}));
  levelWaveQueue = attachIdxToWaves(level);
  activeWaveFish = [];
  fishSpawnedThisLevel = 0;
  fishCompletedThisLevel = 0;
  await delay(300);
  spawnNextFromQueue();
}

// Constant linear travel speed (% of stage width per second). All fish
// journeys derive their duration from this so motion looks uniform.
const FISH_TRAVEL_SPEED = 11.2;
// Once a fish is already sitting in its OWN correct stream, nudge its
// swim speed up so the child isn't left waiting after they've already
// made the right choice. Kept modest so the boost reads as "homeward
// eagerness", not a jarring jump in pace.
const CORRECT_STREAM_SPEED_MULTIPLIER = 1.6;
const FISH_TRAVEL_SECONDS = 10; // legacy reference — solo fish duration
// Fish wrappers are 11.2% wide but the painted fish art only fills the
// inner ~75% of that box, so visual gap = (slot - 11.2) + ~2.8% of
// transparent margin. We pick the slot per-count so the school always
// reads as a compact group, never a sparse line:
//   2 fish   → medium gap   (slot 10.6 → visual gap ~2.0%)
//   3-5 fish → compact      (slot 10.0 → visual gap ~1.4%)
//   6+ fish  → tightest     (slot  9.6 → visual gap ~1.0%)
function _multiFishSlot(n) {
  if (n <= 2) return 10.6;
  if (n <= 5) return 10.0;
  return 9.6;
}
function _waveStartPositions(n) {
  if (n <= 1) return [100];
  // Multi-fish: rightmost fish anchors at ~88% (last in array, trails
  // behind), each preceding fish sits one slot further left so they
  // swim as a tight school. fish[0] is leftmost — it reaches the pond
  // first.
  const RIGHT = 88;
  const slot = _multiFishSlot(n);
  const positions = [];
  for (let i = 0; i < n; i++) positions.push(RIGHT - (n - 1 - i) * slot);
  return positions;
}
/* Safe-right X each fish returns to when pushed back. Matches the
   entry slot so wrong-recoil never causes overlap. */
function _waveSafeRightPositions(n) {
  if (n <= 1) return [88];
  const RIGHT = 88;
  const slot = _multiFishSlot(n);
  const positions = [];
  for (let i = 0; i < n; i++) positions.push(RIGHT - (n - 1 - i) * slot);
  return positions;
}
function spawnNextFromQueue() {
  if (!gameOn) return;
  if (levelWaveQueue.length === 0) return;
  const wave = levelWaveQueue.shift();
  activeWaveFish = [];

  const positions = _waveStartPositions(wave.length);
  const safeRights = _waveSafeRightPositions(wave.length);
  wave.forEach((next, k) => {
    const laneIdx = laneIndexOfColor(next.start);
    const startLeft = positions[k];
    const fish = spawnFish(next.color, laneIdx, startLeft);
    fish.dataset.targetColor = next.color;
    fish.dataset.iconIdx = next.idx;
    fish.dataset.resolved = '0';
    fish.dataset.safeRightX = String(safeRights[k]);
    if (game.classList.contains('tutorial')) activeFish = fish;
    gameFish.push(fish);
    activeWaveFish.push(fish);
    fishSpawnedThisLevel++;
    startFishJourney(fish);
    // No immediate idle nudge — the hand only appears after the player
    // has already missed more than once with this fish (handled in the
    // wrong-answer branch below).
  });
}

/* ============================================================================
   PER-ROUND OCEAN → STREAM → PONDS STAGING  (presentation only)
   ----------------------------------------------------------------------------
   Stages the visuals around each gameplay wave WITHOUT touching any spawn /
   movement / collision / matching / scoring logic. The original wave spawner
   is kept verbatim as _spawnWaveCore and still does ALL the real work — we only
   wrap it so that, before the fish actually enters the stream, the screen sits
   in the "ocean state" (crowd visible, destination holes hidden), one fish
   appears to swim out of the crowd and bob, and afterwards the ocean recedes
   while the holes slide in ("the ocean moved away, the destinations arrived").

   The wrapper is the ONLY thing the rest of the game calls (beginLevel /
   onFishReachedEnd still call spawnNextFromQueue by name) — reassigning the
   binding here re-routes every caller through the staging with zero edits to
   their bodies. Tutorial waves never reach this (the tutorial spawns directly),
   and an empty queue / re-entrancy falls straight through to the original.
   ========================================================================== */
const _spawnWaveCore = spawnNextFromQueue;   // untouched original spawner
let _roundIntroBusy = false;

// Remove any leftover promoted intro fish (called on game (re)start).
function _clearPromotedFish() {
  game.querySelectorAll('.promoted-fish').forEach(el => el.remove());
}

// At game start a full-screen water-bubble wipe (z-index 200) covers the stage
// for ~2.5s. The first round's ocean intro must WAIT for that wipe to clear —
// otherwise the whole emerge + ocean→ponds transition plays hidden behind it
// and the player never sees it (the game just "appears" mid-play). After the
// wipe there's nothing to wait on, so every later round starts immediately.
function _waterWipeActive() {
  const t = document.getElementById('gameTransition');
  return !!(t && !t.classList.contains('hidden'));
}
async function _waitForWaterWipeToClear() {
  let guard = 0;
  while (_waterWipeActive() && guard++ < 80) await delay(60);   // ~4.8s safety cap
}

// The stage-% LEFT where the promoted crowd fish finishes its swim and the REAL
// gameplay fish takes over. It's left of the ocean strip (which sits at 82%+),
// i.e. inside the stream, so the fish visibly leaves the crowd and enters the
// stream. Same spot + same size at the swap → it reads as ONE continuous fish,
// never a crowd fish AND a separate fish entering from the right.
const ROUND_HANDOFF_LEFT = 73;       // stage %
const GAMEPLAY_FISH_W    = 11.2;     // must match the .fish width (stage %)

// Lift ONE real fish out of the rendered ocean crowd and reparent it onto the
// stage at the SAME on-screen place/size (reparenting dodges the ocean layer's
// overflow clipping). It then swims forward out of the pack, GROWING from crowd
// size up to the gameplay size as it approaches (natural "coming toward you"
// perspective) and bobbing (confused), ending on the exact box the real fish
// will occupy at handoff. Prefers a fish of the lead colour near the front of
// the crowd. Returns the element (or null if the crowd isn't laid out yet).
function _promoteCrowdFish(color, laneIdx, handoffLeft = ROUND_HANDOFF_LEFT) {
  if (!oceanFishLayer) return null;
  const all = Array.from(oceanFishLayer.querySelectorAll('.ocean-fish'));
  if (!all.length) return null;
  let cands = all.filter(f => f.dataset.color === color);
  if (!cands.length) cands = all;
  cands.sort((a, b) => parseFloat(a.style.left) - parseFloat(b.style.left)); // front-most first
  const sel = cands[0];

  // Measure its current on-stage rect and convert to stage % before reparenting.
  const r = sel.getBoundingClientRect();
  const g = game.getBoundingClientRect();
  if (!g.width || !g.height || !r.width) return null;
  const leftPct = (r.left - g.left) / g.width  * 100;
  const topPct  = (r.top  - g.top)  / g.height * 100;
  const wPct    = r.width / g.width * 100;

  sel.remove();
  sel.classList.add('promoted-fish');
  sel.style.left  = leftPct.toFixed(2) + '%';
  sel.style.top   = topPct.toFixed(2) + '%';
  sel.style.width = wPct.toFixed(2) + '%';
  game.appendChild(sel);

  // End on the EXACT box the real gameplay fish will occupy at handoff. The
  // inner-art scale grows from the centre (so the wrapper centre never moves),
  // so we only need to centre-align the wrapper. Grow factor takes crowd size →
  // gameplay size.
  const scale   = GAMEPLAY_FISH_W / Math.max(0.5, wPct);
  const realTop = laneCenterPercent(laneIdx) - DESIGN.fish.centerOffsetY;
  const ar = 600 / 860, hToStage = 16 / 9;                       // fish aspect, w%→h% of stage
  const realCx  = handoffLeft + GAMEPLAY_FISH_W / 2;            // real fish visual centre X
  const realCy  = realTop + (GAMEPLAY_FISH_W * ar * hToStage) / 2;
  const wrapHpct = wPct * ar * hToStage;
  const targetLeft = realCx - wPct / 2;                         // centre-align the small wrapper
  const targetTop  = realCy - wrapHpct / 2;
  const artEl = sel.querySelector('.ocean-fish-art');

  // After the small crowd-sized fish has painted, swim it forward (left/top) AND
  // grow it from crowd size (scale 1) up to gameplay size — so it visibly starts
  // the SAME size as the rest of the crowd and gets bigger as it comes toward
  // you. The grow uses the Web Animations API (reliable; a plain CSS transition
  // was collapsing into the first paint and popping straight to full size).
  const SWIM_MS = 1700;                                   // slower, more graceful emerge from the crowd
  const SWIM_EASE = 'cubic-bezier(.22,.61,.36,1)';        // gentle ease-out (smooth decel)
  const opt = { duration: SWIM_MS, easing: SWIM_EASE, fill: 'forwards' };
  requestAnimationFrame(() => requestAnimationFrame(() => {
    // Swim forward (wrapper left/top) — WAAPI so it actually animates from the
    // crowd spot instead of snapping to the target.
    if (sel.animate) {
      sel.animate([{ left: leftPct.toFixed(2) + '%', top: topPct.toFixed(2) + '%' },
                   { left: targetLeft.toFixed(2) + '%', top: targetTop.toFixed(2) + '%' }], opt);
    } else {
      sel.style.transition = `left ${SWIM_MS}ms ${SWIM_EASE}, top ${SWIM_MS}ms ${SWIM_EASE}`;
    }
    sel.style.left = targetLeft.toFixed(2) + '%';   // committed end state (also where WAAPI holds)
    sel.style.top  = targetTop.toFixed(2) + '%';
    // Grow (inner art scale 1 → gameplay size) — WAAPI so it visibly starts at
    // the crowd size and gets bigger as it comes toward you.
    if (artEl && artEl.animate) {
      artEl.animate([{ transform: 'scale(1)' }, { transform: `scale(${scale.toFixed(3)})` }], opt);
      artEl.style.transform = `scale(${scale.toFixed(3)})`;
    } else if (artEl) {
      artEl.style.transition = `transform ${SWIM_MS}ms ${SWIM_EASE}`;
      artEl.style.transform = `scale(${scale.toFixed(3)})`;
    }
    sel.classList.add('bob');
  }));
  return sel;
}

// TUTORIAL emerge: make an already-spawned tutorial fish (sitting at left 88 in
// its lane) appear to swim OUT OF the ocean crowd, exactly like the game rounds.
// Briefly shows the crowd, a matching crowd fish grows + swims forward to the
// fish's spot, hands off to the real fish, then the crowd fades. Only the emerge
// is added — the tutorial's destination icons stay visible as before.
async function _tutorialFishEmerge(fish, color, laneIdx) {
  if (!fish) return;
  fish.style.opacity = '0';                       // hide the real fish; a crowd fish stands in
  showOcean();
  await nextFrame(); await nextFrame();
  const promoted = _promoteCrowdFish(color, laneIdx, 88);   // emerge to the fish's spot (left 88)
  await delay(promoted ? 2200 : 150);
  if (promoted) promoted.classList.remove('bob');           // settle so the swap can't pop
  fish.style.opacity = '';                        // reveal the real fish (same spot + size)
  if (promoted) promoted.remove();
  ocean.style.transition = 'opacity 420ms ease';  // gently fade the crowd away
  ocean.style.opacity = '0';
  await delay(440);
  hideOcean();
  ocean.style.transition = '';
  ocean.style.opacity = '';
}

// Per-round intro & state transition. Show the ocean crowd, then for EVERY fish
// in the wave (1, 2 or 3) lift one real crowd fish out of the pack — each swims
// forward, grows from crowd size to gameplay size, and bobs (confused) — ending
// staggered into a school on the exact boxes the real fish will occupy. Then
// HAND OFF: spawn the real wave (untouched spawner) and snap each real fish onto
// its promoted counterpart's spot, removing the promoted ones, so the SAME fish
// continue into the stream (no fish appears separately from the right). Finally
// the ocean recedes and the destination holes slide in.
async function _runRoundIntro() {
  _roundIntroBusy = true;
  try {
    const wave = levelWaveQueue[0];          // peek; the core call shifts it
    if (!wave || !wave.length) { _spawnWaveCore(); return; }
    const n = wave.length;
    const slot = _multiFishSlot(n);          // same horizontal spacing the spawner uses

    // Don't run the intro behind the start-of-game water wipe (it would be
    // invisible). Once the wipe clears, the ocean intro is fully on screen.
    await _waitForWaterWipeToClear();
    if (!gameOn) return;

    // STATE 1 — ocean + streams visible, destination holes hidden.
    game.classList.add('holes-hidden');
    ocean.classList.remove('ocean-receding');
    showOcean();
    ocean.style.opacity = '0';               // quick fade-in for the ocean
    await nextFrame();
    ocean.style.opacity = '';

    // Let the crowd lay out, then promote ONE crowd fish per wave fish. Each
    // ends at a staggered forward spot (lead leftmost, trailing fish behind it)
    // matching where its real fish will hand off.
    await nextFrame(); await nextFrame();
    const handoffLefts = wave.map((_, k) => ROUND_HANDOFF_LEFT + k * slot);
    const promoted = wave.map((f, k) =>
      _promoteCrowdFish(f.color, laneIndexOfColor(f.start), handoffLefts[k]));
    await delay(2450);                       // swim-forward + grow (1700ms) + a couple of bobs
    if (!gameOn) { _clearPromotedFish(); ocean.classList.remove('ocean-receding'); hideOcean(); return; }

    // Settle the bobs (stops the animation → each wrapper snaps back to its lane
    // centre) so the swaps can't pop vertically mid-swing.
    promoted.forEach(p => { if (p) p.classList.remove('bob'); });

    // HANDOFF. Spawn the real wave, then for each fish move it onto its promoted
    // counterpart's exact box and remove the promoted one, so the same fish
    // simply continues into the stream. Re-journey from the handoff spot (the
    // existing helper, constant speed). Falls back to a fade if a promote failed.
    _spawnWaveCore();
    for (let k = 0; k < n; k++) {
      const realFish = activeWaveFish[k];
      const p = promoted[k];
      if (realFish && p) {
        if (realFish.dataset.timer) { clearTimeout(parseInt(realFish.dataset.timer)); realFish.dataset.timer = ''; }
        _stopCollisionWatch(realFish);
        realFish.style.transition = 'none';
        realFish.style.left = handoffLefts[k] + '%';   // lane top already set by spawn
        realFish.offsetWidth;                           // commit before re-journey
        p.remove();                                     // identical box underneath → seamless swap
        startFishJourney(realFish);                     // keep swimming from the handoff spot
      } else if (p) {
        p.style.opacity = '0';
        setTimeout(() => p.remove(), 420);
      }
    }

    game.classList.remove('holes-hidden');   // holes slide in from the left
    ocean.classList.add('ocean-receding');   // ocean glides right + fades
    await delay(560);
    hideOcean();
    ocean.classList.remove('ocean-receding');
    ocean.style.opacity = '';
  } finally {
    _roundIntroBusy = false;
  }
}

// Re-route every wave spawn through the staging. Falls through to the original
// for the tutorial, an empty queue, or a re-entrant call.
spawnNextFromQueue = function () {
  if (!gameOn) return;
  if (_roundIntroBusy || levelWaveQueue.length === 0 || game.classList.contains('tutorial')) {
    _spawnWaveCore();
    return;
  }
  _runRoundIntro();
};

function startFishJourney(fish, secondsOverride) {
  if (fish.dataset.timer) clearTimeout(parseInt(fish.dataset.timer));
  // Always derive duration from REMAINING distance / constant speed,
  // so the fish swims left at the same visual rate regardless of
  // where it currently is or where it spawned.
  const currentLeft = _currentFishLeftPct(fish);
  const target = -12;
  const distance = Math.max(0.1, currentLeft - target);
  // Speed up only the homeward leg once the fish is already in its
  // matching lane — wrong lanes keep the base pace so wrong-stream
  // feedback timing is untouched. Each wave fish journeys on its own
  // so this stays per-fish and never affects the rest of the group.
  const inCorrectLane =
    parseInt(fish.dataset.lane) === laneIndexOfColor(fish.dataset.color);
  const speed = FISH_TRAVEL_SPEED *
    (inCorrectLane ? CORRECT_STREAM_SPEED_MULTIPLIER : 1);
  const seconds = secondsOverride != null
    ? secondsOverride
    : distance / speed;
  fish.style.transition = `left ${seconds}s linear`;
  fish.offsetWidth;
  requestAnimationFrame(() => { fish.style.left = target + '%'; });
  // Safety fallback timer — collision watch is the primary trigger.
  const arrival = setTimeout(() => _dispatchFishArrival(fish), seconds * 1000 + 200);
  fish.dataset.timer = arrival;
  startCollisionWatch(fish);
}


function moveLeadFish(dir) {
  if (!gameOn) return;
  if (inputLocked) return;
  // Tutorial path: single fish is driven via `activeFish`.
  if (activeFish && gameFish.includes(activeFish) && activeFish.dataset.resolved !== '1') {
    if (activeFish.dataset.jumping === '1') return;
    const laneNow = parseInt(activeFish.dataset.lane);
    let lane = Math.max(0, Math.min(3, laneNow + dir));
    positionFishInLane(activeFish, lane);
    idleNudgeFish = activeFish;
    noteUserInteraction();
    return;
  }
  // Main game: every still-active fish in the current wave moves
  // together. Each one tracks its own lane/state and resolves
  // independently when it reaches its pond.
  let lead = null, leadLeft = Infinity;
  let movedAny = false;
  activeWaveFish.forEach(f => {
    if (!gameFish.includes(f)) return;
    if (f.dataset.resolved === '1') return;
    if (f.dataset.jumping === '1') return;
    const laneNow = parseInt(f.dataset.lane);
    const lane = Math.max(0, Math.min(3, laneNow + dir));
    if (lane !== laneNow) {
      positionFishInLane(f, lane);
      movedAny = true;
    }
    const rect = f.getBoundingClientRect();
    if (rect.left < leadLeft) { leadLeft = rect.left; lead = f; }
  });
  if (!lead) return;
  activeWaveFish.forEach(f => f.classList.toggle('active', f === lead));
  idleNudgeFish = lead;
  // Note interaction even if no fish actually changed lane (all already
  // at the boundary) — this still cancels the idle hand-nudge.
  noteUserInteraction();
}

function isCurrentWaveComplete() {
  if (!activeWaveFish.length) return true;
  return activeWaveFish.every(f => f.dataset.resolved === '1' || !gameFish.includes(f));
}

async function onFishReachedEnd(fish) {
  if (!gameFish.includes(fish)) return;
  if (fish.dataset.resolved === '1') return;
  if (fish.dataset.handling === '1') return;
  fish.dataset.handling = '1';

  // Freeze the fish at the EXACT contact point so success/wrong reacts
  // here, not after the fish drifts past the pond.
  _stopCollisionWatch(fish);
  if (fish.dataset.timer) {
    clearTimeout(parseInt(fish.dataset.timer));
    fish.dataset.timer = '';
  }
  const contactLeftPct = _currentFishLeftPct(fish);
  fish.style.transition = 'none';
  fish.style.left = contactLeftPct.toFixed(4) + '%';
  fish.offsetWidth;

  const lane = parseInt(fish.dataset.lane);
  const fishColor = fish.dataset.color;
  const laneColor = COLORS[lane];

  if (fishColor === laneColor) {
    fish.dataset.resolved = '1';
    inputLocked = true;
    controls.classList.add('locked');
    if (fish.dataset.timer) clearTimeout(parseInt(fish.dataset.timer));
    stopIdleNudge();
    clearStreamTarget();
    score += 10;
    updateHUD();
    const pond = document.querySelector(`.pond[data-color="${laneColor}"]`);

    // Yippee voice-over the moment the fish arrives at the right pond.
    playYippee();

    // 1. Final arc jump INTO the pond (≈400ms). 2. Splash at landing.
    // 3. Pond flashes filled. 4. Soft pop + vanish.
    await playPondArcJump(fish, laneColor);
    pond.classList.add('filled');

    // Short pause so the player sees the hop landing, then fade out
    // via the .success-vanish opacity/transform. No scale pop on the
    // fish itself — keeps the fish at its constant rendered size.
    await delay(120);
    fish.classList.add('success-vanish');
    await delay(420);
    fish.remove();
    gameFish = gameFish.filter(f => f !== fish);
    if (activeFish === fish) activeFish = null;
    markLevelIconUsed(parseInt(fish.dataset.iconIdx));
    fishCompletedThisLevel++;
    setTimeout(() => pond.classList.remove('filled'), 1800);
    await delay(220);
    inputLocked = false;
    controls.classList.remove('locked');
    if (isCurrentWaveComplete()) {
      if (levelWaveQueue.length > 0) spawnNextFromQueue();
      else checkLevelComplete();
    }
  } else {
    // Wrong streams no longer cost lives or end the game — the player
    // gets a short recoil, a stream/pond highlight, and a top-of-stage
    // hint, then keeps playing the same round.
    removeHand();
    if (idleNudgeTimer) { clearTimeout(idleNudgeTimer); idleNudgeTimer = null; }

    // Per-fish wrong counter — gates the hand-nudge trigger so the
    // first miss is treated as a quick "try again", and only repeat
    // mistakes pull up the guidance hand.
    const wrongCount = parseInt(fish.dataset.wrongCount || '0') + 1;
    fish.dataset.wrongCount = String(wrongCount);

    const pond = document.querySelector(`.pond[data-color="${laneColor}"]`);
    if (pond) {
      pond.classList.add('flash-wrong');
      setTimeout(() => pond.classList.remove('flash-wrong'), 600);
    }
    fish.classList.add('wrong');

    // Freeze every unresolved fish on the stage (background + wave)
    // so nothing drifts forward while the wrong popup is on screen.
    // Background journey timers + collision watchers are killed; the
    // resume pass after the popup brings them back to life.
    freezeAllMovingFishForWrong();

    // Highlight the CORRECT stream + matching pond so the player can
    // see which lane the fish belongs in. The highlight persists until
    // the fish is delivered correctly (cleared in the success branch).
    // (Mini hint text intentionally disabled — the wrong-condition
    // popup card alone communicates which stream the fish belongs in.)
    setStreamTarget(fishColor);

    // The push-away recoil plays FIRST; only after it finishes does the "Oops!"
    // board appear. Input stays locked and background fish stay frozen the whole
    // time (through the recoil AND the popup).
    inputLocked = true;
    controls.classList.add('locked');
    try {
      await pushBackWrongWave(fish);
    } catch (_) { /* recoil errors must not deadlock the game */ }
    await showWrongConditionPopup(fishColor).catch(() => {});

    fish.classList.remove('wrong');
    fish.dataset.handling = '0';
    inputLocked = false;
    controls.classList.remove('locked');
    gameOn = true;

    // Popup is gone — restart every frozen fish from its current X
    // so the whole stage moves on together.
    resumeFishAfterWrongPopup();

    // Only arm the hand-nudge guidance after MORE than one wrong on
    // the same fish — first miss is silent so the popup + recoil read
    // as a "try again" cue without overlaying the hand right away.
    if (wrongCount > 1) {
      resetHandNudgeTimer(fish);
    }
  }
}


function checkLevelComplete() {
  if (levelWaveQueue.length === 0 && gameFish.length === 0) {
    currentLevelIdx++;
    setTimeout(() => beginLevel(currentLevelIdx), 700);
  }
}

function updateHUD() {
  if (!SHOW_HUD) return;
  scoreEl.textContent = score;
  livesEl.textContent = lives > 0 ? '❤️'.repeat(lives) : '💀';
}

function finishGame(won) {
  gameOn = false;
  inputLocked = true;
  stopIdleNudge();
  clearStreamTarget();
  // Make sure no stale wrong-popup or lock prevents the new overlay
  // from receiving input.
  if (wrongOverlay) {
    wrongOverlay.classList.add('hidden');
    wrongOverlay.classList.remove('fade-out');
  }
  controls.classList.remove('locked');
  gameFish.forEach(f => {
    if (f.dataset.timer) clearTimeout(parseInt(f.dataset.timer));
    f.remove();
  });
  gameFish = [];
  activeFish = null;
  activeWaveFish = [];
  controls.classList.add('hidden');

  if (won) {
    // Last fish sorted — jump straight to the final winning screen.
    showFinalPondScreen();
  } else {
    showGameOverOverlay();
  }
}

function showGameOverOverlay() {
  if (!gameOverOverlay) return;
  gameOverOverlay.classList.remove('hidden');
}
function hideGameOverOverlay() {
  if (!gameOverOverlay) return;
  gameOverOverlay.classList.add('hidden');
}

/* ===========================================================
   FINAL WINNING SCREEN — Arabian magical victory. The last sorted
   fish jumps STRAIGHT here (no pre-win pond beat). A fixed full-screen
   artwork (assets/final-screen.webp) is the whole composition; we only
   overlay Gogo, his glow/aura, the title and floating magic particles.
   =========================================================== */
async function showFinalPondScreen() {
  if (!finalPondScreen) return;

  gameOn = false;
  inputLocked = true;

  controls.classList.add('hidden');
  hud.classList.remove('show');
  levelBanner.classList.remove('show');

  stopIdleNudge();
  hideSpeech();
  hideGenie();
  hideOcean();
  hideFishCluster();
  clearStreamTarget();

  document.querySelectorAll('.fish').forEach(f => f.remove());
  document
    .querySelectorAll('.splash, .success-water-ripple, .success-splash-burst, .success-droplet, .success-bubble, .success-bubble-burst')
    .forEach(n => n.remove());

  game.classList.add('final-screen-active');
  finalPondScreen.classList.remove('hidden');

  transitionToWinMusic();
  spawnMagicalVictoryParticles();
  // Recorded victory cheer ("Yayy! The fish are sorted!") over the win music.
  playTutorialVO('win');

  // When embedded in the flipbook, tell the parent the game is complete so it
  // can close the game and continue to page 7. Delayed so the child enjoys the
  // victory screen first. Harmless when the game runs standalone (no parent).
  try{
    if (window.parent && window.parent !== window) {
      setTimeout(function(){
        // Stop every game sound BEFORE handing control back, so nothing lingers
        // as the flipbook opens page 7. (The parent also unloads this iframe,
        // which is the definitive stop — this just guarantees instant silence.)
        stopAllGameAudio();
        // Strict same-origin target in production (http/https); '*' only for
        // local file:// where opaque origins can't be matched by targetOrigin.
        var __t = (location.protocol === 'http:' || location.protocol === 'https:') ? location.origin : '*';
        window.parent.postMessage({ type: 'LBD_GAME_COMPLETE', gameId: 'lbd1' }, __t);
      }, 4500);
    }
  }catch(e){}
}

/* Hard-stop all game audio: pause + mute + rewind + detach every <audio>/
   <video>, and cover Howler/Phaser too in case the engine ever changes. Safe
   to call multiple times. */
function stopAllGameAudio() {
  try {
    document.querySelectorAll('audio, video').forEach(function (media) {
      try { media.pause(); } catch (e) {}
      try { media.muted = true; } catch (e) {}
      try { media.currentTime = 0; } catch (e) {}
      try { media.removeAttribute('src'); media.load(); } catch (e) {}
    });
  } catch (e) {}
  try { if (window.Howler) { window.Howler.stop(); window.Howler.mute(true); } } catch (e) {}
  try { if (window.game && window.game.sound) { window.game.sound.stopAll(); } } catch (e) {}
}

/* Magical Arabian particles — stars, crescents, gems and glowing dots
   that float upward, twinkle, rotate and fade. Spawned on a light
   interval (capped count) so it feels alive but never cluttered. NOT
   confetti. The whole layer is wiped + the loop cleared each time the
   final screen is shown. */
const MAGIC_SYMBOLS = ['✦', '✧', '☾', '◆', '●', '✺', '✸', '⋆', '❉'];
const MAGIC_COLORS  = ['#ffe082', '#ffd54f', '#fff3c4', '#ffec99', '#fff8dc', '#ffffff'];
const MAGIC_MAX = 50; // upper bound on live particles — rich but never confetti-spam
let magicParticleLoop = null;

function spawnMagicalVictoryParticles() {
  const layer = document.querySelector('.final-magic-layer');
  if (!layer) return;

  layer.innerHTML = '';
  clearInterval(magicParticleLoop);

  magicParticleLoop = setInterval(() => {
    // Cap live particles so the screen stays magical, not crowded.
    if (layer.childElementCount >= MAGIC_MAX) return;

    // Spawn 1–2 per tick so the field fills out without a long ramp-up.
    const batch = 1 + (Math.random() < 0.6 ? 1 : 0);
    for (let i = 0; i < batch && layer.childElementCount < MAGIC_MAX; i++) {
      const p = document.createElement('div');
      p.className = 'magic-particle';
      p.textContent = MAGIC_SYMBOLS[Math.floor(Math.random() * MAGIC_SYMBOLS.length)];

      // Bias spawns toward the lower-centre so magic seems to pour off Gogo,
      // with a few drifting in from the wider floor.
      const centred = Math.random() < 0.7;
      p.style.left = centred
        ? (50 + (Math.random() - 0.5) * 46) + '%'
        : (Math.random() * 100) + '%';
      p.style.bottom = '-20px';

      // Wide size variety: tiny dust through bold stars.
      p.style.fontSize = (10 + Math.random() * 36) + 'px';
      p.style.color = MAGIC_COLORS[Math.floor(Math.random() * MAGIC_COLORS.length)];

      // Per-particle motion variety via CSS vars (see @keyframes magicFloat).
      p.style.setProperty('--dx',   ((Math.random() - 0.5) * 140).toFixed(0) + 'px');
      p.style.setProperty('--dist', (-(140 + Math.random() * 140)).toFixed(0) + 'px');
      p.style.setProperty('--rot',  (120 + Math.random() * 220).toFixed(0) + 'deg');
      p.style.setProperty('--scl',  (0.9 + Math.random() * 0.7).toFixed(2));

      // Two durations: float (3.5–8s) and twinkle (1.1–2.2s).
      const floatDur = 3.5 + Math.random() * 4.5;
      p.style.animationDuration =
        floatDur.toFixed(2) + 's, ' +
        (1.1 + Math.random()).toFixed(2) + 's';

      layer.appendChild(p);
      setTimeout(() => p.remove(), (floatDur + 0.2) * 1000);
    }
  }, 130);
}

function syncLaneCentersToPonds() {
  const centers = computeLaneCentersFromPonds();
  if (!centers.green || !centers.red || !centers.yellow || !centers.pink) return;
  COLORS.forEach((c) => { DESIGN.lanes[c].centerY = centers[c]; });
}

buildPonds();
syncLaneCentersToPonds();
buildStreamBubbles();
buildStreamHighlights();
buildWaterWaveBands();
buildFishCluster();
window.addEventListener('resize', () => {
  syncLaneCentersToPonds();
  buildStreamBubbles();

/* ---------- Banner (title) screen voice-over ----------
   Plays the title narration (audios/Title- THE FISH MIX-UP.ogg) on the start
   screen AUTOMATICALLY, ~0.5s after load — never on a stray tap. Caveat:
   browsers block audible autoplay until the visitor has interacted with the
   site, so this fires wherever autoplay is permitted (e.g. a returning visitor);
   where it's blocked it simply stays silent instead of hijacking the first tap.
   The "Let's Go" tap stops it so the title line never overlaps the tutorial's
   welcome narration. */
const voBanner = document.getElementById('voBanner');
let bannerVoEnded = false;
if (voBanner) voBanner.addEventListener('ended', () => { bannerVoEnded = true; });

function tryPlayBannerVO() {
  if (!voBanner || bannerVoEnded) return;
  if (!startOverlay || startOverlay.classList.contains('hidden')) return;
  try {
    voBanner.muted = false;
    voBanner.volume = 1;
    const p = voBanner.play();
    if (p && p.catch) p.catch(() => { /* autoplay blocked — Let's Go will play it */ });
  } catch (_) { /* audio unavailable */ }
}
// Auto-play the title line ~0.5s after the page loads (no tap required).
setTimeout(tryPlayBannerVO, 500);

startBtn.onclick = () => {
  // Advance immediately so the button always feels responsive — never block
  // the start on the title narration finishing. Stop the title line (if it
  // was playing) so it can't overlap the tutorial's welcome narration.
  try { if (voBanner) voBanner.pause(); } catch (_) {}
  startOverlay.classList.add('hidden');
  primeTutorialVO();        // unlock tutorial narration within this gesture
  startBackgroundMusic();   // start the gameplay loop on this real user gesture
  runTutorial();
};

if (retryBtn) {
  retryBtn.onclick = () => {
    hideGameOverOverlay();
    // Restart from the current level so the player doesn't have to
    // sit through the tutorial again.
    startMainGame(currentLevelIdx);
  };
}

controls.classList.add('hidden');
</script>
</body>
</html>

        drop-shadow(0 14px 22px rgba(0,0,0,.32))
        drop-shadow(0 0 42px rgba(255,225,150,1));
    }
  }

  /* ---- Magical Arabian particles ---- */
  .final-magic-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 5;
    pointer-events: none;
  }
  .magic-particle {
    position: absolute;
    will-change: transform, opacity;
    user-select: none;
    text-shadow:
      0 0 8px rgba(255,255,255,0.9),
      0 0 16px rgba(255,220,110,0.8);
    animation:
      magicFloat linear forwards,
      magicTwinkle ease-in-out infinite;
  }
  @keyframes magicFloat {
    0%   { transform: translate(0,0) rotate(0deg) scale(.45); opacity: 0; }
    14%  { opacity: 1; }
    100% {
      transform:
        translate(var(--dx, 0px), var(--dist, -180px))
        rotate(var(--rot, 220deg))
        scale(var(--scl, 1.15));
      opacity: 0;
    }
  }
  @keyframes magicTwinkle {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.7); }
  }

  @keyframes finalFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* hard-disable any leftover old final/pre-win effects */
  .final-badge,
  .final-awesome,
  .final-celebrate-layer,
  .final-ring,
  .final-confetti,
  .final-droplet,
  .final-star,
  .final-rainbow,
  .final-center-burst,
  .final-pond-grid,
  .final-pond,
  .final-pond-sparkle,
  .final-sparkle,
  .end-fish,
  .final-genie-wrap,
  .final-subtitle,
  .final-titles,
  .final-title,
  .mg-layer,
  .magic-star,
  .magic-moon,
  .magic-gem,
  .pre-win-pond-screen,
  .pre-win-pond,
  .pre-win-fish {
    display: none !important;
  }

  @media (prefers-reduced-motion: reduce) {
    .final-pond-screen,
    .victory-banner,
    .victory-banner::before,
    .victory-ribbon h1,
    .final-light-rays,
    .final-magic-aura,
    .final-genie-floor-glow,
    .final-genie,
    .magic-particle {
      animation: none !important;
    }
    /* With animations off, neutralise the entrance transforms so everything
       sits in its resting (visible, full-size) state. */
    .victory-banner { transform: translateX(-50%); opacity: 1; }
    .victory-ribbon h1 { transform: scale(1); opacity: 1; }
    .final-pond-screen { opacity: 1; }
  }
</style>
</head>
<body>

<!-- Shown only on small screens held in portrait (see .rotate-prompt CSS). -->
<div class="rotate-prompt" id="rotatePrompt" aria-hidden="true">
  <div class="rotate-icon" aria-hidden="true">📱</div>
  <div class="rotate-text">Please rotate your device<br>to play 🐟</div>
</div>

<div class="game" id="game">

  <div class="stream-map" aria-hidden="true"></div>

  <div class="stream-lanes" aria-hidden="true">
    <!-- Animated stream lanes. Loaded via <object> (not <img>) because an SVG
         referenced by <img> renders frozen — its internal CSS wave/bubble
         animation only runs when the SVG is a document/object/inline. -->
    <object class="stream-lane green-stream"  type="image/svg+xml" data="assets/green.svg"  aria-hidden="true"></object>
    <object class="stream-lane red-stream"    type="image/svg+xml" data="assets/red.svg"    aria-hidden="true"></object>
    <object class="stream-lane yellow-stream" type="image/svg+xml" data="assets/yellow.svg" aria-hidden="true"></object>
    <object class="stream-lane pink-stream"   type="image/svg+xml" data="assets/pink.svg"   aria-hidden="true"></object>
  </div>

  <div class="stream-bubbles" id="streamBubbles" aria-hidden="true"></div>
  <div class="water-wave" aria-hidden="true">
    <div class="band green-band"></div>
    <div class="band red-band"></div>
    <div class="band yellow-band"></div>
    <div class="band pink-band"></div>
  </div>

  <div id="streamHighlights" aria-hidden="true"></div>
  <div class="fish-cluster" id="fishCluster" aria-hidden="true"></div>

  <div class="target-boxes" aria-hidden="true">
    <img class="target-box green-box"  src="assets/green-box.svg"  alt="">
    <img class="target-box red-box"    src="assets/red-box.svg"    alt="">
    <img class="target-box yellow-box" src="assets/yellow-box.svg" alt="">
    <img class="target-box pink-box"   src="assets/pink-box.svg"   alt="">
  </div>

  <div class="ponds" id="ponds"></div>

  <img class="ponds-svg hidden" id="pondsSvg" src="assets/ponds.webp" alt="" aria-hidden="true">

  <div class="ocean" id="ocean">
    <div class="ocean-fish-layer" id="oceanFishLayer"></div>
  </div>

  <div class="cinematic-dim hidden" id="cinematicDim" aria-hidden="true"></div>

  <!-- Pre-rendered scene replacements. When a tutorial preset sets
       fullSceneImage, this element loads that SVG/PNG as a 1920×1080
       backdrop that REPLACES the dynamic genie/bubble/ponds composition
       for that single screen. -->
  <div class="full-scene-image hidden" id="fullSceneImage" aria-hidden="true"></div>

  <div class="genie hidden" id="genie"
       style="background-image:url('assets/genie.webp'); width:22%; left:55%; bottom:14%; transform:translateX(-50%);"></div>

  <div class="speech hidden" id="speech">
    <svg class="speech-shape" id="speechShape" aria-hidden="true"><path id="speechPath" d=""></path></svg>
    <div class="thought-text" id="speechText">Welcome!</div>
  </div>

  <div class="wrong-overlay hidden" id="wrongOverlay" aria-hidden="true">
    <div class="wrong-panel" role="img" aria-label="Wrong condition">
      <div class="wrong-panel-fish" id="wrongPanelFish" aria-hidden="true"></div>
      <div class="wrong-panel-text" id="wrongPanelText"></div>
    </div>
  </div>

  <div class="controls hidden" id="controls">
    <button class="btn" id="upBtn"  aria-label="Up"></button>
    <button class="btn" id="downBtn" aria-label="Down"></button>
  </div>

  <div class="hud" id="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Lives: <span id="lives">❤️❤️❤️</span></span>
  </div>

  <div class="level-banner" id="levelBanner">
    <div>Level <span id="levelBannerNum">1</span> &middot; Fish remaining:</div>
    <div class="level-fish-row" id="levelFishRow"></div>
  </div>

  <div class="overlay" id="startOverlay">
    <img class="start-banner" id="startBanner" src="assets/the-fish-mix-up.webp" alt="The Fish Mix-Up" />
    <button class="start-letsgo-btn" id="startBtn" aria-label="Start">
      <img class="start-letsgo" id="startLetsGo" src="assets/lets-go.webp" alt="" aria-hidden="true" />
    </button>
  </div>

  <div class="gameover-overlay hidden" id="gameOverOverlay" aria-label="Game over">
    <h1>Oh no!</h1>
    <p>The fish need your help again.</p>
    <button class="big-btn" id="retryBtn" type="button">Try Again</button>
  </div>

  <!-- Final winning screen: a single fixed full-screen artwork
       (assets/final-screen.webp) IS the pond/fish composition. We only
       overlay Gogo the genie, light Arabian sparkle effects and a title.
       No JS-built ponds/fish, no buttons. -->
  <div class="final-pond-screen hidden" id="finalPondScreen" aria-label="Game complete">
    <img class="final-screen-art" src="assets/final-screen.webp" alt="" aria-hidden="true" loading="lazy" decoding="async">

    <!-- Slow-rotating golden rays behind Gogo — magical reward, not clutter. -->
    <div class="final-light-rays" aria-hidden="true"></div>

    <div class="victory-banner" aria-label="You Did It!">
      <div class="victory-ribbon">
        <h1>You Did It!</h1>
      </div>
    </div>

    <!-- Soft glow behind Gogo's body + a grounding light circle at his feet. -->
    <div class="final-magic-aura" aria-hidden="true"></div>
    <div class="final-genie-floor-glow" aria-hidden="true"></div>

    <img class="final-genie" src="assets/genie.webp" alt="" aria-hidden="true">

    <div class="final-magic-layer" aria-hidden="true"></div>
  </div>

</div>

<!-- Background music: gameplay loop + final-win loop. Placed before the
     inline script so getElementById resolves them at parse time. -->
<!-- Music isn't needed for first paint: bgMusic streams on the first tap
     (preload=metadata = headers only); winMusic is fully lazy (loads only when
     the final screen plays it). Keeps startup light on mobile data. -->
<audio id="bgMusic" preload="metadata" loop playsinline>
  <source src="audios/Desert Fish Parade.mp3" type="audio/mpeg">
</audio>

<audio id="winMusic" preload="none" loop playsinline>
  <source src="audios/Golden Fish Win (1).mp3" type="audio/mpeg">
</audio>

<!-- Tutorial voice-over: one clip per narrated scene. Each is synced with
     its speech bubble's typewriter so the words appear in step with the
     spoken line (see TUTORIAL_VO / sceneTypeOpts). -->
<audio id="voWelcome"      preload="auto" playsinline><source src="audios/vo-welcome.ogg"       type="audio/ogg"></audio>
<audio id="voStreamGuide"  preload="auto" playsinline><source src="audios/vo-stream-guide.ogg"  type="audio/ogg"></audio>
<audio id="voEachStream"   preload="auto" playsinline><source src="audios/vo-each-stream.ogg"   type="audio/ogg"></audio>
<audio id="voLeadsToPond"  preload="auto" playsinline><source src="audios/vo-leads-to-pond.ogg" type="audio/ogg"></audio>
<audio id="voReady"        preload="auto" playsinline><source src="audios/vo-ready.ogg"         type="audio/ogg"></audio>
<audio id="voConfused"     preload="auto" playsinline><source src="audios/vo-confused.ogg"      type="audio/ogg"></audio>
<audio id="voThinking"     preload="auto" playsinline><source src="audios/vo-thinking.ogg"      type="audio/ogg"></audio>
<audio id="voUseButtons"   preload="auto" playsinline><source src="audios/vo-use-buttons.ogg"   type="audio/ogg"></audio>
<audio id="voTapDown"      preload="auto" playsinline><source src="audios/vo-tap-down.ogg"      type="audio/ogg"></audio>
<audio id="voTapUp"        preload="auto" playsinline><source src="audios/vo-tap-up.ogg"        type="audio/ogg"></audio>
<audio id="voPinkCorrect"  preload="auto" playsinline><source src="audios/vo-pink-correct.ogg"  type="audio/ogg"></audio>
<audio id="voGuideCorrect" preload="auto" playsinline><source src="audios/vo-guide-correct.ogg" type="audio/ogg"></audio>
<!-- Gameplay feedback VO: wrong-stream "oops" popup + win-screen cheer. -->
<audio id="voWrong"        preload="auto" playsinline><source src="audios/vo-wrong.ogg"         type="audio/ogg"></audio>
<audio id="voWin"          preload="auto" playsinline><source src="audios/vo-win.ogg"           type="audio/ogg"></audio>
<!-- Title/banner narration: plays on the start (banner) screen. -->
<audio id="voBanner"       preload="auto" playsinline><source src="audios/Title-%20THE%20FISH%20MIX-UP.ogg" type="audio/ogg"></audio>

<script>
/* ===========================================================
   FISH SORTING GAME — locked 1920×1080 design
   =========================================================== */

const COLORS = ['green', 'red', 'yellow', 'pink'];

const FISH_IMG = {
  green:  'assets/fish-green.webp',
  red:    'assets/fish-red.webp',
  yellow: 'assets/fish-yellow.webp',
  pink:   'assets/fish-pink.webp',
};
/* Color-specific art shown inside the "wrong condition" popup. These
   are separate from the in-stream fish art and are framed/composed
   to sit inside the popup card. Filenames contain spaces — quote them. */
const WRONG_FISH_IMG = {
  green:  'assets/wrong-green-fish.webp',
  red:    'assets/wrong-red-fish.webp',
  yellow: 'assets/wrong-yellow-fish.webp',
  pink:   'assets/wrong-pink-fish.webp',
};
/* Per-color animated GIFs — single source of truth for swim/jump
   motion. The GIF plays on its own (browser handles frame timing), so
   there is NO JS-driven frame loop. The GIF is swapped in only while
   the fish is actively jumping/moving and is reverted to the static
   PNG the instant the motion ends, so idle fish never loop the GIF. */
const FISH_JUMP_GIF = {
  green:  'assets/green-fish-anime.webp',

/* Preload jump GIFs into the browser cache at script load. Each GIF is
   multi-MB, and the jump window is only ~480ms — without preload, the
   first jump on a deployed host (Netlify, etc.) usually finishes the
   timer before the GIF has finished downloading, so the animation is
   never visible. Localhost masks this because fetches are instant. */
Object.values(FISH_JUMP_GIF).forEach(src => { const i = new Image(); i.src = src; });

function fishImgPathWithFallback(color) {
  // Every color uses its own fish-<color>.png; no phantom-file fallback
  // needed (the old 'YELLOW FISH.png' primary 404'd on every yellow fish).
  const src = FISH_IMG[color];
  return { primary: src, fallback: src };
}

function applyFishArt(el, color) {
  const { primary, fallback } = fishImgPathWithFallback(color);
  // Gameplay fish use a wrapper + inner <img class="fish-art">. Setting
  // img.src keeps the wrapper's box untouched, so PNG ↔ GIF swaps can
  // never visually shrink or grow the fish.
  const art = el.querySelector && el.querySelector('img.fish-art');
  if (art) {
    art.src = primary;
    if (primary !== fallback) {
      art.onerror = () => { art.onerror = null; art.src = fallback; };
    }
    return;
  }
  el.style.backgroundImage = `url('${primary}')`;
  if (primary === fallback) return;
  const img = new Image();
  img.onload = () => {};
  img.onerror = () => { el.style.backgroundImage = `url('${fallback}')`; };
  img.src = primary;
}

/* ---------- Deterministic ocean fish placement ----------
   left/top are percentages within the ocean strip (not stage). */
// A natural, MIXED-UP school that is also BALANCED top-to-bottom and pushed
// toward the RIGHT, leaving a clear vertical "movement column" on the LEFT (the
// stream-entrance side) for the selected fish to swim into. Same fish count /
// density as before — only the distribution changes.
//   • One fish per horizontal BAND (band = strip-height / count) → no large
//     vertical gaps; the crowd reads full from top to bottom.
//   • LEFT_MIN keeps every fish off the stream-entrance edge, so the leftmost
//     ~17% of the strip stays open (the breathing column).
//   • Random left within each band + a seeded LCG keeps it scattered (never a
//     rigid line) yet identical on every load.
// Two fish are clear when they separate sideways (|Δleft| ≥ W + gap) OR
// vertically (|Δtop| ≥ H + gap). Verified: 0 overlaps, tops span 6→90 with the
// largest vertical gap < 9%, lefts spread 18→76 (no two-column lining).
//
// opts.seed sets the (deterministic) scatter; opts.avoid {l,r,t,b} is an
// optional keep-out rectangle (strip %) that no fish may overlap — used by the
// confused screens to keep the pink leader's bob-zone clear while every other
// parameter (count, width, banding) stays identical, so the crowd DENSITY reads
// the same across every ocean screen.
function generateOceanFish(count, opts) {
  opts = opts || {};
  const W = 24;                 // fish width, % of the ocean strip
  const H = W * 0.2084;         // its rendered height as % of the strip height
  const COLORS = ['red', 'yellow', 'green', 'pink'];
  let seed = opts.seed || 777;  // fixed seed → stable, hand-verified scatter
  const rnd = () => { seed = (Math.imul(seed, 1664525) + 1013904223) >>> 0; return seed / 4294967296; };

  const LEFT_MIN = 17, LEFT_MAX = 100 - W;   // pushed right; left <17% stays clear
  const TOP_MIN = 2,  TOP_MAX = 97 - H;
  const band = (TOP_MAX - TOP_MIN) / count;  // even top-to-bottom coverage
  const av = opts.avoid;
  const inAvoid = (L, T) => av && L < av.r && L + W > av.l && T < av.b && T + H > av.t;
  const clearOf = (L, T) => fish.every(f =>
    Math.abs(f.left - L) >= W + 2 || Math.abs(f.top - T) >= H + 1.6);

  const fish = [];
  for (let i = 0; i < count; i++) {
    let left = LEFT_MIN, top = TOP_MIN + i * band, placed = false;
    // Pass 1: keep the fish inside its own band so coverage stays even.
    for (let t = 0; t < 240 && !placed; t++) {
      const L = +(LEFT_MIN + rnd() * (LEFT_MAX - LEFT_MIN)).toFixed(1);
      const T = +(TOP_MIN + i * band + rnd() * band).toFixed(1);   // jitter within band
      if (inAvoid(L, T) || !clearOf(L, T)) continue;
      left = L; top = T; placed = true;
    }
    // Pass 2 (rare fallback): widen the vertical search but STILL require no
    // overlap and respect the keep-out box, so density never breaks down.
    for (let t = 0; t < 240 && !placed; t++) {
      const L = +(LEFT_MIN + rnd() * (LEFT_MAX - LEFT_MIN)).toFixed(1);
      const T = +(TOP_MIN + rnd() * (TOP_MAX - TOP_MIN)).toFixed(1);
      if (inAvoid(L, T) || !clearOf(L, T)) continue;
      left = L; top = T; placed = true;
    }
    fish.push({ color: COLORS[i % COLORS.length], left, top, width: W });
  }
  return fish;
}

/* ---------- Button press FX ---------- */
function enablePressFX(btn) {
  const down = () => btn.classList.add('pressed');
  const up   = () => btn.classList.remove('pressed');
  btn.addEventListener('pointerdown', down);
  btn.addEventListener('pointerup', up);
  btn.addEventListener('pointercancel', up);
  btn.addEventListener('pointerleave', up);
}

/* ---------- Geometry helpers ---------- */
const LANE_INDEX = { green: 0, red: 1, yellow: 2, pink: 3 };
const LANE_COLOR_BY_INDEX = ['green', 'red', 'yellow', 'pink'];

function laneIndexOfColor(color) { return LANE_INDEX[color]; }
function laneCenterPercent(i)    { return DESIGN.lanes[LANE_COLOR_BY_INDEX[i]].centerY + (DESIGN.lanesYOffset || 0); }

function computeLaneCentersFromPonds() {
  const gameRect = game.getBoundingClientRect();
  const centers = {};
  document.querySelectorAll('.pond').forEach((p) => {
    const color = p.dataset.color;
    const r = p.getBoundingClientRect();
    const cy = ((r.top + r.height / 2) - gameRect.top) / gameRect.height * 100;
    centers[color] = cy;
  });
  return centers;
}

// Flag the bubble with `.multiline` when its text actually wrapped onto more
// than one line (it then gets a touch more vertical padding). Width is handled
// purely by CSS (fit-content + the per-scene max-width cap), so this only deals
// with wrap state. We derive the line count from text height / line height —
// reliable because the old `scrollHeight > clientHeight` test never fired on a
// block that hugs its own content. Call AFTER the words are laid out
// (post-font, post-reflow) so the metrics are real.
function updateSpeechTextLayout() {
  if (!speech || !speechText) return;
  const cs = getComputedStyle(speechText);
  let lineHeight = parseFloat(cs.lineHeight);
  if (!isFinite(lineHeight) || lineHeight <= 0) {
    // line-height:normal → approximate from the font size.
    lineHeight = (parseFloat(cs.fontSize) || 16) * 1.2;
  }
  const lines = Math.round(speechText.scrollHeight / lineHeight);
  speech.classList.toggle('multiline', lines > 1);
}

function positionSpeechAttachedToGenie(anchor) {
  anchor = anchor || {};
  if (genie.classList.contains('hidden')) return;
  if (!game.clientWidth || !game.clientHeight) return;

  // Measured bubble size in stage %.
  const wPct = speech.offsetWidth  / game.clientWidth  * 100;
  const hPct = speech.offsetHeight / game.clientHeight * 100;

  // Genie geometry from its TARGET inline styles (not a mid-glide rect).
  const STAGE_W_OVER_H = 16 / 9;
  const genieLeftPct   = parseFloat(genie.style.left)   || 50;   // center X
  const genieBottomPct = parseFloat(genie.style.bottom) || 14;
  const genieWidthPct  = parseFloat(genie.style.width)  || 34;
  const genieHeightPct = genieWidthPct * STAGE_W_OVER_H;         // aspect-ratio 1
  const genieTopPct    = 100 - genieBottomPct - genieHeightPct;

  // Head fraction for THIS pose (mirrored if the genie is flipped). The pose
  // map is authoritative — fine-tune a scene with anchor.offsetX/offsetY, which
  // shift the whole bubble while the tail stays locked onto the head.
  const pose = GENIE_HEAD[genie.dataset.pose] || GENIE_HEAD.present;
  const flipped = genie.dataset.flip === '1';
  const hfx = flipped ? (1 - pose.x) : pose.x;
  const headX = genieLeftPct + (hfx - 0.5) * genieWidthPct;
  const headY = genieTopPct  + pose.y * genieHeightPct;

  // How far the beak drops below the bubble body — from the same helper the SVG
  // path uses, so the bubble seats correctly over Gogo at every breakpoint.
  const tailReachPx = speechTailDrop();
  const tailReachPct = tailReachPx / game.clientHeight * 100;

  // Seat the bubble so the tail tip pushes ~1.4% INTO the head — close enough
  // that the nose clearly connects to Gogo rather than floating above him.
  const HEAD_OVERLAP = 1.4;
  let left = headX - wPct / 2 + (anchor.offsetX || 0);   // centered over head
  let top  = headY + HEAD_OVERLAP - tailReachPct - hPct + (anchor.offsetY || 0);

  // Keep the whole bubble comfortably on the stage.
  const M = 1.5;
  left = Math.max(M, Math.min(100 - M - wPct, left));
  top  = Math.max(M, Math.min(100 - M - hPct, top));
  speech.style.left = left + '%';
  speech.style.top  = top + '%';

  // Tail x = head position relative to the bubble, clamped so the nose stays on
  // the bubble body (never slides off the rounded corners).
  let tailPct = wPct > 0 ? ((headX - left) / wPct) * 100 : 50;
  tailPct = Math.max(14, Math.min(86, tailPct));
  speech.style.setProperty('--tail-x', tailPct + '%');

  // Angle the nose toward Gogo: when the head sits off to one side (e.g. the
  // bubble was clamped to a screen edge), the straight-down tail would miss
  // him, so we lean the tip from its base on the bubble toward the real head
  // position. atan2(horizontal gap, vertical drop) → degrees, capped so it
  // never looks broken. When the bubble is centered over the head this is ~0.
  const tailBaseXPct = left + (tailPct / 100) * wPct;
  const dxPx = (headX - tailBaseXPct) / 100 * game.clientWidth;
  const dyPx = Math.max(8, tailReachPx);
  let tailRot = Math.atan2(dxPx, dyPx) * 180 / Math.PI;
  tailRot = Math.max(-24, Math.min(24, tailRot));
  speech.style.setProperty('--tail-rot', tailRot.toFixed(1) + 'deg');

  // Redraw the outline to the final box size + beak direction.
  renderSpeechShape();
}

/* ---------- Organic SVG speech bubble ----------
   The visible bubble is ONE continuous <path> redrawn to the live box size, so
   it stays content-sized (never stretched), keeps a constant-width outline
   (non-scaling-stroke), and fuses the beak into the same outline (no seam).
   buildBubblePath traces an organic rounded rectangle (uneven corner radii +
   gently bowed edges) clockwise from the top-left, detouring into the beak on
   the bottom edge. speechTailDrop is the single source of truth for how far the
   beak extends below the body (shared with the genie-seating math above).
   The pointer is a CONSTANT size (speechBeakSize): it never scales with the
   bubble's content width, so it can't stretch on big boxes — it only tracks the
   16:9 stage size, like the outline and padding do. */
function speechBeakSize() {
  // Stage-relative (not viewport) so the beak scales with the 16:9 stage even
  // when it's letterboxed on a wide viewport.
  const u = ((game && game.clientWidth) || window.innerWidth || 1280) / 100;
  return {
    tW:    Math.max(54, Math.min(3.8 * u, 74)),   // beak base width  (~73px @1920)
    tDrop: Math.max(44, Math.min(3.0 * u, 58)),   // beak depth/drop  (~58px @1920)
  };
}
function speechTailDrop() { return speechBeakSize().tDrop; }
function buildBubblePath(W, H, tailCxFrac, tipDX) {
  const s = 7;                            // keep the stroke inside the box
  const x0 = s, y0 = s, x1 = W - s, y1 = H - s;
  const w = x1 - x0, h = y1 - y0;
  const base = Math.min(w, h);
  const r = Math.min(base * 0.50, 64);    // large, soft corners
  const rTL = r * 1.00, rTR = r * 0.82, rBR = r * 1.16, rBL = r * 0.90; // uneven = hand-drawn
  const bowTop  = Math.min(w * 0.017, 13);  // subtle outward bow so edges aren't dead straight
  const bowBot  = Math.min(w * 0.012, 9);
  const bowSide = Math.min(h * 0.040, 14);
  const beak = speechBeakSize();
  const tDrop = beak.tDrop;
  // Constant base width, capped ONLY so it can't run into the corners on a very
  // narrow bubble. Wide bubbles never hit the cap, so the beak no longer grows
  // (and stretches) with the box.
  const tW = Math.min(beak.tW, Math.max(34, w - rBL - rBR - 20));
  let tCx = tailCxFrac * W;
  const lo = x0 + rBL + tW * 0.5 + 8, hi = x1 - rBR - tW * 0.5 - 8;  // keep beak off the corners
  tCx = (lo < hi) ? Math.max(lo, Math.min(hi, tCx)) : (x0 + x1) / 2;
  const tL = tCx - tW / 2, tR = tCx + tW / 2;
  // Tip leans toward Gogo (tipDX from --tail-rot) + a small storybook bias,
  // clamped so the beak can never invert.
  let lean = (tipDX || 0) + tW * 0.08;
  lean = Math.max(-tW * 0.42, Math.min(tW * 0.50, lean));
  const tipX = tCx + lean, tipY = y1 + tDrop;

  let d = `M ${x0} ${y0 + rTL}`;
  d += ` Q ${x0} ${y0} ${x0 + rTL} ${y0}`;                                  // top-left corner
  d += ` Q ${(x0 + rTL + x1 - rTR) / 2} ${y0 - bowTop} ${x1 - rTR} ${y0}`;  // top edge
  d += ` Q ${x1} ${y0} ${x1} ${y0 + rTR}`;                                  // top-right corner
  d += ` Q ${x1 + bowSide} ${(y0 + rTR + y1 - rBR) / 2} ${x1} ${y1 - rBR}`; // right edge
  d += ` Q ${x1} ${y1} ${x1 - rBR} ${y1}`;                                  // bottom-right corner
  d += ` Q ${(x1 - rBR + tR) / 2} ${y1 + bowBot} ${tR} ${y1}`;              // bottom edge → beak
  d += ` L ${tipX} ${tipY}`;                                               // beak right edge → tip
  d += ` L ${tL} ${y1}`;                                                   // beak left edge → base
  d += ` Q ${(tL + x0 + rBL) / 2} ${y1 + bowBot} ${x0 + rBL} ${y1}`;        // bottom edge → corner
  d += ` Q ${x0} ${y1} ${x0} ${y1 - rBL}`;                                  // bottom-left corner
  d += ` Q ${x0 - bowSide} ${(y1 - rBL + y0 + rTL) / 2} ${x0} ${y0 + rTL}`; // left edge
  d += ` Z`;
  return d;
}
function renderSpeechShape() {
  if (!speech) return;
  const svg = document.getElementById('speechShape');
  const path = document.getElementById('speechPath');
  if (!svg || !path) return;
  const W = speech.offsetWidth, H = speech.offsetHeight;
  if (!W || !H) return;
  const cs = getComputedStyle(speech);
  const frac = (parseFloat(cs.getPropertyValue('--tail-x'))  || 72) / 100;
  const rot  = (parseFloat(cs.getPropertyValue('--tail-rot')) || 0) * Math.PI / 180;
  const tipDX = Math.tan(rot) * speechTailDrop();
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  path.setAttribute('d', buildBubblePath(W, H, frac, tipDX));
}

/* ---------- Optimal bubble width ----------
   The dialogue words are inline-block (for the per-word pop), which defeats CSS
   `text-wrap: balance` — so left to itself the text wraps greedily, leaving lone
   "orphan" words and a box wider than the text. fitSpeechWidth instead sizes the
   box FROM the text: it measures the natural one-line width, picks a line count
   proportional to the text length, and binary-searches the SMALLEST width that
   still fits that many lines. The smallest width packs the lines evenly (no
   orphan) and makes the box hug the text (no dead space) — short lines get a
   compact box, long lines an appropriately bigger one, auto-sized per text. */
function speechLineCount() {
  // Count lines from the words' actual vertical positions. (scrollHeight /
  // lineHeight over-counted: the inline-block word spans inflate scrollHeight,
  // so a 1-line bubble read as 2 — which tricked the width search into falling
  // back to the full per-scene cap, leaving the box far wider than the text.)
  const words = speechText.querySelectorAll('.type-word, .pop-word');
  if (words.length) {
    const tops = new Set();
    words.forEach(w => tops.add(Math.round(w.offsetTop)));
    return Math.max(1, tops.size);
  }
  const cs = getComputedStyle(speechText);
  let lh = parseFloat(cs.lineHeight);
  if (!isFinite(lh) || lh <= 0) lh = (parseFloat(cs.fontSize) || 16) * 1.2;
  return Math.max(1, Math.round(speechText.scrollHeight / lh));
}
function fitSpeechWidth(anchor) {
  if (!speech || !speechText) return;
  const stageW = game.clientWidth || window.innerWidth || 1280;
  const cs = getComputedStyle(speech);
  const padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);

  // Forced single-line scenes (anchor.oneLine — short phrases that must never
  // wrap, e.g. "Each stream ...", "... which way to go?", "They seem
  // confused ..."): size the box to EXACTLY the natural one-line text width
  // (+ a few px of slack so a rounding subpixel can't trigger a wrap). The box
  // hugs the text with no dead space and min-width can't pad it out. Every
  // other bubble falls through to the normal auto-size logic below — unchanged.
  if (anchor && anchor.oneLine) {
    // .speech-oneline sets white-space:nowrap on the text, so it physically
    // cannot wrap (no dependence on font-load timing or sub-pixel rounding).
    // fit-content + no cap + min-width:0 makes the box hug exactly the one-line
    // text + padding — no dead space. (padX intentionally unused here.)
    speech.classList.add('speech-oneline');
    speech.style.minWidth = '0px';
    speech.style.maxWidth = 'none';
    speech.style.width = '';
    return;
  }

  // Auto-size every bubble. The small per-scene anchor.width caps forced short
  // phrases ("Each stream ...", "... which way to go?") to wrap; instead keep a
  // line on ONE row until it would pass ~54% of the stage, and only let
  // genuinely long sentences wrap. The box still hugs the text — a one-line
  // line means the box is exactly the text width (no dead space).
  const capContent = Math.max(80, 0.54 * stageW - padX);

  // Save + neutralize constraints so measurement is clean.
  const sMaxW = speech.style.maxWidth, sW = speech.style.width,
        sMinW = speech.style.minWidth, sWS = speechText.style.whiteSpace;
  speech.style.minWidth = '0px';

  // Natural one-line width, then widest single word (the box can't be narrower).
  speech.style.maxWidth = 'none';
  speechText.style.whiteSpace = 'nowrap';
  speech.style.width = 'max-content';
  const oneLine = Math.ceil(speechText.scrollWidth);
  speechText.style.whiteSpace = '';
  speech.style.width = 'min-content';
  const minWord = Math.ceil(speechText.scrollWidth);
  speech.style.width = '';                       // back to CSS fit-content

  // One line until the text would exceed the cap; only then wrap.
  const comfortLine = Math.max(minWord, capContent);
  let N = Math.max(1, Math.ceil(oneLine / comfortLine));
  while (oneLine / N > capContent && N < 6) N++;

  let target;
  if (N <= 1) {
    target = Math.min(oneLine, capContent);
  } else {
    const linesAt = (wPx) => { speech.style.maxWidth = (wPx + padX) + 'px'; return speechLineCount(); };
    let lo = Math.max(minWord, oneLine / N - 4);
    let hi = Math.min(capContent, oneLine);
    if (linesAt(hi) > N) {
      target = hi;                               // cap too tight for N lines → accept the cap
    } else {
      for (let i = 0; i < 9; i++) {              // smallest width that still fits N lines
        const mid = (lo + hi) / 2;
        if (linesAt(mid) <= N) hi = mid; else lo = mid;
      }
      target = Math.min(capContent, hi + 1);     // 1px guard against rounding
    }
  }

  // Restore, then apply the cap as a % so it scales with the stage on resize.
  speechText.style.whiteSpace = sWS || '';
  speech.style.minWidth = sMinW || '';
  speech.style.width = sW || '';
  speech.style.maxWidth = ((Math.ceil(target) + padX) / stageW * 100).toFixed(2) + '%';
}
// During the "But!" solo beat the box hugs just that one word (its width lands
// at the min-width floor — word + padding, no dead space); slideOut() then grows
// it to the sentence. Keeps the dramatic beat without an oversized empty box.
function fitSpeechToHead(headEl, anchor) {
  if (!speech || !headEl) return;
  const stageW = game.clientWidth || window.innerWidth || 1280;
  const cs = getComputedStyle(speech);
  const padX = (parseFloat(cs.paddingLeft) || 0) + (parseFloat(cs.paddingRight) || 0);
  const capPct = (anchor && (anchor.maxWidth != null ? anchor.maxWidth : anchor.width)) || 46;
  const capContent = Math.max(40, Math.min(capPct / 100, 0.46) * stageW - padX);
  const c = Math.min(headEl.offsetWidth || 0, capContent);
  speech.style.maxWidth = ((Math.ceil(c) + padX) / stageW * 100).toFixed(2) + '%';
}
// Safety net: redraw whenever the bubble box changes size for ANY reason
// (text swap, multiline wrap, font load, viewport resize) so the outline always
// matches the box. Setting the path doesn't change .speech's size, so no loop.
if (speech && typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(() => renderSpeechShape()).observe(speech);
}

/* ---------- Stream bubbles ---------- */
function _styleNaturalBubble(b, size, leftPct, topPct, durRange = [5, 5]) {
  b.style.width  = size + '%';
  b.style.height = size + '%';
  b.style.left   = leftPct + '%';
  b.style.top    = topPct + '%';
  const dur = durRange[0] + Math.random() * durRange[1];
  b.style.animationDuration = dur.toFixed(2) + 's';
  b.style.animationDelay    = (-Math.random() * dur).toFixed(2) + 's';
  // Per-bubble sway values (pixels) — keeps each bubble drifting on its
  // own gentle path so the cluster doesn't look mechanical.
  const r = (range) => (Math.random() * range - range / 2).toFixed(1) + 'px';
  b.style.setProperty('--sway-a', r(8));
  b.style.setProperty('--sway-b', r(12));
  b.style.setProperty('--sway-c', r(10));
  b.style.setProperty('--sway-d', r(8));
}

function buildStreamBubbles() {
  streamBubbles.innerHTML = '';
  // 8-12 bubbles total, distributed across all four lanes. Bubbles
  // stay inside the lane band (x: 14%-80%, y: near lane center) so
  // they read as water bubbles in the stream, not background noise.
  const total = 8 + Math.floor(Math.random() * 5);
  for (let k = 0; k < total; k++) {
    const laneIdx = k % COLORS.length;
    const cy = laneCenterPercent(laneIdx);
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 0.5 + Math.random() * 1.1;       // 0.5%-1.6%
    const leftPct = 14 + Math.random() * 66;      // 14%-80%
    const topPct  = cy + (Math.random() * 10 - 3);
    _styleNaturalBubble(b, size, leftPct, topPct, [5, 5]);
    streamBubbles.appendChild(b);
  }
}

/* ---------- Confused fish cluster ---------- */
const fishCluster = document.getElementById('fishCluster');
function buildFishCluster() {
  if (!fishCluster) return;
  fishCluster.innerHTML = '';
  // Only one front pink "leader" fish drifts vertically inside the
  // ocean strip as if undecided which stream to follow. The regular
  // ocean fish stay visible so the ocean reads as consistent across
  // every tutorial screen.
  const front = document.createElement('div');
  front.className = 'cluster-fish front';
  // Inner art holds the sprite + the confused bob, so the wrapper is free to
  // GROW (transform: scale) from the crowd size up — bob and grow never fight.
  const art = document.createElement('div');
  art.className = 'cluster-front-art';
  applyFishArt(art, 'pink');
  front.appendChild(art);
  // The leader stays INSIDE the ocean strip. On the "But! They seem confused"
  // screen it SWIMS IN at its full leader size from the right edge to its bob
  // spot — a pure forward movement, no scaling/grow. Then it bobs. The glide
  // runs in showFishCluster (one frame after it's on screen).
  if (currentSceneName === 'confused') {
    front.style.left  = '92%';          // start: entering from the right edge
    front.style.top   = '38%';          // centred so the bob spans the streams
    front.style.width = '8.8%';
    front.dataset.forwardLeft = '82%';  // glide target: the breathing column
  } else if (currentSceneName === 'thinking') {
    // "... which way to go?" — already out front + full size from the previous
    // scene, so it just keeps bobbing/thinking (no re-emerge, no re-grow).
    front.style.left  = '82%';
    front.style.top   = '38%';
    front.style.width = '8.8%';
  } else {
    front.style.left = '88%';
    front.style.top  = '46%';
    front.style.width = '8.8%';
  }
  fishCluster.appendChild(front);
}
function showFishCluster() {
  if (!fishCluster) return;
  // Rebuild every time so the leader picks up the current scene's layout
  // (the confused screens place it differently than the default).
  buildFishCluster();
  fishCluster.classList.add('show');
  const front = fishCluster.querySelector('.cluster-fish.front');
  if (!front) return;
  const target = front.dataset.forwardLeft;
  const grow   = front.dataset.grow === '1';
  if (!target && !grow) return;
  // One frame after it's on screen: glide forward (left) into the stream. The
  // bob runs on the inner art, so it keeps bobbing throughout. (The optional
  // grow path below is retained but no scene enables it — the leader swims in
  // at a constant full size, no upscaling.)
  const START_SCALE = 0.49;
  const EMERGE_MS = 1700;                                  // slower, more graceful emerge
  const EMERGE_EASE = 'cubic-bezier(.22, .61, .36, 1)';    // gentle ease-out (smooth decel)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (target) {
      front.style.transition = `left ${EMERGE_MS}ms ${EMERGE_EASE}`;
      front.style.left = target;
    }
    if (grow && front.animate) {
      front.animate(
        [{ transform: `scale(${START_SCALE})` }, { transform: 'scale(1)' }],
        { duration: EMERGE_MS, easing: EMERGE_EASE, fill: 'forwards' }
      );
      front.style.transform = 'scale(1)';
    }
  }));
}
function hideFishCluster() {
  if (!fishCluster) return;
  fishCluster.classList.remove('show');
}

const bgMusic = document.getElementById('bgMusic');
const winMusic = document.getElementById('winMusic');

/* ---------- Tutorial voice-over (synced narration) ----------
   Spoken lines that play alongside a tutorial speech bubble. The bubble's
   typewriter pace and the scene's hold are derived from the VO's real
   duration (see showAuto), so the words land with the voice. */
const TUTORIAL_VO = {
  welcome:      document.getElementById('voWelcome'),
  streamGuide:  document.getElementById('voStreamGuide'),
  eachStream:   document.getElementById('voEachStream'),
  leadsToPond:  document.getElementById('voLeadsToPond'),
  ready:        document.getElementById('voReady'),
  confused:     document.getElementById('voConfused'),
  thinking:     document.getElementById('voThinking'),
  useButtons:   document.getElementById('voUseButtons'),
  tapDown:      document.getElementById('voTapDown'),
  tapUp:        document.getElementById('voTapUp'),
  pinkCorrect:  document.getElementById('voPinkCorrect'),
  guideCorrect: document.getElementById('voGuideCorrect'),
  wrong:        document.getElementById('voWrong'),
  win:          document.getElementById('voWin')
};
// Fallback durations (ms) used only if the browser hasn't decoded the
// audio metadata yet (duration is NaN before the file finishes loading).
// Measured from the source files.
const TUTORIAL_VO_FALLBACK_MS = {
  welcome: 3160,
  streamGuide: 5198,
  eachStream: 1855,
  leadsToPond: 1933,
  ready: 3762,
  confused: 2939,
  thinking: 2038,
  useButtons: 2926,
  tapDown: 2534,
  tapUp: 2168,
  pinkCorrect: 3527,
  guideCorrect: 2638,
  wrong: 2534,
  win: 3056
};

function voDurationMs(name) {
  const el = TUTORIAL_VO[name];
  if (el && isFinite(el.duration) && el.duration > 0) return el.duration * 1000;
  return TUTORIAL_VO_FALLBACK_MS[name] || 2500;
}
// Build the typewriter options for a scene's voice-over. The clip itself is
// started by typeSpeechText at the instant typing begins (so audio and text
// are coincident); `vo` lets the typewriter lock its reveal to the live
// playback position, and `totalMs` is the timed-typing fallback length used
// only if playback is blocked. Returns undefined for VO-less scenes.
function sceneTypeOpts(scene) {
  if (!scene || !scene.vo) return undefined;
  const voMs = voDurationMs(scene.vo);
  // scene.typeLead (optional) overrides VO_TYPE_LEAD for THIS scene only — a
  // smaller value reveals the words faster (used where the voice ran ahead).
  return { vo: scene.vo, totalMs: Math.max(600, voMs - 250), lead: scene.typeLead };
}
// Wait until the named VO has finished playing, then a short tail. Reads the
// live playback position, so it's correct whether the typewriter already
// consumed most of the VO (normal) or finished instantly (reduced motion).
async function waitForVoTail(name, tailMs) {
  const el = TUTORIAL_VO[name];
  if (el && !el.paused && isFinite(el.duration) && el.duration > 0) {
    const remaining = (el.duration - el.currentTime) * 1000;
    if (remaining > 0) await delay(remaining);
  }
  await delay(tailMs);
}
function playTutorialVO(name) {
  const el = TUTORIAL_VO[name];
  if (!el) return;
  // Stop any other narration first so two lines can never overlap.
  Object.keys(TUTORIAL_VO).forEach(other => {
    if (other === name) return;
    const o = TUTORIAL_VO[other];
    if (o && !o.paused) { try { o.pause(); o.currentTime = 0; } catch (_) {} }
  });
  try {
    el.muted = false;
    el.volume = 1;
    try { el.currentTime = 0; } catch (_) { /* metadata not ready yet */ }
    const p = el.play();
    if (p && p.catch) p.catch(() => { /* autoplay still locked — typewriter runs solo */ });
  } catch (_) { /* audio unavailable */ }
}
// Unlock the VO elements inside a direct user gesture (the start tap), so
// the later, await-separated play() calls aren't blocked by the browser's
// autoplay policy. Plays each muted for a beat, then resets.
function primeTutorialVO() {
  Object.keys(TUTORIAL_VO).forEach(name => {
    const el = TUTORIAL_VO[name];
    if (!el) return;
    try {
      el.muted = true;
      const p = el.play();
      const reset = () => { try { el.pause(); el.currentTime = 0; el.muted = false; } catch (_) {} };
      if (p && p.then) p.then(reset).catch(() => { el.muted = false; });
      else reset();
    } catch (_) { /* audio unavailable */ }
  });
}

// Soft, child-friendly gameplay level (18%–24% band).
const BG_VOLUME = 0.22;
// Slightly louder so the win track feels more exciting and rewarding.
const WIN_VOLUME = 0.32;

let musicStarted = false;

// Browsers block autoplay until the user interacts. The gameplay loop is
// kicked off from the "Let's Go" tap (a real user gesture — see startBtn
// below), so a stray tap on the title screen no longer starts the music.
function startBackgroundMusic() {
  if (musicStarted || !bgMusic) return;
  musicStarted = true;
  bgMusic.volume = BG_VOLUME;
  bgMusic.play().catch(() => { musicStarted = false; });
}

// (Music now starts on the "Let's Go" tap — see startBtn.onclick below.)

let winFadeTimer = null;

// Smooth crossfade from the gameplay loop to the win loop — no abrupt cut.
async function transitionToWinMusic() {
  if (!bgMusic || !winMusic) return;

  // If a fade is already in flight, cancel it so volumes don't fight.
  if (winFadeTimer) { clearInterval(winFadeTimer); winFadeTimer = null; }

  winMusic.currentTime = 0;
  winMusic.volume = 0;

  try {
    await winMusic.play();
  } catch (_) { /* autoplay may still be blocked — fade is a no-op then */ }

  const startBg = bgMusic.volume; // fade from wherever bg currently sits
  const duration = 1200;
  const steps = 24;
  const interval = duration / steps;
  let current = 0;

  winFadeTimer = setInterval(() => {
    current++;
    const progress = current / steps;
    bgMusic.volume = Math.max(0, startBg * (1 - progress));
    winMusic.volume = Math.min(WIN_VOLUME, WIN_VOLUME * progress);

    if (current >= steps) {
      clearInterval(winFadeTimer);
      winFadeTimer = null;
      bgMusic.pause();
      bgMusic.volume = BG_VOLUME; // reset for any future replay
      winMusic.volume = WIN_VOLUME;
    }
  }, interval);
}

// On replay/restart, fade the win track back out and return to the
// gameplay loop so the two never overlap.
function resumeGameplayMusic() {
  if (!bgMusic) return;
  if (winFadeTimer) { clearInterval(winFadeTimer); winFadeTimer = null; }

  winMusic?.pause();
  if (winMusic) winMusic.volume = WIN_VOLUME;

  // Only (re)start gameplay music if the user has already unlocked audio.
  if (!musicStarted) return;
  bgMusic.volume = BG_VOLUME;
  bgMusic.play().catch(() => {});
}

// Pause music when tab is hidden; resume the correct track when it returns.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    bgMusic?.pause();
    winMusic?.pause();
  } else if (!musicStarted) {
    // User never interacted yet — don't force playback.
  } else if (finalPondScreen && !finalPondScreen.classList.contains('hidden')) {
    winMusic?.play().catch(() => {});
  } else {
    bgMusic?.play().catch(() => {});
  }
});

/* ---------- Utility ---------- */
const delay = ms => new Promise(r => setTimeout(r, ms));
const nextFrame = () => new Promise(r => requestAnimationFrame(() => r()));

/* ---------- Genie / Speech preset application ---------- */
let activeSpeechTypeToken = 0;
let activeSpeechDone = Promise.resolve();
const PUNCT_PAUSE_MS = 180;

// Reveal `text` in lock-step with a voice-over's REAL playback position:
// characters shown = (audio.currentTime / duration) of the way through the
// line. Because it reads the live clock every frame, the text can't drift
// from the voice even if playback starts late or buffers mid-clip. The whole
// line is mapped into the first `LEAD` of the clip so the final word lands a
// beat before the voice trails off (natural, not abrupt).
//
// Resolves true once the line is fully shown; resolves false if the audio
// never actually started (autoplay blocked) so the caller can fall back to
// plain timed typing and the words still appear.
const VO_TYPE_LEAD = 0.92;  // word reveal pace vs the voice. <1 reveals a touch
                            // ahead (compensates for the clip's trailing silence
                            // so words keep up with the voice). Tuned by feel:
                            // 0.90 ran ahead (audio felt delayed); 0.95/1.0 lagged
                            // behind the voice; 0.92 keeps the words on the voice.
// Render each word as a <span class="type-word"> (spaces kept as text nodes,
// newlines as <br>). Every word reserves its space immediately (CSS hides it
// at opacity 0) so the line never reflows; adding `.in` springs the word in.
function buildWordSpans(targetEl, text) {
  targetEl.textContent = '';
  const spans = [];
  const re = /(\S+)(\s*)/g;
  let m;
  while ((m = re.exec(text))) {
    const w = document.createElement('span');
    w.className = 'type-word';
    w.textContent = m[1];
    targetEl.appendChild(w);
    spans.push(w);
    const nl = (m[2].match(/\n/g) || []).length;
    if (nl) for (let i = 0; i < nl; i++) targetEl.appendChild(document.createElement('br'));
    else if (m[2]) targetEl.appendChild(document.createTextNode(' '));
  }
  return spans;
}
function revealWords(spans, k) { for (let i = 0; i < k && i < spans.length; i++) spans[i].classList.add('in'); }

// Comfortable Grade-1 fallback pace, used only when no VO is playing. With a
// VO the reveal follows the narrator's own pace (below), which is naturally
// age-appropriate.
const GRADE1_WORD_MS = 360;
const GRADE1_MIN_WORD_MS = 150;

// Reveal pre-built `spans` WORD BY WORD in lock-step with audioEl's live
// playback position, so each word lands as it's spoken. Resolves true once
// fully shown; false if audio never started (caller falls back to a timer).
function revealSpansByAudio(spans, audioEl, voName, cancelled, lead) {
  const L = lead || VO_TYPE_LEAD;   // per-scene pace override (smaller = faster)
  return new Promise(resolve => {
    const words = spans.length;
    let started = false;
    const startedAt = Date.now();
    const onEnded = () => { if (!cancelled()) revealWords(spans, words); cleanup(); resolve(true); };
    const cleanup = () => audioEl.removeEventListener('ended', onEnded);
    audioEl.addEventListener('ended', onEnded);

    const tick = () => {
      if (cancelled()) { cleanup(); resolve(true); return; }
      if (!audioEl.paused && audioEl.currentTime > 0) started = true;
      // Audio never began within the grace window — let the caller fall back.
      if (!started) {
        if (Date.now() - startedAt > 450) { cleanup(); resolve(false); return; }
        requestAnimationFrame(tick);
        return;
      }
      const dur = (isFinite(audioEl.duration) && audioEl.duration > 0)
        ? audioEl.duration : voDurationMs(voName) / 1000;
      // Linear time through the clip, scaled by the lead so words finish a beat early.
      const t = dur > 0 ? Math.min(1, (audioEl.currentTime / dur) / L) : 0;
      // First half tracks the voice 1:1 (already well-synced). The SECOND half is
      // eased so the words reveal a touch faster and don't trail the narrator as
      // the line finishes. Continuous at the midpoint (both branches pass 0.5).
      const prog = t <= 0.5 ? t
        : 0.5 + (1 - Math.pow(1 - (t - 0.5) / 0.5, 1.8)) * 0.5;
      revealWords(spans, Math.round(prog * words));
      if (prog >= 1 || audioEl.ended) { revealWords(spans, words); cleanup(); resolve(true); return; }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

// Orchestrate a word-by-word reveal of `spans`: VO-synced when the clip plays,
// else a comfortable timed cadence. `voName` may be null. The caller STARTS the
// VO so audio + text begin together.
async function playWordReveal(spans, voName, totalMs, cancelled, lead) {
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) { revealWords(spans, spans.length); return; }
  const voEl = voName ? TUTORIAL_VO[voName] : null;
  if (voEl) {
    const ok = await revealSpansByAudio(spans, voEl, voName, cancelled, lead);
    if (cancelled() || ok) return;            // done (or superseded)
    // audio was blocked — fall through to the timed cadence below
  }
  const words = spans.length;
  let msPerWord = GRADE1_WORD_MS;
  if (totalMs && words) msPerWord = Math.max(GRADE1_MIN_WORD_MS, totalMs / words);
  for (let k = 0; k < words; k++) {
    if (cancelled()) return;
    spans[k].classList.add('in');
    const last = spans[k].textContent.slice(-1);
    await delay(msPerWord + ('.!?,'.includes(last) ? PUNCT_PAUSE_MS : 0));
  }
}
// Fire a one-shot pop on a single element via inline animation (re-triggerable:
// clear, reflow, set). `entrance` springs it in from small; otherwise it pulses.
function popEl(el, entrance) {
  el.style.opacity = '1';
  el.style.animation = 'none';
  void el.offsetWidth; // reflow so the animation can replay
  el.style.animation = (entrance ? 'wordPop' : 'wordPulse') + ' 360ms cubic-bezier(.34,1.6,.5,1)';
}

// Welcome mode: ONE word that pops `count` times on the VO's spoken beats.
async function playRepeatWordReveal(span, voName, count, totalMs, cancelled) {
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduceMotion) { span.style.opacity = '1'; return; }
  // Beats spread across the clip (front-of-each-spoken-word, finishing early).
  const beats = [];
  for (let i = 0; i < count; i++) beats.push((i + 0.4) / count * 0.85);
  const voEl = voName ? TUTORIAL_VO[voName] : null;
  if (voEl) {
    const ok = await new Promise(resolve => {
      let fired = 0, started = false; const t0 = Date.now();
      const onEnded = () => { while (fired < count) { popEl(span, fired === 0); fired++; } cleanup(); resolve(true); };
      const cleanup = () => voEl.removeEventListener('ended', onEnded);
      voEl.addEventListener('ended', onEnded);
      const tick = () => {
        if (cancelled()) { cleanup(); resolve(true); return; }
        if (!voEl.paused && voEl.currentTime > 0) started = true;
        if (!started) { if (Date.now() - t0 > 450) { cleanup(); resolve(false); return; } requestAnimationFrame(tick); return; }
        const dur = (isFinite(voEl.duration) && voEl.duration > 0) ? voEl.duration : voDurationMs(voName) / 1000;
        const prog = voEl.currentTime / dur;
        while (fired < beats.length && prog >= beats[fired]) { popEl(span, fired === 0); fired++; }
        if (fired >= beats.length || prog >= 1 || voEl.ended) { span.style.opacity = '1'; cleanup(); resolve(true); return; }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    });
    if (cancelled() || ok) return;
  }
  const gap = (totalMs && count) ? Math.max(300, totalMs / count) : 650;
  for (let i = 0; i < count; i++) { if (cancelled()) return; popEl(span, i === 0); await delay(gap); }
}

// Confused mode: pop "But!", glide it left & fade, then reveal the rest of the
// sentence word-by-word over the remaining VO.
async function playButThenSentence(butEl, spans, voName, totalMs, cancelled, onRegrow) {
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const dropHead = () => { const h = butEl && butEl.parentNode; if (h && h.remove) h.remove(); };
  const grow = () => { if (onRegrow) onRegrow(); };   // box: "But!" → full sentence
  if (reduceMotion) { grow(); dropHead(); revealWords(spans, spans.length); return; }
  const SPLIT = 0.27;            // fraction of the clip where "But!" hands off
  const END = 0.95;              // sentence finishes a touch before the voice
  popEl(butEl, true);
  let slid = false;
  const slideOut = () => {
    if (slid) return; slid = true;
    butEl.style.animation = 'butOut 420ms ease forwards';
    setTimeout(dropHead, 460);
    grow();                      // grow the box to the sentence as it reveals
  };
  const voEl = voName ? TUTORIAL_VO[voName] : null;
  if (voEl) {
    const ok = await new Promise(resolve => {
      let started = false; const t0 = Date.now();
      const onEnded = () => { slideOut(); revealWords(spans, spans.length); cleanup(); resolve(true); };
      const cleanup = () => voEl.removeEventListener('ended', onEnded);
      voEl.addEventListener('ended', onEnded);
      const tick = () => {
        if (cancelled()) { cleanup(); resolve(true); return; }
        if (!voEl.paused && voEl.currentTime > 0) started = true;
        if (!started) { if (Date.now() - t0 > 450) { cleanup(); resolve(false); return; } requestAnimationFrame(tick); return; }
        const dur = (isFinite(voEl.duration) && voEl.duration > 0) ? voEl.duration : voDurationMs(voName) / 1000;
        const prog = voEl.currentTime / dur;
        if (prog >= SPLIT) {
          slideOut();
          const p2 = Math.min(1, (prog - SPLIT) / (END - SPLIT));
          revealWords(spans, Math.round(p2 * spans.length));
        }
        if (prog >= 1 || voEl.ended) { revealWords(spans, spans.length); cleanup(); resolve(true); return; }
        requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    });
    if (cancelled() || ok) return;
  }
  // Timed fallback (no audio).
  await delay(700); if (cancelled()) return; slideOut(); await delay(220);
  for (let k = 0; k < spans.length; k++) { if (cancelled()) return; spans[k].classList.add('in'); await delay(GRADE1_WORD_MS); }
}

// Wrong-condition popup line — its own token so it never collides with the
// genie speech reveal. Revealed LINE BY LINE in step with the "oops" VO: the
// leading "Oops!" pops in first, then the rest of the sentence ("Not the
// correct stream.") follows a short beat later — a quick one-two that matches
// how the narrator says it, instead of the whole line appearing at once. All
// word spans are built up front so the box reserves its full size and nothing
// reflows when the second line arrives. Words within a line still pop together.
let wrongTypeToken = 0;
const WRONG_LINE_GAP_MS = 700;   // "Oops!" beat before the sentence
function typeWrongPanelText(text) {
  const el = wrongPanelText;
  if (!el) return;
  const token = ++wrongTypeToken;
  el.textContent = '';
  const lines = text.split('\n');
  const lineGroups = lines.map((line, li) => {
    const words = line.split(/\s+/).filter(Boolean);
    const group = words.map((word, wi) => {
      const w = document.createElement('span');
      w.className = 'type-word';
      w.textContent = word;
      el.appendChild(w);
      if (wi < words.length - 1) el.appendChild(document.createTextNode(' '));
      return w;
    });
    if (li < lines.length - 1) el.appendChild(document.createElement('br'));
    return group;
  });
  lineGroups.forEach((group, li) => {
    const show = () => { if (token === wrongTypeToken) group.forEach(s => s.classList.add('in')); };
    if (li === 0) show();
    else setTimeout(show, li * WRONG_LINE_GAP_MS);
  });
}
function waitForSpeechDone() {
  return activeSpeechDone;
}

/* Single locked genie width — every scene renders the genie at this
   exact size, so the character never grows or shrinks between scenes.
   Per-scene preset.width is ignored on purpose. */
const GENIE_WIDTH = 34;
function setGenieFromPreset(preset) {
  if (!preset) { hideGenie(); return; }
  genie.classList.remove('hidden');
  genie.classList.remove('fading');
  genie.style.backgroundImage = `url('${GENIE[preset.pose]}')`;
  genie.style.left   = preset.left + '%';
  const bottomBoost = (game.classList.contains('tutorial') && preset.bottom < 20) ? 3 : 0;
  genie.style.bottom = (preset.bottom + bottomBoost) + '%';
  genie.style.width  = GENIE_WIDTH + '%';
  const flip = !!preset.flip;
  genie.style.transform = `translateX(-50%) ${flip ? 'scaleX(-1)' : ''}`.trim();
  genie.classList.toggle('bounce', !!preset.bounce);
  // Remember pose + flip so positionSpeechAttachedToGenie can aim the tail at
  // THIS pose's head (each genie art has its head in a different spot).
  genie.dataset.pose = preset.pose || '';
  genie.dataset.flip = flip ? '1' : '0';
}
function hideGenie() { genie.classList.add('hidden'); genie.classList.remove('fading'); }

/* ---------- Smooth tutorial scene transitions ----------
   Two small helpers used by the auto-narration loop so EVERY scene
   change reads as continuous: Gogo glides to his new spot (his .genie
   CSS transition does the gliding), and the speech bubble fades out /
   pops in instead of snapping. Tail anchoring is untouched — the bubble
   is only (re)positioned by positionSpeechAttachedToGenie(). */
const GENIE_GLIDE_MS = 500; // matches the .genie left/bottom/width transition

// Fade the current speech bubble away gently (Gogo stays on stage).
async function fadeOutSpeechSmooth() {
  if (speech.classList.contains('hidden')) return;
  activeSpeechTypeToken++;            // halt any in-flight typewriter
  speech.classList.add('soft-out');
  await delay(260);
  speech.classList.add('hidden');
  speech.classList.remove('soft-out', 'oops');
}

// Pop the scene's bubble in, anchored to wherever Gogo has settled.
function transitionSpeechToPreset(scene, typeOpts) {
  if (!scene) return;
  // setSpeechFromPreset now owns positioning (it must measure the bubble only
  // after the words are laid out), so the anchor is passed straight in.
  setSpeechFromPreset(scene.speech, typeOpts, scene.bubbleAnchor);
}

/* Vanish the genie AND the thought-bubble together. Both elements get
   the `.guide-vanish` class at the same moment so they fade and lift
   off in lockstep (500ms). Used at the end of every tutorial scene
   that needs a clean transition before the next interaction. */
async function vanishTutorialGuide() {
  const genieVisible  = !genie.classList.contains('hidden');
  const speechVisible = !speech.classList.contains('hidden');
  if (!genieVisible && !speechVisible) return;

  if (genieVisible)  genie.classList.add('guide-vanish');
  if (speechVisible) speech.classList.add('guide-vanish');
  // Kill any in-flight typewriter so the bubble doesn't keep typing
  // through its vanish frame.
  activeSpeechTypeToken++;

  await delay(500);

  if (genieVisible) {
    genie.classList.add('hidden');
    genie.classList.remove('guide-vanish');
    genie.classList.remove('fading');
  }
  if (speechVisible) {
    speech.classList.add('hidden');
    speech.classList.remove('guide-vanish');
    speech.classList.remove('oops');
  }
}

function setSpeechFromPreset(preset, typeOpts, anchor) {
  if (!preset) { hideSpeech(); return; }
  const token = ++activeSpeechTypeToken;
  speech.classList.remove('hidden', 'oops', 'flip', 'but-solo', 'speech-oneline');
  // Drop any leftover "But!" overlay from a previous confused scene.
  speech.querySelectorAll('.speech-head').forEach(e => e.remove());
  // Content-sized bubble: a generous max-width cap (per-scene override via
  // anchor.width) stops long lines from spanning the whole stage while short
  // lines hug their text. Presets express this cap as bubbleAnchor.width (a few
  // legacy ones used maxWidth); honor either. Clear any stale fixed width so
  // fit-content can re-measure from scratch.
  speech.style.width = '';
  speech.style.minWidth = '';   // clear any inline min-width left by a forced one-line scene
  const widthCapPct = (anchor && (anchor.maxWidth != null ? anchor.maxWidth : anchor.width)) || 46;
  speech.style.maxWidth = widthCapPct + '%';

  const cancelled = () => token !== activeSpeechTypeToken;
  const voName = typeOpts && typeOpts.vo;
  const totalMs = typeOpts && typeOpts.totalMs;
  const lead = typeOpts && typeOpts.lead;   // per-scene word-reveal pace (optional)
  const mode = preset.textMode || 'normal';

  // Build the content NOW so the bubble is at full size when measured, and
  // pick the reveal routine for this scene's text mode.
  let reveal;
  let headEl = null;            // the leading "But!" word, for the butThenSentence fit
  if (mode === 'repeatSingleWord') {
    // One word, sized to itself; it pops repeatCount times on the VO beats.
    speechText.textContent = '';
    const span = document.createElement('span');
    span.className = 'pop-word';
    span.textContent = preset.text;
    span.style.opacity = '0';
    speechText.appendChild(span);
    const count = preset.repeatCount || 3;
    reveal = () => playRepeatWordReveal(span, voName, count, totalMs, cancelled);
  } else if (mode === 'butThenSentence') {
    // "But!" gets a solo beat in a box hugging just that word; at the hand-off
    // (slideOut) the box GROWS to the sentence, so neither state has dead space.
    const parts = preset.text.match(/^(\S+)\s+([\s\S]+)$/);
    const head = parts ? parts[1] : preset.text;
    const rest = parts ? parts[2] : '';
    const spans = buildWordSpans(speechText, rest);
    const headWrap = document.createElement('div');
    headWrap.className = 'speech-head';
    const but = document.createElement('span');
    but.className = 'pop-word';
    but.textContent = head;
    but.style.opacity = '0';
    headWrap.appendChild(but);
    speech.appendChild(headWrap);
    headEl = but;
    const regrow = () => {                       // grow box from "But!" to the sentence
      if (cancelled()) return;
      speech.classList.remove('but-solo');       // unclip the sentence
      fitSpeechWidth(anchor);
      updateSpeechTextLayout();
      positionSpeechAttachedToGenie(anchor);     // re-center (symmetric grow) + redraw
    };
    reveal = () => playButThenSentence(but, spans, voName, totalMs, cancelled, regrow);
  } else {
    const spans = buildWordSpans(speechText, preset.text);
    reveal = () => playWordReveal(spans, voName, totalMs, cancelled, lead);
  }

  // Forced single-line scenes: set nowrap + an uncapped hugging box NOW, before
  // the async measure pass — so it holds even if the webfont is slow (no
  // dependence on fonts.ready). butThenSentence does this later (on regrow), so
  // the "But!" beat keeps its own small box first.
  if (anchor && anchor.oneLine && mode !== 'butThenSentence') {
    speech.classList.add('speech-oneline');
    speech.style.minWidth = '0px';
    speech.style.maxWidth = 'none';
    speech.style.width = '';
  }

  activeSpeechDone = (async () => {
    await nextFrame();
    await nextFrame();
    // Wait for the webfont so measurement uses real glyph metrics, else the
    // tail/position would be computed against fallback-font sizing.
    if (document.fonts && document.fonts.status !== 'loaded') { try { await document.fonts.ready; } catch (_) {} }
    if (cancelled()) return;
    // Size the box to the text (balanced wrap). For butThenSentence the box
    // first hugs "But!"; it grows to the sentence at slideOut (see regrow).
    if (mode === 'butThenSentence' && headEl) { speech.classList.add('but-solo'); fitSpeechToHead(headEl, anchor); }
    else fitSpeechWidth(anchor);
    updateSpeechTextLayout();
    positionSpeechAttachedToGenie(anchor);
    // Start the VO here so audio + text begin together, then run the reveal.
    if (voName) playTutorialVO(voName);
    await reveal();
  })();
}
function hideSpeech() {
  activeSpeechTypeToken++;
  speech.classList.add('hidden');
  speech.classList.remove('oops', 'but-solo', 'speech-oneline');
  speech.querySelectorAll('.speech-head').forEach(e => e.remove());
}

/* ---------- Ocean ---------- */
function showOcean() {
  oceanFishLayer.innerHTML = '';
  const positions = isConfusedScene()
    ? CONFUSED_OCEAN_FISH_POSITIONS
    : OCEAN_FISH_POSITIONS;
  positions.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'ocean-fish';
    wrap.dataset.color = p.color;   // lets the round intro promote a matching crowd fish
    wrap.style.width = p.width + '%';
    wrap.style.left  = p.left + '%';
    wrap.style.top   = p.top + '%';

    const art = document.createElement('div');
    art.className = 'ocean-fish-art';
    applyFishArt(art, p.color);
    art.style.animationDelay = (-Math.random() * 3.6).toFixed(2) + 's';
    wrap.appendChild(art);
    oceanFishLayer.appendChild(wrap);
  });
  buildOceanBubbles();
  ocean.classList.add('show');
}
function hideOcean() { ocean.classList.remove('show'); }

/* ---------- Fish ---------- */
function spawnFish(color, laneIndex, startLeftPct = 100) {
  const fish = document.createElement('div');
  fish.className = 'fish float';
  fish.dataset.color = color;
  fish.dataset.lane  = laneIndex;
  fish.dataset.spawnLeft = String(startLeftPct);
  fish.dataset.animState = 'idle';
  // Inner <img> holds the actual sprite. Keeping the art in a child
  // element means the .fish wrapper's box stays constant when the art
  // is swapped between the idle PNG and the jump GIF.
  const art = document.createElement('img');
  art.className = 'fish-art';
  art.alt = '';
  art.draggable = false;
  fish.appendChild(art);
  applyFishArt(fish, color);
  positionFishInLane(fish, laneIndex, { animate: false });
  fish.style.left = startLeftPct + '%';
  fish.style.animationDelay = (-Math.random() * 2).toFixed(2) + 's';
  game.appendChild(fish);
  return fish;
}

/* Tracks the in-flight GIF swap per fish so we can wait for BOTH the
   GIF window and the motion tween before restoring the static PNG.
   Per-fish — every fish has its OWN swap state. */
const _gifSwaps = new WeakMap();

/* ---------- Fish animation state ----------
   Every fish carries `fish.dataset.animState` ∈ {idle, jumping, success, wrong}.
   GIF is ONLY active while animState === 'jumping' or 'success'. The
   moment that state ends, the fish reverts to its static PNG so the
   GIF never loops forever in place. */
function setFishIdle(fish) {
  const color = fish.dataset.color;
  fish.dataset.animState = 'idle';
  fish.classList.remove('jump-mode');
  // applyFishArt() targets the inner <img class="fish-art">, so only
  // the sprite src changes — the wrapper's size, transform, and
  // object-fit stay exactly the same. No background-size jitter.
  applyFishArt(fish, color);
  fish.style.transform = '';
}
function setFishJumpGif(fish) {
  // Swap the static PNG for the per-color animated GIF on the inner
  // <img> only. The .fish wrapper keeps its CSS-locked width (11.2%)
  // and aspect-ratio, and the inner <img> uses object-fit: contain at
  // 100%/100%, so the visible bounding box is identical to the PNG —
  // a GIF with different internal canvas padding can no longer shrink
  // the fish. Clear-then-reassign restarts the GIF from frame 0 while
  // still reusing the cached file (a ?t= cache-buster would re-download
  // the multi-MB GIF every jump and miss the 480ms jump window on
  // deployed hosts).
  const color = fish.dataset.color;
  fish.classList.add('jump-mode');
  fish.dataset.animState = 'jumping';
  const gif = FISH_JUMP_GIF[color];
  const art = fish.querySelector('img.fish-art');
  if (gif && art) {
    art.src = '';
    art.src = gif;
  }
}

/* Drive the jump window. Static PNG is kept the whole time so the
   fish renders at a consistent size; transform animation handles the
   visible motion. When the window closes, restore idle if motion is
   also done. */
function _playJumpAnim(fish, durationMs) {
  const prior = _gifSwaps.get(fish);
  if (prior && prior.timer) clearTimeout(prior.timer);

  setFishJumpGif(fish);

  const handle = {};
  handle.timer = setTimeout(() => {
    if (_gifSwaps.get(fish) !== handle) return;
    _gifSwaps.delete(fish);
    if (fish.dataset.motionDone === '1') {
      setFishIdle(fish);
      fish.classList.add('float');
      fish.dataset.jumping = '0';
    }
  }, durationMs);
  _gifSwaps.set(fish, handle);
}

function _spawnSplashAt(xPct, yPct) {
  const s = document.createElement('div');
  s.className = 'splash';
  s.style.left = xPct + '%';
  s.style.top  = yPct + '%';
  game.appendChild(s);
  s.addEventListener('animationend', () => s.remove(), { once: true });
}
function _clearSplashes() {
  game.querySelectorAll('.splash').forEach(n => n.remove());
}
/* Per-pond ripple tint. Used by spawnSuccessWaterRippleAtFish so the
   ripple that blooms when a fish lands takes the color of its pond. */
const SUCCESS_SPLASH_COLOR = {
  green:  'rgba(80,220,120,.65)',
  red:    'rgba(255,100,90,.65)',
  yellow: 'rgba(255,215,70,.65)',
  pink:   'rgba(255,120,210,.65)'
};


/* Kid-friendly droplet palette per lane. The colored ripple already
   tints the water; the droplets layer a saturated splash hue on top
   so the landing reads as a colorful "splash-out" matching the pond. */
const SUCCESS_DROPLET_COLORS = {
  green:  ['rgba(120,240,160,0.95)', 'rgba(255,255,255,0.95)', 'rgba(180,255,210,0.95)'],
  red:    ['rgba(255,130,120,0.95)', 'rgba(255,255,255,0.95)', 'rgba(255,200,200,0.95)'],
  yellow: ['rgba(255,225,90,0.98)',  'rgba(255,255,255,0.95)', 'rgba(255,245,180,0.95)'],
  pink:   ['rgba(255,140,220,0.95)', 'rgba(255,255,255,0.95)', 'rgba(255,210,240,0.95)']
};

/* ---------- Color bubble burst ----------
   Playful soap-bubble explosion spawned at the fish landing point on
   every correct landing. Big enough to cover the pond + a fan of
   lane-color-matched bubbles flying outward + a central core flash.
   Pure CSS animations on transform/opacity — JS only sets per-bubble
   custom props and cleans up the host element after the animations
   finish so the DOM never accumulates leftover nodes. */

/* Bubble palette per lane — 3 shades of the matching fish/pond color
   so the burst stays inside the color family but still has visual
   variety (light/mid/dark). No rainbow / random colors. */
const BUBBLE_LANE_PALETTES = {
  green: [
    { fill: '#7ee0a0', glow: 'rgba(126,224,160,0.95)' },
    { fill: '#3fbf6c', glow: 'rgba(63,191,108,0.95)'  },
    { fill: '#b6f0c8', glow: 'rgba(182,240,200,0.95)' }
  ],
  red: [
    { fill: '#ff6b6b', glow: 'rgba(255,107,107,0.95)' },
    { fill: '#e6433a', glow: 'rgba(230,67,58,0.95)'   },
    { fill: '#ffb4ad', glow: 'rgba(255,180,173,0.95)' }
  ],
  yellow: [
    { fill: '#ffd86b', glow: 'rgba(255,216,107,1)'    },
    { fill: '#f5b51a', glow: 'rgba(245,181,26,1)'     },
    { fill: '#ffe8a3', glow: 'rgba(255,232,163,1)'    }
  ],
  pink: [
    { fill: '#ff8fb4', glow: 'rgba(255,143,180,0.95)' },
    { fill: '#ec4ea3', glow: 'rgba(236,78,163,0.95)'  },
    { fill: '#ffc2dc', glow: 'rgba(255,194,220,0.95)' }
  ]
};

/* Centre-flash color per lane — keeps the burst tied to the pond
   color so the entire effect reads as the fish's color. */
const BUBBLE_CORE_COLOR = {
  green:  'rgba(80,220,120,0.95)',
  red:    'rgba(255,100,90,0.95)',
  yellow: 'rgba(255,215,90,1)',
  pink:   'rgba(255,140,210,0.95)'
};

function spawnColorBubbleBurst(xPct, yPct, laneColor, opts = {}) {
  const host = document.createElement('div');
  host.className = 'success-bubble-burst';
  if (laneColor) host.dataset.color = laneColor;
  host.style.left = xPct + '%';
  host.style.top  = yPct + '%';
  if (opts.size)   host.style.width  = opts.size;
  if (opts.zIndex != null) host.style.zIndex = opts.zIndex;

  const coreColor = BUBBLE_CORE_COLOR[laneColor] || 'rgba(255,255,255,0.95)';
  host.style.setProperty('--burst-color', coreColor);

  // Soft central flash in the matching pond color — pops the burst.
  const core = document.createElement('div');
  core.className = 'bubble-burst-core';
  host.appendChild(core);

  // Lane-color bubbles flying outward in a radial fan. Distance and
  // size are randomised within bounds so the burst feels organic but
  // every bubble's color comes from the fish's palette (no random
  // rainbow tints).
  const palette = BUBBLE_LANE_PALETTES[laneColor] || BUBBLE_LANE_PALETTES.green;
  const COUNT = opts.bubbleCount || 16;
  for (let i = 0; i < COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'color-bubble';
    const angle = (i / COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.35;
    const dist  = 70 + Math.random() * 65;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    const size = 16 + Math.random() * 26;
    const pal  = palette[i % palette.length];

    b.style.setProperty('--dx', dx.toFixed(1) + 'px');
    b.style.setProperty('--dy', dy.toFixed(1) + 'px');
    b.style.setProperty('--bubble-size',  size.toFixed(0) + 'px');
    b.style.setProperty('--bubble-color', pal.fill);
    b.style.setProperty('--bubble-glow',  pal.glow);
    b.style.setProperty('--bubble-dur',   (820 + Math.random() * 280).toFixed(0) + 'ms');
    b.style.setProperty('--bubble-delay', (Math.random() * 90).toFixed(0) + 'ms');
    host.appendChild(b);
  }

  (opts.parent || game).appendChild(host);

  // Remove the entire host once the longest animation finishes. 1500ms
  // covers the slowest bubble (~1100ms) + delay (~90ms) with margin.
  setTimeout(() => { if (host.parentNode) host.parentNode.removeChild(host); }, 1500);
}

function spawnSuccessWaterRippleAtFish(fish, laneColor) {
  _clearSplashes();
  const fishRect = fish.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  const cx = (fishRect.left - gameRect.left) + fishRect.width * 0.5;
  const cy = (fishRect.top  - gameRect.top)  + fishRect.height * 0.82;
  const xPct = (cx / gameRect.width)  * 100;
  const yPct = (cy / gameRect.height) * 100;
  const splashColor = SUCCESS_SPLASH_COLOR[laneColor] || 'rgba(140,220,255,.6)';

  const ripple = document.createElement('div');
  ripple.className = 'success-water-ripple';
  ripple.style.left = xPct + '%';
  ripple.style.top  = yPct + '%';
  ripple.style.setProperty('--splash-color', splashColor);
  game.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove(), { once: true });

  // Layered playful splash-out: a soft white burst on top of the
  // colored ripple, a fan of colored droplets, and a few rising
  // bubbles. All cleanup-on-animationend, no leaks.
  _spawnLandingBurst(xPct, yPct, splashColor);
  _spawnLandingDroplets(xPct, yPct, laneColor);
  _spawnLandingBubbles(xPct, yPct);

  // Color bubble burst — the big visible "you got it!" pop centred on
  // the fish body (which == pond centre after playPondArcJump). This
  // sits behind the fish (z<10) so the fish silhouette stays readable
  // while the burst clearly covers the target.
  const fishCx = (fishRect.left - gameRect.left) + fishRect.width  * 0.5;
  const fishCy = (fishRect.top  - gameRect.top)  + fishRect.height * 0.5;
  const burstXPct = (fishCx / gameRect.width)  * 100;
  const burstYPct = (fishCy / gameRect.height) * 100;
  spawnColorBubbleBurst(burstXPct, burstYPct, laneColor);

  return ripple;
}

function _spawnLandingBurst(xPct, yPct, splashColor) {
  const burst = document.createElement('div');
  burst.className = 'success-splash-burst';
  burst.style.left = xPct + '%';
  burst.style.top  = yPct + '%';
  burst.style.setProperty('--splash-color', splashColor);
  game.appendChild(burst);
  burst.addEventListener('animationend', () => burst.remove(), { once: true });
}

function _spawnLandingDroplets(xPct, yPct, laneColor) {
  const palette = SUCCESS_DROPLET_COLORS[laneColor] || SUCCESS_DROPLET_COLORS.pink;
  const COUNT = 10;
  for (let i = 0; i < COUNT; i++) {
    // Spread droplets in a fan biased upward so the splash reads as
    // a playful "pop out of the water", not a flat ring.
    const angle = -Math.PI + (Math.PI * (i / (COUNT - 1)));
    const distance = 40 + Math.random() * 40;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance * 0.85;
    const d = document.createElement('div');
    d.className = 'success-droplet';
    d.style.left = xPct + '%';
    d.style.top  = yPct + '%';
    d.style.setProperty('--dx', dx.toFixed(1) + 'px');
    d.style.setProperty('--dy', dy.toFixed(1) + 'px');
    d.style.setProperty('--droplet-color', palette[i % palette.length]);
    d.style.animationDelay = (Math.random() * 60) + 'ms';
    game.appendChild(d);
    d.addEventListener('animationend', () => d.remove(), { once: true });
  }
}

function _spawnLandingBubbles(xPct, yPct) {
  const COUNT = 4;
  for (let i = 0; i < COUNT; i++) {
    const bx = (Math.random() - 0.5) * 28;
    const b = document.createElement('div');
    b.className = 'success-bubble';
    b.style.left = xPct + '%';
    b.style.top  = yPct + '%';
    b.style.setProperty('--bx', bx.toFixed(1) + 'px');
    b.style.animationDelay = (60 + Math.random() * 160) + 'ms';
    game.appendChild(b);
    b.addEventListener('animationend', () => b.remove(), { once: true });
  }
}

/* Tiny splash spawned right under the fish at the moment it leaves
   the water. Smaller and quicker than the landing splash so it reads
   as a "kick-off" beat, not a competing effect. */
function _spawnTakeoffSplashUnderFish(fish, laneColor) {
  const fishRect = fish.getBoundingClientRect();
  const gameRect = game.getBoundingClientRect();
  const cx = (fishRect.left - gameRect.left) + fishRect.width * 0.5;
  const cy = (fishRect.top  - gameRect.top)  + fishRect.height * 0.92;
  const xPct = (cx / gameRect.width)  * 100;
  const yPct = (cy / gameRect.height) * 100;
  const splashColor = SUCCESS_SPLASH_COLOR[laneColor] || 'rgba(140,220,255,.6)';

  const burst = document.createElement('div');
  burst.className = 'success-splash-burst';
  burst.style.left = xPct + '%';
  burst.style.top  = yPct + '%';
  burst.style.width = '5%';
  burst.style.setProperty('--splash-color', splashColor);
  burst.style.opacity = '0.85';
  game.appendChild(burst);
  burst.addEventListener('animationend', () => burst.remove(), { once: true });

  // A small fan of droplets — fewer than the landing pop.
  const palette = SUCCESS_DROPLET_COLORS[laneColor] || SUCCESS_DROPLET_COLORS.pink;
  const COUNT = 5;
  for (let i = 0; i < COUNT; i++) {
    const angle = -Math.PI * 0.85 + (Math.PI * 0.7) * (i / (COUNT - 1));
    const distance = 22 + Math.random() * 18;
    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance * 0.7;
    const d = document.createElement('div');
    d.className = 'success-droplet';
    d.style.left = xPct + '%';
    d.style.top  = yPct + '%';
    d.style.setProperty('--dx', dx.toFixed(1) + 'px');
    d.style.setProperty('--dy', dy.toFixed(1) + 'px');
    d.style.setProperty('--droplet-color', palette[i % palette.length]);
    game.appendChild(d);
    d.addEventListener('animationend', () => d.remove(), { once: true });
  }
}

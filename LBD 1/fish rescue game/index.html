<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Fish Sorting Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Lalezar: rounded Latin display face with a magical Arabian/Persian
     character (titles, buttons, banners). Baloo 2: highly legible rounded
     font for the instructional speech-bubble text (1st-grade readable). -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Lalezar&family=Lilita+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif;
    /* Stop iOS double-tap zoom / overscroll bounce so taps stay crisp. */
    touch-action: manipulation;
    overscroll-behavior: none;
  }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Use the dynamic viewport unit where supported so mobile browser
       chrome (collapsing address bars) doesn't crop the stage. */
    width: 100vw;
    height: 100vh;
    height: 100dvh;
  }

  /* ===========================================================
     PORTRAIT GUARD — this is a landscape game. On phones/tablets held
     upright the 16:9 stage would shrink into thin letterbox bars, so we
     cover it with a friendly "rotate your device" prompt instead. Pure
     CSS via the orientation media query — appears/disappears the instant
     the device is turned. Desktops (wide screens) never see it. */
  .rotate-prompt { display: none; }
  @media (orientation: portrait) and (max-width: 1024px) {
    .rotate-prompt {
      display: flex;
      position: fixed;
      inset: 0;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5vh;
      text-align: center;
      padding: 8vw;
      background: radial-gradient(circle at 50% 38%, #1b3a5c, #0d1f33);
      color: #fff5d6;
    }
    .rotate-prompt .rotate-icon {
      font-size: 22vw;
      line-height: 1;
      animation: rotateHint 2s ease-in-out infinite;
    }
    .rotate-prompt .rotate-text {
      font-family: 'Lalezar', 'Comic Sans MS', system-ui, sans-serif;
      font-size: 6.5vw;
      letter-spacing: 0.3px;
    }
  }
  @keyframes rotateHint {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(-90deg); }
  }

  /* ===========================================================
     16:9 LOCKED STAGE
     - All internal positions use % of this stage
     - Letterboxed on non-16:9 viewports (centered automatically)
     =========================================================== */
  .game {
    /* Shared lane geometry — streams, target boxes, and ponds all
       derive their position/size from these so the three layers can
       never drift apart. Change a number here once and every lane
       updates in sync. */
    --lane-h: 20.6%;
    --green-top: 0.8%;
    --red-top: 21.9%;
    --yellow-top: 43%;
    --pink-top: 64.1%;
    --box-w: 13.2%;
    --target-size: 10.8%;
    position: relative;
    width: min(100vw, 177.777vh);
    height: min(100vh, 56.25vw);
    max-width: 1920px;
    max-height: 1080px;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    padding: 0;
    margin: 0;
    background: url('assets/bg.webp') center/cover no-repeat, #f5b97c;
  }

  /* ===========================================================
     STREAMS — 4 horizontal lanes, edge-to-edge
     Geometry lives in CSS variables on .game (--*-top, --lane-h)
     so streams + target boxes + ponds stay in lock-step.
     Bottom safe area (sand for buttons): y 86%–100%
     =========================================================== */
  .stream-map { display: none; }

  /* Four separate stream lanes — each color rendered from its own SVG
     so we can swap/tune lanes individually without touching one combined
     asset. Lane top positions match the lane band geometry used by the
     fish/pond layout. */
  .stream-lanes {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
  }
  /* Streams and target boxes share ONE lane layout via --lane-h and
     the per-color --*-top variables. Both use the EXACT same top and
     height so the two layers can never drift in size. A tiny X-axis
     overlap (no height change, no scale) keeps the seam clean. */
  .stream-lane,
  .target-box {
    position: absolute;
    top: auto;
    height: var(--lane-h) !important;
    object-fit: fill;
    margin: 0 !important;
    padding: 0 !important;
    transform: none !important;
  }
  .stream-lane {
    left: var(--box-w);
    right: 0;
    width: auto;
    object-position: center;
    /* While the destination column is away (ocean-intro), the streams extend to
       the left edge to fill the space, then retract here as the column slides
       in. Matches the holes/boxes slide timing so they move in lock-step. */
    transition: left 540ms cubic-bezier(.34, .02, .2, 1);
  }
  /* The lanes are now <object> SVGs (so their internal animation runs). Strip
     the default object chrome and make sure they never intercept taps meant
     for the streams/fish above them. */
  object.stream-lane {
    border: 0;
    background: transparent;
    pointer-events: none;
  }


  /* Colored boxes on the left edge sitting BEHIND each pond. They frame
     each pond's lane without interfering with input — pond targets
     remain on top (.ponds z:5). */
  .target-boxes {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    /* Slides + fades in lock-step with the ponds (see .game.holes-hidden), so
       the WHOLE left destination column (colored boxes + circles) arrives as one
       unit instead of the bare boxes lingering as "lines". */
    transition: opacity 480ms ease, transform 540ms cubic-bezier(.34, .02, .2, 1);
  }
  .target-box {
    left: 0;
    width: var(--box-w);
  }

  /* Vertical divider line sitting on top of both the box and the stream
     at the box's right edge. Use this when a discrete colored bar is
     wanted between the target circle and the lane water. */
  .lane-divider {
    position: absolute;
    left: var(--box-w);
    width: 0.28%;
    height: var(--lane-h);
    z-index: 6;
    pointer-events: none;
  }

  .green-stream,  .green-box,  .green-divider  { top: var(--green-top); }
  .red-stream,    .red-box,    .red-divider    { top: var(--red-top); }
  .yellow-stream, .yellow-box, .yellow-divider { top: var(--yellow-top); }
  .pink-stream,   .pink-box,   .pink-divider   { top: var(--pink-top); }

  /* Pond boxes — colored square frame behind each pond, includes built-in divider line on right */


  /* Natural floating bubbles — bubbles rise gently with a slight sideways
     sway and a gradual fade in/out, like air bubbles in water. Used both
     inside the streams and over the ocean strip. */
  .stream-bubbles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 28%, rgba(255,255,255,0.95), rgba(255,255,255,0.5) 40%, rgba(255,255,255,0.08) 72%);
    box-shadow:
      inset 0 0 6px rgba(255,255,255,0.7),
      inset -2px -2px 6px rgba(0,0,0,0.06),
      0 0 6px rgba(180,230,255,0.5);
    opacity: 0;
    animation-name: bubbleFloat;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
    will-change: transform, opacity;
  }
  /* Slight horizontal sway via CSS variable randomized per-bubble in JS */
  @keyframes bubbleFloat {
    0%   { transform: translate(0, 24px)   scale(0.45); opacity: 0; }
    18%  { transform: translate(var(--sway-a,4px), 0px)  scale(0.85); opacity: 0.85; }
    50%  { transform: translate(var(--sway-b,-6px), -42px) scale(1);    opacity: 0.95; }
    82%  { transform: translate(var(--sway-c,5px), -78px) scale(1.05); opacity: 0.7; }
    100% { transform: translate(var(--sway-d,-3px),-110px) scale(1.15); opacity: 0; }
  }

  /* Moving-water layer. Each lane has a tiling ellipse pattern whose
     background-position drifts horizontally at a constant rate — reads
     as actual flowing water rather than a static stripe. Linear timing
     so the motion never stalls; the second layer flows in reverse for
     a subtle cross-current. No vertical wobble, no horizontal lines. */
  .water-wave {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
    opacity: 1;
  }
  .water-wave .band {
    position: absolute;
    left: var(--box-w);
    right: 0;
    height: var(--lane-h);
    overflow: hidden;
    opacity: 0.32;
    mix-blend-mode: screen;
    transition: left 540ms cubic-bezier(.34, .02, .2, 1);
  }
  .water-wave .band::before,
  .water-wave .band::after {
    content: "";
    position: absolute;
    inset: 0;
    opacity: 0.35;
    background-image:
      radial-gradient(ellipse 22% 18% at 20% 45%, rgba(255,255,255,.35), transparent 72%),
      radial-gradient(ellipse 26% 16% at 55% 55%, rgba(255,255,255,.22), transparent 75%),
      radial-gradient(ellipse 18% 12% at 82% 40%, rgba(255,255,255,.26), transparent 72%);
    background-size: 22% 100%;
    background-repeat: repeat-x;
    animation: waterFlow 5s linear infinite;
  }
  .water-wave .band::after {
    animation-duration: 7.5s;
    animation-direction: reverse;
  }
  .green-band  { top: var(--green-top); }
  .red-band    { top: var(--red-top); }
  .yellow-band { top: var(--yellow-top); }
  .pink-band   { top: var(--pink-top); }
  @keyframes waterFlow {
    from { background-position:   0% 0%; }
    to   { background-position: -22% 0%; }
  }

  /* Static ponds illustration used on the "... leads to a pond." scene.
     When `.game.show-ponds-svg` is set, the dynamic stream/box/pond/
     water layers are hidden and this single SVG replaces them. The
     genie and speech bubble remain visible on top. */
  .ponds-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    z-index: 5;
  }
  .game.show-ponds-svg .stream-lanes,
  .game.show-ponds-svg .target-boxes,
  .game.show-ponds-svg .ponds,
  .game.show-ponds-svg .water-wave,
  .game.show-ponds-svg .stream-bubbles {
    visibility: hidden;
  }

  /* On the final "Great Job!" pond screen, hide the gameplay layers
     (streams, target boxes, water flow, stream bubbles, and the small
     coloured ponds at the left) so the celebration grid stands alone. */
  .game.final-screen-active .stream-lanes,
  .game.final-screen-active .target-boxes,
  .game.final-screen-active .ponds,
  .game.final-screen-active .water-wave,
  .game.final-screen-active .stream-bubbles {
    visibility: hidden;
  }

  /* ===========================================================
     PONDS — left column circles, fixed positions
     =========================================================== */
  .ponds {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    /* The destination holes slide + fade between the ocean-intro state
       (hidden, see .game.holes-hidden below) and the gameplay state. The
       transition is on the CONTAINER only; each .pond keeps its own
       translateY(-50%) centering, so the slide composes without disturbing
       layout or collision rects (which settle long before any fish arrives). */
    transition: opacity 480ms ease, transform 540ms cubic-bezier(.34, .02, .2, 1);
  }
  /* OCEAN-INTRO STATE: the whole left destination column (colored boxes + the
     circular holes) is pushed off to the left and faded out while the ocean
     crowd is on screen, so NO bare colored "lines" show. Removing the class
     slides the column back in together ("the destination area arrives"). */
  .game.holes-hidden .ponds,
  .game.holes-hidden .target-boxes {
    opacity: 0;
    transform: translateX(-46%);
  }
  /* ...and the streams + water stretch to the left edge to fill the vacated
     column, so there's no empty sand gap while the destination icons are away. */
  .game.holes-hidden .stream-lane,
  .game.holes-hidden .water-wave .band {
    left: 0;
  }
  .pond {
    position: absolute;
    /* Pond is horizontally centered inside the colored target box using
       the same --box-w and --target-size variables that drive the box
       and lane geometry, so the three layers can never drift apart. */
    left: calc((var(--box-w) - var(--target-size)) / 2);
    width: var(--target-size);
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: translateY(-50%);
  }
  .pond::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 0.45vw solid #fff;
    box-sizing: border-box;
    z-index: 1;
  }
  .pond[data-color="green"]  { background: #29b34c; box-shadow: 0 0 14px rgba(41,179,76,0.55); }
  .pond[data-color="red"]    { background: #ee5a4f; box-shadow: 0 0 14px rgba(238,90,79,0.55); }
  .pond[data-color="yellow"] { background: #f5b51a; box-shadow: 0 0 14px rgba(245,181,26,0.55); }
  .pond[data-color="pink"]   { background: #ec4ea3; box-shadow: 0 0 14px rgba(236,78,163,0.55); }
  .pond-fish {
    width: 72%;
    height: 72%;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    filter: brightness(0) invert(1);
    transition: filter 0.3s ease;
    position: relative;
    z-index: 2;
  }
  .pond.filled { animation: pondPop 0.6s ease; }
  .pond.filled .pond-fish { filter: none; }
  @keyframes pondPop {
    0%, 100% { transform: translateY(-50%) scale(1); }
    40%      { transform: translateY(-50%) scale(1.18); }
  }
  .pond.flash-wrong { animation: pondFlashWrong 0.5s ease; }
  @keyframes pondFlashWrong {
    0%, 100% { filter: none; }
    50%      { filter: brightness(1.5) saturate(1.6) drop-shadow(0 0 18px rgba(255,80,80,0.9)); }
  }

  /* ===========================================================
     FISH (active in stream)
     - .fish is a fixed-size wrapper that owns all motion (left/top,
       transform, opacity, float keyframe). It never holds the art
       itself, so PNG ↔ GIF swaps can never change its rendered size.
     - .fish-art is the inner <img> that holds the actual sprite. Its
       size is locked to 100% of the wrapper with object-fit: contain,
       so any internal padding inside a GIF's own canvas is normalized
       to the exact box the PNG occupies.
     =========================================================== */
  .fish,
  .fish.jump-mode {
    position: absolute;
    width: 11.2%;
    aspect-ratio: 860/600;
    will-change: left, top, transform, opacity;
    z-index: 10;
    pointer-events: none;
    filter: drop-shadow(0 4px 5px rgba(0,0,0,0.2));
  }
  .fish-art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }
  .fish.float {
    animation: fishFloat 1.4s ease-in-out infinite;
  }
  @keyframes fishFloat {
    0%   { transform: translateY(0)    rotate(0deg); }
    25%  { transform: translateY(-6px) rotate(-2.5deg); }
    50%  { transform: translateY(0)    rotate(0deg); }
    75%  { transform: translateY(6px)  rotate(2.5deg); }
    100% { transform: translateY(0)    rotate(0deg); }
  }
  .fish.delivered { animation: delivered 0.6s forwards; }
  .fish.success-vanish {
    transition: opacity 420ms ease, transform 420ms ease;
    opacity: 0;
    transform: translateY(-8px) rotate(-2deg);
  }
  @keyframes delivered {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-12px); opacity: 0; }
  }
  .fish.wrong { animation: wrong 0.5s ease; }
  @keyframes wrong {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-12px) rotate(-5deg); }
    60%      { transform: translateX(12px) rotate(5deg); }
  }

  /* Splash FX — soft natural water droplets (used for lane-jump landings). */
  .splash {
    position: absolute;
    width: 3.2%;
    aspect-ratio: 1;
    left: 0;
    top: 0;
    transform: translate(-50%, -50%) scale(0.2);
    opacity: 0;
    pointer-events: none;
    z-index: 9;
    animation: splashSoft 520ms ease-out forwards;
  }
  .splash::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(ellipse, rgba(255,255,255,0.7), rgba(255,255,255,0) 65%),
      radial-gradient(ellipse, var(--splash-glow, rgba(140,220,255,0.45)), transparent 75%);
    opacity: 0.85;
  }
  @keyframes splashSoft {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.25); }
    20%  { opacity: 0.9; }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.5); }
  }

  /* Success water ripple — natural colored water ripple that blooms
     out of the pond when a fish lands on the correct target. Color
     is provided per-call via --splash-color, so the ripple takes on
     the matching pond's hue. No ring/shot look, no impact sound. */
  .success-water-ripple {
    position: absolute;
    width: 7%;
    aspect-ratio: 1.8 / 1;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9;
    transform: translate(-50%, -50%) scale(0.4);
    opacity: 0;
    background:
      radial-gradient(ellipse, rgba(255,255,255,.75), transparent 60%),
      radial-gradient(ellipse, var(--splash-color, rgba(140,220,255,.6)), transparent 72%);
    animation: successWaterRipple 700ms ease-out forwards;
  }
  @keyframes successWaterRipple {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.35); }
    20%  { opacity: 0.9; }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.7); }
  }

  /* Gamified landing splash — a soft white burst layered on top of the
     colored ripple, sized to read clearly at the target/pond. Spawned
     together with the ripple from spawnSuccessWaterRippleAtFish. */
  .success-splash-burst {
    position: absolute;
    width: 9%;
    aspect-ratio: 1;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
    background:
      radial-gradient(circle, rgba(255,255,255,.95), transparent 45%),
      radial-gradient(circle at 35% 40%, var(--splash-color, rgba(140,220,255,.85)), transparent 65%);
    animation: successSplashBurst 720ms cubic-bezier(.2,1.2,.3,1) forwards;
  }
  @keyframes successSplashBurst {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.3); }
    25%  { opacity: 1;   transform: translate(-50%, -50%) scale(1.05); }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.8); }
  }

  /* Small colored droplets that fly outward from the landing point.
     Direction + distance come from inline --dx/--dy custom props set
     in JS, so each droplet picks its own angle. */
  .success-droplet {
    position: absolute;
    width: 1.2%;
    aspect-ratio: 1;
    border-radius: 50%;
    pointer-events: none;
    z-index: 11;
    background: var(--droplet-color, rgba(140,220,255,.95));
    box-shadow: 0 0 6px rgba(255,255,255,0.85);
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: successDropletFly 780ms cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes successDropletFly {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    15%  { opacity: 1; }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px)))
        scale(0.4);
    }
  }

  /* ===========================================================
     COLOR BUBBLE BURST — playful soap-bubble explosion spawned at
     the fish landing point on every correct landing. Big enough to
     cover the pond + a fan of rainbow bubbles flying outward. Pure
     CSS animations on transform/opacity for 60fps smoothness; the JS
     helper spawnColorBubbleBurst() just sets per-bubble CSS vars and
     appends the elements.
     =========================================================== */
  .success-bubble-burst {
    position: absolute;
    width: 18%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9;
    will-change: transform, opacity;
  }
  /* Soft white core flash sitting at the centre — kicks the burst off
     with a satisfying pop before the rainbow bubbles fly outward. */
  .bubble-burst-core {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 60%;
    aspect-ratio: 1;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
    background:
      radial-gradient(circle, rgba(255,255,255,0.95) 0%, var(--burst-color, rgba(255,255,255,0.6)) 45%, rgba(255,255,255,0) 75%);
    filter: blur(2px);
    animation: bubbleBurstCore 650ms cubic-bezier(.2,1.2,.3,1) forwards;
  }
  @keyframes bubbleBurstCore {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.3); }
    30%  { opacity: 1;   transform: translate(-50%, -50%) scale(1.2); }
    100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.9); }
  }
  /* Individual colored bubble — rainbow palette, glossy highlight,
     soft drop-shadow. Each flies out to (--dx, --dy) which JS picks
     so the burst has a natural fan shape. */
  .color-bubble {
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--bubble-size, 22px);
    height: var(--bubble-size, 22px);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0.3);
    opacity: 0;
    background:
      radial-gradient(circle at 32% 28%,
        rgba(255,255,255,0.95) 0%,
        rgba(255,255,255,0.7) 14%,
        var(--bubble-color, #fff) 55%,
        var(--bubble-color-dark, rgba(0,0,0,0.25)) 100%);
    box-shadow:
      0 0 14px var(--bubble-glow, var(--bubble-color, #fff)),
      0 2px 5px rgba(0,0,0,0.18),
      inset -3px -4px 6px rgba(0,0,0,0.18);
    animation: colorBubbleFly var(--bubble-dur, 900ms) cubic-bezier(.2,.7,.3,1) var(--bubble-delay, 0ms) forwards;
  }
  @keyframes colorBubbleFly {
    0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.3) rotate(0deg); }
    18%  { opacity: 1;   transform: translate(-50%, -50%) scale(1.15) rotate(40deg); }
    70%  { opacity: 1;   }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px)))
        scale(0.55) rotate(160deg);
    }
  }
  /* Small white sparkle highlight inside each bubble — a single dot in
     the upper-left, scaled with the bubble. */
  .color-bubble::before {
    content: '';
    position: absolute;
    left: 22%;
    top: 18%;
    width: 28%;
    height: 28%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 70%);
    pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .success-bubble-burst, .bubble-burst-core, .color-bubble {
      animation: none;
      opacity: 0.6;
    }
  }

  /* Tiny bubbles that rise gently after the landing splash. */
  .success-bubble {
    position: absolute;
    width: 1.6%;
    aspect-ratio: 1;
    border-radius: 50%;
    pointer-events: none;
    z-index: 11;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(255,255,255,0.35) 55%, rgba(255,255,255,0) 70%);
    border: 1px solid rgba(255,255,255,0.7);
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: successBubbleRise 1100ms ease-out forwards;
  }
  @keyframes successBubbleRise {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    20%  { opacity: 1; }
    100% {
      opacity: 0;
      transform:
        translate(calc(-50% + var(--bx, 0px)), calc(-50% - 60px))
        scale(1.05);
    }
  }

  /* Wrong-recoil wave effect removed — wrong feedback is now just a
     short fish shake/recoil plus the wrong popup. No extra overlay. */
  .wrong-wave-natural { display: none !important; }

  /* Gamified water burst spawned behind the fish on a wrong-stream hit.
     A soft white-cyan radial pop that scales out and fades, reading as
     a push of water that knocks the fish back. */
  .wrong-water-burst {
    position: absolute;
    width: 10%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 90;
    opacity: 1;
    background:
      radial-gradient(circle, rgba(255,255,255,.98), transparent 42%),
      radial-gradient(circle at 30% 45%, var(--wrong-burst-color, rgba(145,220,255,.9)), transparent 62%);
    animation: wrongWaterBurst 900ms ease-out forwards;
  }
  @keyframes wrongWaterBurst {
    0%   { transform: translate(-50%, -50%) scale(0.25); opacity: 0; }
    18%  { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.9); opacity: 0; }
  }

  /* ===========================================================
     GENIE
     =========================================================== */
  .genie {
    position: absolute;
    aspect-ratio: 1;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-size: contain;
    z-index: 12;
    transition: left 0.5s ease, bottom 0.5s ease, width 0.5s ease;
    will-change: left, bottom, width, transform, opacity;
    pointer-events: none;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.25));
    opacity: 1;
  }
  .genie.fading {
    opacity: 0;
    transform: translateX(-50%) scale(0.92);
  }
  .genie.bounce { animation: genieBounce 2.2s ease-in-out infinite; }
  @keyframes genieBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-10px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .water-wave .band::before, .water-wave .band::after, .bubble { animation: none; }
    .fish.float { animation: none; }
    .genie.bounce { animation: none; }
  }

  /* ===========================================================
     ORGANIC SVG THOUGHT BOX — a hand-drawn storybook speech bubble.
     .speech is only the content-sized, transparent LAYOUT box: it hugs its
     text (contracts for short lines, wraps/widens for long ones). The visible
     bubble is ONE continuous SVG <path> (.speech-shape) generated by JS to the
     measured box size — white fill + thick brown (#8D5115) outline with the
     beak fused into the same outline, so there's never a joining seam. The
     outline width stays constant at every size (non-scaling-stroke) and the
     beak tracks Gogo via --tail-x. Geometry lives in renderSpeechShape() /
     buildBubblePath(); the box stays content-sized so nothing stretches.
     =========================================================== */
  .speech {
    position: absolute;
    /* Content-sized: the bubble hugs its text and only wraps when it hits the
       per-scene cap (max-width, set inline from bubbleAnchor.width in JS). The
       small min-width just stops a one-word bubble from looking like a pill. */
    width: fit-content;
    min-width: clamp(120px, 12vw, 240px);
    max-width: 46%;
    z-index: 13;
    box-sizing: border-box;

    /* Padding is the inner "safe zone" that keeps text off the drawn outline. */
    padding: clamp(18px, min(1.9vw, 3.38vh), 38px)
             clamp(30px, min(3.0vw, 5.33vh), 62px);

    pointer-events: none;
    overflow: visible;
    transform-origin: center bottom;

    /* Transparent: the white body + brown outline are drawn by the SVG layer
       (.speech-shape) sitting behind the text, not by the box itself. */
    background: none;
    border: 0;

    animation: pop-in 0.34s cubic-bezier(.5, 1.8, .4, 1);
  }

  /* The body is a single clean shape now — kill any legacy bump/tail pseudo. */
  .speech::before,
  .speech::after { display: none !important; }

  /* The visible bubble: ONE continuous SVG path (white fill + brown outline),
     drawn by JS to the live box size. z-index:-1 keeps it behind the text;
     overflow:visible lets the beak extend below the body. The beak is part of
     the same path, so the outline flows around it with no joining line. The
     drop-shadow follows the organic silhouette rather than a plain rectangle. */
  .speech-shape {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: -1;
    filter: drop-shadow(0 min(0.4vw, 0.71vh) min(0.8vw, 1.42vh) rgba(62, 35, 8, 0.24));
  }
  .speech-shape path {
    fill: #ffffff;
    stroke: #8d5115;
    stroke-width: clamp(5px, min(0.62vw, 1.1vh), 12px);   /* thick, constant per stage size */
    vector-effect: non-scaling-stroke;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  /* Only dynamic class kept: .multiline adds a little vertical breathing room
     once the text wraps onto more than one line (set by updateSpeechTextLayout).
     Width is driven purely by the content + max-width cap, so no word-count
     width classes are needed (they fought the natural sizing). */
  .speech.multiline {
    padding-top: clamp(18px, min(1.9vw, 3.38vh), 38px);
    padding-bottom: clamp(18px, min(1.9vw, 3.38vh), 38px);
  }

  /* Flip uses the same pop-in: the tail already points back at Gogo via
     --tail-x, so the box never needs mirroring (text stays upright). */
  .speech.flip {
    animation: pop-in 0.35s cubic-bezier(.5, 1.8, .4, 1);
  }

  @media (prefers-reduced-motion: reduce) {
    .speech,
    .speech.flip {
      animation: pop-in 0.34s cubic-bezier(.5, 1.8, .4, 1);
    }
  }

  .game.pulse-streams .stream-map {
    animation: softPulse 1.6s ease-in-out infinite;
    filter: brightness(1.05) saturate(1.05);
  }
  /* Ponds carry translateY(-50%) for vertical centering. Use a dedicated
     keyframe so the scale pulse preserves that translate and does NOT
     shift each pond down by half its height during the pulse. */
  .game.pulse-ponds .pond {
    animation: pondPulse 1.6s ease-in-out infinite;
  }
  @keyframes pondPulse {
    0%, 100% { transform: translateY(-50%) scale(1);    opacity: 1; }
    50%      { transform: translateY(-50%) scale(1.02); opacity: 0.98; }
  }
  .game.pulse-buttons .btn.highlight::before {
    animation-duration: 1.4s;
  }
  .game.pulse-buttons .btn {
    animation: buttonGlow 1.6s ease-in-out infinite;
  }
  @keyframes buttonGlow {
    0%, 100% { filter: none; }
    50%      { filter: brightness(1.08) saturate(1.05); }
  }

  /* Per-color glow var — used by fish, pond target, and stream highlight
     glows so each color reads as the same hue everywhere it appears. */
  .fish[data-color="green"],
  .pond[data-color="green"],
  .stream-highlight[data-color="green"]  { --color-glow: rgba(80,220,120,0.85); --color-glow-soft: rgba(80,220,120,0.45); }
  .fish[data-color="red"],
  .pond[data-color="red"],
  .stream-highlight[data-color="red"]    { --color-glow: rgba(255,100,90,0.85); --color-glow-soft: rgba(255,100,90,0.45); }
  .fish[data-color="yellow"],
  .pond[data-color="yellow"],
  .stream-highlight[data-color="yellow"] { --color-glow: rgba(255,210,70,0.85); --color-glow-soft: rgba(255,210,70,0.45); }
  .fish[data-color="pink"],
  .pond[data-color="pink"],
  .stream-highlight[data-color="pink"]   { --color-glow: rgba(255,120,210,0.85); --color-glow-soft: rgba(255,120,210,0.45); }

  /* Generic glow class — kid-friendly soft glow tinted by the per-color
     var. Steady, no animation (use fishGlow keyframe variant for pulse). */
  .fish.glow {
    filter:
      drop-shadow(0 4px 5px rgba(0,0,0,0.2))
      drop-shadow(0 0 10px rgba(255,255,255,0.55))
      drop-shadow(0 0 18px var(--color-glow, rgba(255,255,255,0.7)));
  }

  .game.teach-pink .pond[data-color="pink"] {
    animation: pondPulse 2.2s ease-in-out infinite;
    box-shadow:
      0 0 18px var(--color-glow, rgba(255,120,210,0.85)),
      0 0 32px var(--color-glow-soft, rgba(255,120,210,0.45));
  }
  .game.teach-pink .fish[data-color="pink"] {
    animation: fishFloat 2.6s ease-in-out infinite, fishGlow 2.2s ease-in-out infinite;
  }
  /* Soft per-lane navigation highlight. Used by the tutorial to guide
     attention to a specific stream WITHOUT a harsh neon flash. The
     highlight fades in, then breathes gently (brightness + opacity)
     like sunlight rippling through water. */
  .stream-highlight {
    position: absolute;
    left: 0;
    right: 0;
    height: var(--lane-h);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 320ms ease;
  }
  .game.teach-pink .stream-highlight[data-color="pink"] {
    opacity: 0.75;
    animation: streamBreathe 2.2s ease-in-out infinite;
  }
  .game.guide-target .stream-highlight.is-target {
    opacity: 0.95;
    animation: strongStreamPulse 1.15s ease-in-out infinite;
  }
  @keyframes strongStreamPulse {
    0%, 100% {
      filter: brightness(1.05) saturate(1.05);
      opacity: 0.65;
    }
    50% {
      filter:
        brightness(1.35) saturate(1.25)
        drop-shadow(0 0 16px var(--color-glow));
      opacity: 1;
    }
  }
  .stream-highlight[data-color="green"]  { background: linear-gradient(180deg, rgba(41,179,76,0)  0%, rgba(41,179,76,0.22)  50%, rgba(41,179,76,0)  100%); box-shadow: inset 0 0 22px rgba(41,179,76,0.25); }
  .stream-highlight[data-color="red"]    { background: linear-gradient(180deg, rgba(238,90,79,0)  0%, rgba(238,90,79,0.22)  50%, rgba(238,90,79,0)  100%); box-shadow: inset 0 0 22px rgba(238,90,79,0.25); }
  .stream-highlight[data-color="yellow"] { background: linear-gradient(180deg, rgba(245,181,26,0) 0%, rgba(245,181,26,0.24) 50%, rgba(245,181,26,0) 100%); box-shadow: inset 0 0 22px rgba(245,181,26,0.28); }
  .stream-highlight[data-color="pink"]   { background: linear-gradient(180deg, rgba(236,78,163,0) 0%, rgba(236,78,163,0.24) 50%, rgba(236,78,163,0) 100%); box-shadow: inset 0 0 24px rgba(236,78,163,0.32); }

  /* Pond target glow — the matching pond pulses + glows in its own color
     whenever the tutorial / idle-nudge calls setStreamTarget(color).
     The color glow is sourced from --color-glow defined per data-color. */
  .game.guide-target .pond.is-target {
    animation: strongTargetPulse 1.1s ease-in-out infinite;
    box-shadow:
      0 0 18px var(--color-glow, rgba(255,255,255,0.85)),
      0 0 32px var(--color-glow-soft, rgba(255,255,255,0.45));
  }
  @keyframes strongTargetPulse {
    0%, 100% { transform: translateY(-50%) scale(1); }
    50%      { transform: translateY(-50%) scale(1.14); }
  }
  /* Gentle breathing — brightness/saturate stay close to 1 so the lane
     just "glows softly", never flashes. Opacity rides along to read as
     a magical light pulse. */
  @keyframes streamBreathe {
    0%, 100% {
      filter: brightness(1) saturate(1);
      opacity: 0.55;
    }
    50% {
      filter:
        brightness(1.2) saturate(1.18)
        drop-shadow(0 0 10px rgba(255,255,255,0.4))
        drop-shadow(0 0 18px var(--color-glow, rgba(255,255,255,0.45)));
      opacity: 0.95;
    }
  }
  @keyframes fishGlow {
    0%, 100% {
      filter:
        drop-shadow(0 4px 5px rgba(0,0,0,0.2))
        drop-shadow(0 0 6px var(--color-glow, rgba(255,140,210,0.3)));
    }
    50% {
      filter:
        drop-shadow(0 4px 5px rgba(0,0,0,0.2))
        drop-shadow(0 0 10px rgba(255,255,255,0.65))
        drop-shadow(0 0 18px var(--color-glow, rgba(255,140,210,0.85)));
    }
  }

  /* Confused fish cluster — appears during the "But! They seem confused"
     and "Which way to go?" scenes. Background fish bob in place; the
     pink leader fish drifts vertically between two lanes as if it can't
     decide which stream to follow. */
  .fish-cluster {
    position: absolute;
    inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 280ms ease;
  }
  .fish-cluster.show { opacity: 1; }
  .cluster-fish {
    position: absolute;
    aspect-ratio: 860/600;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.22));
    will-change: transform, top;
  }
  .cluster-fish.back {
    width: 5.5%;
    animation: clusterBob 2.6s ease-in-out infinite;
  }
  .cluster-fish.front {
    /* width is set inline per scene. The wrapper owns the forward glide (left)
       and the grow (transform: scale via WAAPI) — so the leader can start at the
       SAME size as the crowd and get bigger as it comes forward. The confused
       bob lives on the inner art, so bob and grow never fight one transform. */
    width: 8.8%;
    z-index: 5;
    /* Gentle foreground depth — the pink leader reads as "in front" via
       its larger size, a soft contact shadow and a faint rim light. We
       deliberately keep this subtle (no heavy glow) so the background
       ocean fish stay clearly visible just behind it, not washed out. */
    filter:
      drop-shadow(0 7px 9px rgba(0,0,0,0.30))
      drop-shadow(0 0 8px rgba(255,255,255,0.45));
  }
  .cluster-fish.front .cluster-front-art {
    position: absolute;
    inset: 0;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    animation: confusedDrift 2.6s ease-in-out infinite;   /* the confused up/down bob */
  }
  @keyframes clusterBob {
    0%, 100% { transform: translateY(0)    rotate(0deg); }
    25%      { transform: translateY(-6px) rotate(-2.5deg); }
    75%      { transform: translateY(6px)  rotate(2.5deg); }
  }
  /* Front pink leader drifts up and down as if it can't decide which
     stream to follow. translateY is in % of the fish's OWN height (a fixed
     fraction of the stage), so the sweep stays proportional on every screen
     size — px would overflow on small stages.
     The ±170% sweep is deliberately CONTAINED to a central vertical band
     (≈ strip 18%→68%): the CONFUSED ocean-fish layout below keeps that exact
     band clear (its keep-out box), so the leader never bobs on top of a
     background ocean fish. If you change this amplitude, re-measure the
     leader's swept band and widen `avoid` to match. */
  @keyframes confusedDrift {
    0%, 100% { transform: translateY(-170%) rotate(-6deg) scale(1.05); }
    25%      { transform: translateY(0%)    rotate(3deg)  scale(1.05); }
    50%      { transform: translateY(170%)  rotate(6deg)  scale(1.05); }
    75%      { transform: translateY(0%)    rotate(-3deg) scale(1.05); }
  }
  /* Ocean fish stay visible during the confused-cluster scenes so the
     ocean continues to look consistent across all tutorial screens; the
     front pink confused fish is layered on top.

     Depth separation: while the cluster is visible (.fish-cluster.show),
     drop the ocean fish opacity + saturation so the pink leader pops
     cleanly as the foreground. The fishCluster and ocean elements are
     siblings inside .game, so the general-sibling selector works. */
  .fish-cluster.show ~ .ocean .ocean-fish-art {
    opacity: 0.88;
    filter: saturate(0.96) brightness(0.97);
    transition: opacity 280ms ease, filter 280ms ease;
  }

  @keyframes softPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.02); opacity: 0.98; }
  }
  /* Text fills the bubble's padded body and is centered. The pure-CSS box is
     content-sized, so the text drives the bubble's size (never the reverse). */
  .thought-text {
    position: relative;
    z-index: 2;

    display: block;
    width: 100%;
    max-width: 100%;

    text-align: center;
    font-family: 'Lilita One', 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif;
    font-size: clamp(24px, min(3vw, 5.33vh), 52px);
    font-weight: 400;
    line-height: 1.18;
    letter-spacing: 0.5px;

    color: #5e2f12;
    overflow-wrap: anywhere;
    word-break: normal;
    /* Distribute wrapped lines evenly so a long line never leaves a lone
       orphan word on the last row — keeps the box visually balanced. */
    text-wrap: balance;

    text-shadow: 0 1px 2px rgba(94, 47, 18, 0.14);
  }
  /* While only the leading "But!" is showing (butThenSentence), the sentence is
     built but hidden. Clip it to one line so it can't drive the box tall at the
     narrow "But!" width — the box then hugs "But!" in BOTH dimensions. Removed
     when the sentence grows in. */
  .speech.but-solo .thought-text { max-height: 1.25em; overflow: hidden; }
  /* Forced single-line scenes (anchor.oneLine) — the text never wraps, the box
     hugs it. Used only for a few short phrases ("Each stream ...", etc.). */
  .speech.speech-oneline .thought-text { white-space: nowrap; }

  /* Word-by-word pop: each word reserves its space up front (opacity 0, so the
     line never reflows) and springs in when JS adds `.in`. Applies to both the
     speech bubble and the wrong-popup line. */
  .type-word { display: inline-block; opacity: 0; transform: scale(0.5); transform-origin: center 60%; }
  .type-word.in { animation: wordPop 320ms cubic-bezier(.34,1.65,.5,1) forwards; }
  @keyframes wordPop {
    0%   { opacity: 0; transform: scale(0.5)  translateY(8%); }
    55%  { opacity: 1; transform: scale(1.14) translateY(0); }
    100% { opacity: 1; transform: scale(1); }
  }
  /* Single popping word (welcome's repeated "Welcome!", confused's "But!").
     JS drives entrance/re-pop via inline `animation`; base is centered &
     transform-clean so a finished animation never snaps it to a wrong scale. */
  .pop-word { display: inline-block; transform-origin: center 60%; will-change: transform, opacity; }
  @keyframes wordPulse {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.28); }
    100% { transform: scale(1); }
  }
  @keyframes butOut {
    to { transform: translateX(-48%) scale(0.9); opacity: 0; }
  }
  /* "But!" overlay — centered over the bubble body (the tail sits outside the
     box now), without affecting layout, so the sentence behind it stays
     centered (no jump on hand-off). */
  .speech-head {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    /* "But!" lives in this overlay (not inside .thought-text), so it must
       restate the dialogue typography or it falls back to the small default
       font — match .thought-text exactly so "But!" reads at the same size. */
    text-align: center;
    font-family: 'Lilita One', 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif;
    font-size: clamp(24px, min(3vw, 5.33vh), 52px);
    font-weight: 400;
    line-height: 1.18;
    letter-spacing: 0.5px;
    color: #5e2f12;
    text-shadow: 0 1px 2px rgba(94, 47, 18, 0.14);
  }
  @media (prefers-reduced-motion: reduce) {
    .type-word { opacity: 1; transform: none; }
    .type-word.in { animation: none; }
    .pop-word { opacity: 1 !important; animation: none !important; }
  }

  /* ===========================================================
     MAGICAL WATER-BUBBLE TRANSITION — a translucent water wave sweeps
     right→left when the main game begins, carrying rising bubbles and a
     glowing foam crest, then slides off-screen to reveal the game.
     =========================================================== */
  .game-transition { position: absolute; inset: 0; z-index: 200; pointer-events: none; overflow: hidden; }
  .game-transition.hidden { display: none; }

  /* Opaque water fill behind the bubbles — guarantees the game screen never
     shows through gaps. Fades in fast with the wave, holds, fades out as the
     bubbles recede. Colour matches the bubble palette so it reads as one sheet
     of water. Single cheap layer (no per-frame filter). */
  .merge-backdrop {
    position: absolute; inset: -2%;
    background: radial-gradient(120% 120% at 50% 38%, #f2fbff 0%, #d6f0fc 45%, #b6e4f7 100%);
    opacity: 0;
    will-change: opacity;
    animation: mergeBackdrop 3s ease both;
  }
  @keyframes mergeBackdrop {
    0%   { opacity: 0; }
    11%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ---- Bubble-merge transition ----
     Many bubbles (the Bubble SVG) stream in from the LEFT and RIGHT edges, meet
     and cover the whole screen at the centre, hold a beat, then sweep back out
     the way they came. Each bubble is positioned at its target (left/top) and
     animated from an off-screen translate (--from) → 0 (covering) → back to
     --from (receding). Per-bubble --dur/--delay desync the wave. */
  .merge-bubble {
    position: absolute;
    aspect-ratio: 1;                 /* perfect circles regardless of width % */
    background: center / contain no-repeat;   /* the bubble SVG, set inline */
    opacity: 0;
    will-change: transform, opacity;
    /* NB: no drop-shadow filter here — an animated filter on hundreds of layers
       re-rasterizes every frame and tanks the framerate. The bubble SVG already
       carries its own rim/highlight, so it reads fine without a CSS shadow. */
    animation: mergeBubble var(--dur, 2.6s) cubic-bezier(.45, .05, .3, 1) var(--delay, 0s) both;
  }
  @keyframes mergeBubble {
    0%   { transform: translate(var(--from, -130vw), var(--fromY, 0)) scale(.45); opacity: 0; }
    12%  { opacity: 1; }
    42%  { transform: translate(0, 0) scale(1); opacity: 1; }   /* merged — screen covered */
    62%  { transform: translate(0, 0) scale(1); opacity: 1; }   /* hold */
    100% { transform: translate(var(--from, -130vw), var(--fromY, 0)) scale(.45); opacity: 0; } /* recede */
  }
  @media (prefers-reduced-motion: reduce) {
    .merge-bubble { animation-duration: 1.2s; }
  }
  /* Dreamy translucent water that drifts in slowly, lingers, then glides off
     to the left — unhurried and premium, not a fast arcade wipe. */
  .gt-sheet {
    position: absolute; top: 0; bottom: 0; left: 0; width: 155%;
    background:
      radial-gradient(150% 80% at 80% 45%,
        rgba(198,250,255,0) 0%, rgba(126,230,250,.5) 16%, rgba(64,192,238,.82) 45%,
        rgba(30,156,218,.93) 76%, rgba(16,122,198,.97) 100%);
    -webkit-mask: linear-gradient(90deg, transparent 0, #000 13%, #000 100%);
            mask: linear-gradient(90deg, transparent 0, #000 13%, #000 100%);
    backdrop-filter: blur(2.5px); -webkit-backdrop-filter: blur(2.5px);
    transform: translateX(114%);
    animation: gtSweep 2.4s cubic-bezier(.42,.02,.3,1) forwards;
  }
  /* Soft glowing foam crest riding the leading (left) edge. */
  .gt-edge {
    position: absolute; top: -8%; bottom: -8%; left: -1.5vw; width: 5.5vw;
    background: radial-gradient(50% 50% at 50% 50%, rgba(255,255,255,.9), rgba(222,250,255,.34) 46%, transparent 72%);
    filter: blur(0.5vw);
  }
  @keyframes gtSweep {
    0%   { transform: translateX(114%); }
    42%  { transform: translateX(-6%); }   /* drift in (slow) */
    58%  { transform: translateX(-14%); }  /* gentle dreamy linger */
    100% { transform: translateX(-124%); } /* glide off left */
  }
  /* Floating bubble — soft glow + an inner shimmer highlight (::before). Each
     gets randomized --dur/--delay/--sway from JS so no two move alike. */
  .gt-bubble {
    position: absolute; border-radius: 50%; opacity: 0;
    background: radial-gradient(circle at 34% 28%, rgba(255,255,255,.92) 0%, rgba(255,255,255,.42) 26%, rgba(186,242,255,.12) 54%, rgba(255,255,255,0) 72%);
    box-shadow: 0 0 1.3vw rgba(160,232,255,.5), inset 0 0 0.6vw rgba(255,255,255,.6);
    animation: gtRise var(--dur, 3.4s) cubic-bezier(.36,.05,.3,1) var(--delay, 0s) infinite;
  }
  .gt-bubble::before {
    content: ''; position: absolute; top: 15%; left: 22%; width: 28%; height: 24%;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,255,255,.95), rgba(255,255,255,0));
  }
  /* Background layer: smaller, blurred, slower — parallax depth behind the fg. */
  .gt-bubble.bg { filter: blur(0.35vw); opacity: 0; }
  /* Gentle rise with organic left/right sway; slow start, slight accel, soft fade. */
  @keyframes gtRise {
    0%   { transform: translate(0, 16%) scale(.6); opacity: 0; }
    14%  { opacity: .9; transform: translate(var(--sway), -6%) scale(1); }
    44%  { transform: translate(calc(var(--sway) * -1), -34%) scale(1.02); }
    72%  { transform: translate(calc(var(--sway) * .6), -64%) scale(1.05); opacity: .82; }
    100% { transform: translate(0, -102%) scale(1.08); opacity: 0; }
  }
  /* Anticipation-burst bubble: rises, HOLDS briefly, then expands & pops. */
  .gt-burst {
    position: absolute; border-radius: 50%; opacity: 0;
    background: radial-gradient(circle at 36% 30%, rgba(255,255,255,.95) 0%, rgba(200,245,255,.4) 40%, rgba(255,255,255,0) 72%);
    box-shadow: 0 0 1.6vw rgba(180,240,255,.6);
    animation: gtBurst var(--dur, 2.8s) cubic-bezier(.4,.04,.3,1) var(--delay, 0s) infinite;
  }
  @keyframes gtBurst {
    0%   { transform: translate(0, 12%) scale(.5); opacity: 0; }
    22%  { opacity: .92; transform: translate(var(--sway), -22%) scale(1); }
    58%  { transform: translate(var(--sway), -54%) scale(1.05); opacity: .95; }
    70%  { transform: translate(var(--sway), -60%) scale(1.06); }   /* hold — anticipation */
    86%  { transform: translate(var(--sway), -64%) scale(1.7);  opacity: .45; } /* expand */
    100% { transform: translate(var(--sway), -68%) scale(2.2);  opacity: 0; }   /* pop */
  }
  .gt-spark {
    position: absolute; color: #fffbe6; line-height: 1; opacity: 0;
    text-shadow: 0 0 0.7vw rgba(255,240,180,.95);
    animation: gtSpark var(--dur, 2s) ease-in-out var(--delay, 0s) infinite;
  }
  @keyframes gtSpark {
    0%, 100% { opacity: 0; transform: scale(.3) rotate(0deg); }
    50%      { opacity: 1; transform: scale(1) rotate(45deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .gt-sheet { animation-duration: 1s; }
    .gt-bubble, .gt-burst, .gt-spark, .gt-edge { display: none; }
  }
  @keyframes pop-in {
    0%   { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .speech.oops { animation: pop-in 0.35s cubic-bezier(.5,1.8,.4,1), oopsShake 0.5s 0.35s ease 2; }
  @keyframes oopsShake {
    0%, 100% { transform: translateX(0) rotate(0); }
    25%      { transform: translateX(-6px) rotate(-2deg); }
    75%      { transform: translateX(6px) rotate(2deg); }
  }

  /* ===========================================================
     CONTROLS — fixed absolute positions, no background pill
     Up centerX 39.5%, Down centerX 61.5%, bottom 2.2%, width 18%
     =========================================================== */
  .controls {
    position: absolute;
    inset: 0;
    z-index: 30;
    pointer-events: none;
  }
  .controls::before { display: none; }
  .controls.hidden { display: none; }
  /* Larger, accessible primary controls. Sizing uses clamp(px,vw,px)
     so the buttons stay readable on small screens but cap out cleanly
     on desktop. translateX(-50%) keeps the original anchor (left = X%
     marks the button's CENTER), preserved through the press state too
     so the button doesn't jump sideways when tapped. */
  .btn {
    position: absolute;
    bottom: -3.5%;
    width: clamp(140px, 16vw, 300px);
    aspect-ratio: 1.28 / 1;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    background-color: transparent;
    border: none;
    outline: none;
    cursor: pointer;
    padding: 0;
    pointer-events: auto;
    touch-action: manipulation;
    z-index: 40;
    transition: transform 140ms ease, filter 140ms ease;
    filter: drop-shadow(0 10px 14px rgba(0,0,0,0.22));
  }
  .btn:focus,
  .btn:focus-visible { outline: none; border: none; box-shadow: none; }
  /* Centers pushed apart from 43.5/56.5 to 41.5/58.5 so the larger
     buttons stay visibly separated even at the max clamp width. */
  #upBtn   { left: 41.5%; background-image: url('assets/UP.webp'); }
  #downBtn { left: 58.5%; background-image: url('assets/DOWN.webp'); }
  #upBtn:active,   #upBtn.pressed   { background-image: url('assets/PRESSED-UP.webp'); }
  #downBtn:active, #downBtn.pressed { background-image: url('assets/PRESSED-DOWN.webp'); }
  .btn:active,
  .btn.pressed {
    transform: translateX(-50%) scale(0.96);
  }
  /* Radar/pulse ring on highlighted button removed by request — the
     tutorial uses ONLY the hand-nudge icon to draw attention now. */
  .btn.highlight::before { display: none; }

  /* Soft kid-friendly glow on the highlighted button. Filter-only so
     it never fights the existing translateX(-50%) anchor or the
     press transforms when the player taps. */
  .btn.highlight {
    animation: buttonHighlightGlow 1.4s ease-in-out infinite;
  }
  @keyframes buttonHighlightGlow {
    0%, 100% {
      filter:
        drop-shadow(0 0 6px rgba(255,255,255,0.45))
        drop-shadow(0 0 12px rgba(94,190,255,0.35));
    }
    50% {
      filter:
        drop-shadow(0 0 12px rgba(255,255,255,0.85))
        drop-shadow(0 0 22px rgba(94,190,255,0.7));
    }
  }

  /* Hand-tap nudge — the HandNudge.svg art (white pointing hand + click ring)
     sits over the active button and gently floats/taps via handHover so it
     never looks static. The SVG already includes the tap ring, so no CSS
     ripple is needed. */
  .hand {
    position: absolute;
    bottom: 16%;                 /* sits ON the button face (its base is below the
                                    clipped stage edge, so not too low) */
    left: 50%;
    /* Viewport-relative (not % of the small button) and large enough to clearly
       rest on the button. */
    width: clamp(120px, 13vw, 230px);
    aspect-ratio: 309 / 230;     /* HandNudge.svg native ratio — no distortion */
    transform: translateX(-50%);
    background: url('assets/HandNudge.svg') center / contain no-repeat;
    animation: handHover 1.25s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    z-index: 31;
    pointer-events: none;
    filter: drop-shadow(0 4px 7px rgba(0,0,0,0.4));
  }
  @keyframes handHover {
    0%, 100% { transform: translateX(-50%) translateY(-16px); }
    40%      { transform: translateX(-50%) translateY(-10px); }
    55%      { transform: translateX(-50%) translateY(2px); }
    70%      { transform: translateX(-50%) translateY(-6px); }
  }
  @keyframes handPress {
    0%, 35%, 100% { transform: scale(1) rotate(0deg); }
    52%           { transform: scale(0.85) rotate(-4deg); }
    62%           { transform: scale(1.06) rotate(3deg); }
    78%           { transform: scale(1)    rotate(0deg); }
  }
  @keyframes handRipple {
    0%, 48% { opacity: 0; transform: translate(-50%, 0) scale(0); }
    55%     { opacity: 0.9; }
    100%    { opacity: 0; transform: translate(-50%, 0) scale(1.7); }
  }

  /* ===========================================================
     OCEAN — right edge strip, 18% wide
     =========================================================== */
  .ocean {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 18%;
    z-index: 6;
    display: none;
    overflow: hidden;
    padding-right: 1.2%;
    box-sizing: border-box;
    /* Lets the ocean glide away to the right + fade when gameplay begins
       (see .ocean.ocean-receding). Harmless on the tutorial scenes, which
       only ever toggle .show. */
    transition: opacity 520ms ease, transform 560ms cubic-bezier(.34, .02, .2, 1);
  }
  /* STATE TRANSITION: once the fish has entered a stream, the ocean section
     slides off to the right and fades — "the ocean moved away". */
  .ocean.ocean-receding {
    opacity: 0;
    transform: translateX(42%);
  }

  /* "Selected fish" for the per-round intro. This is an ACTUAL fish lifted out
     of the ocean crowd (one of the rendered .ocean-fish), reparented onto the
     stage so it can swim forward out of the pack into the movement column and
     grow a little, then bob (confused) before the real gameplay fish takes
     over. Reparenting avoids the ocean layer's overflow clipping. Purely
     visual — not a gameplay .fish, never counted, no input.
     • wrapper  → position (left/top) glide + the confused bob (translateY)
     • inner art → the grow (scale), so bob and grow never fight on one transform */
  .promoted-fish {
    position: absolute;
    aspect-ratio: 860/600;
    z-index: 11;
    pointer-events: none;
    filter: drop-shadow(0 5px 8px rgba(0,0,0,0.28));
    transition: left 1700ms cubic-bezier(.22, .61, .36, 1),
                top  1700ms cubic-bezier(.22, .61, .36, 1),
                opacity 380ms ease;
  }
  .promoted-fish.bob { animation: introConfusedBob 1.25s ease-in-out infinite; }
  .promoted-fish .ocean-fish-art {
    animation: none;             /* stop the ambient float; the grow is driven via WAAPI in JS */
    transform-origin: center;    /* grow from the centre so the wrapper centre never moves */
  }
  /* Clear up/down "confused" bob (not a tiny wiggle). */
  @keyframes introConfusedBob {
    0%, 100% { transform: translateY(-16px) rotate(-4deg); }
    50%      { transform: translateY(16px)  rotate(4deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .promoted-fish.bob { animation: none; }
    .promoted-fish .ocean-fish-art { transition: none; }
  }
  .ocean::before {
    content: '';
    position: absolute;
    /* Inset is pulled above and below the container so the PNG is
       drawn slightly taller than the visible area. With overflow:
       hidden on .ocean, any transparent margin in the PNG is cropped
       and the visible water fills the full top→bottom edge. */
    inset: -3% 0;
    background: url('assets/ocean.webp') center / 100% 100% no-repeat;
    z-index: 0;
  }
  /* Decorative left-edge highlight removed — it rendered as a vertical
     "line" overlapping the ocean PNG. The ocean asset has its own
     natural water gradient, so no extra band is needed. */
  .ocean.show { display: block; }
  .ocean-fish-layer {
    position: absolute;
    inset: 0 1.2% 0 0;
    z-index: 2;
    overflow: hidden;
  }
  .ocean-fish {
    position: absolute;
    aspect-ratio: 860/600;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
  }
  .ocean-fish-art {
    position: absolute;
    inset: 0;
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    animation: oceanFishFloat 3.6s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes oceanFishFloat {
    0%, 100% { transform: translate(0, 0)     rotate(0deg); }
    25%      { transform: translate(-3px,-4px) rotate(-3deg); }
    50%      { transform: translate(0, 0)     rotate(0deg); }
    75%      { transform: translate(3px, 4px) rotate(3deg); }
  }

  /* ===========================================================
     HUD / LEVEL BANNER (disabled by default for visual match)
     =========================================================== */
  .hud {
    position: absolute;
    top: 18px; right: 18px;
    background: rgba(255,255,255,0.95);
    border: 4px solid #8b5a3c;
    border-radius: 18px;
    padding: 8px 20px;
    font-weight: 800;
    color: #8b3a1c;
    font-size: clamp(14px, 1.4vw, 22px);
    z-index: 40;
    display: none;
    box-shadow: 0 4px 0 #8b5a3c;
  }
  .hud.show { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }

  .level-banner {
    position: absolute;
    top: 18px; left: 18px;
    background: rgba(255,255,255,0.95);
    border: 4px solid #8b5a3c;
    border-radius: 18px;
    padding: 8px 18px;
    font-weight: 800;
    color: #8b3a1c;
    font-size: clamp(14px, 1.4vw, 22px);
    z-index: 40;
    display: none;
    box-shadow: 0 4px 0 #8b5a3c;
    line-height: 1.2;
  }
  .level-banner.show { display: block; }
  .level-banner .level-fish-row {
    display: flex; gap: 6px; margin-top: 4px; align-items: center;
  }
  .level-banner .level-fish-icon {
    width: 28px; height: 20px;
    background-position: center; background-repeat: no-repeat; background-size: contain;
  }
  .level-banner .level-fish-icon.used { opacity: 0.25; filter: grayscale(1); }

  /* ===========================================================
     OVERLAYS
     =========================================================== */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 26px;
  }
  #startOverlay {
    background: transparent;
  }
  .overlay h1 {
    color: #fff;
    font-size: clamp(32px, 5.5vw, 76px);
    text-shadow: 4px 4px 0 #8b3a1c;
    text-align: center;
    padding: 0 20px;
  }
  .overlay p {
    color: #fff;
    font-size: clamp(18px, 2.6vw, 30px);
    text-shadow: 2px 2px 0 #8b3a1c;
    text-align: center;
  }
  .start-banner {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: none;
    user-select: none;
    pointer-events: none;
  }
  .start-letsgo-btn {
    position: absolute;
    right: 2.5%;
    bottom: 2.5%;
    width: min(36%, 520px);
    border: 0;
    background: transparent;
    padding: 0;
    cursor: pointer;
    filter: drop-shadow(0 14px 26px rgba(0,0,0,0.5));
    transform: translateZ(0);
    animation: none;
  }
  .start-letsgo-btn:hover { animation: letsGoPulse 1.15s ease-in-out infinite; }
  .start-letsgo-btn:active {
    transform: scale(0.98);
  }
  @keyframes letsGoPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 14px 26px rgba(0,0,0,0.5)); }
    50%      { transform: scale(1.045); filter: drop-shadow(0 18px 34px rgba(0,0,0,0.55)) brightness(1.03); }
  }
  @media (prefers-reduced-motion: reduce) {
    .start-letsgo-btn { animation: none; }
  }
  .start-letsgo {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain;
    user-select: none;
    pointer-events: none;
  }
  .big-btn {
    padding: 16px 56px;
    background: linear-gradient(180deg, #ffd54a, #f5a51a);
    border: 5px solid #fff;
    border-radius: 30px;
    font-size: clamp(20px, 2.8vw, 34px);
    font-weight: 800;
    color: #8b3a1c;
    cursor: pointer;
    box-shadow: 0 8px 0 #c47a0a, 0 10px 16px rgba(0,0,0,0.3);
    font-family: inherit;
  }
  .big-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #c47a0a, 0 6px 10px rgba(0,0,0,0.3);
  }

  /* Dimmer for tutorial scenes that need focus (e.g., welcome screen).
     z-index sits BELOW the speech bubble (z:10) and genie (z:12) so
     the background dims but the tutorial figures stay clear and bright
     above it. */
  .cinematic-dim {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9;
    pointer-events: none;
  }

  /* Pre-rendered scene replacement. The image fills the whole stage at
     the same 16:9 ratio as the SVG, so it lines up with the gameplay
     layout. z-index 50 sits above ponds/streams/genie/speech so the
     dynamic UI is fully hidden behind this static composition. */
  .full-scene-image {
    position: absolute;
    inset: 0;
    z-index: 50;
    background-position: center;
    background-repeat: no-repeat;
    background-size: 100% 100%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 320ms ease;
  }
  .full-scene-image.show { opacity: 1; }
  .full-scene-image.hidden { display: none !important; }

  .hidden { display: none !important; }

  /* Game-over overlay is fully retired — wrong answers no longer end
     the game, they only nudge the player with the correct-stream hint.
     Hard-disabled here so any stray code path that removes `hidden`
     still can't paint a dim sheet over the gameplay. */
  .gameover-overlay {
    display: none !important;
    position: absolute;
    inset: 0;
    z-index: 220;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 22px;
    background: rgba(0,0,0,0.65);
    pointer-events: auto;
  }
  .gameover-overlay.hidden { display: none !important; }

  /* Small non-blocking hint pill that pops at the top of the stage
     after a wrong answer. Tells the player which stream the fish
     belongs in, then auto-fades. pointer-events: none so it never
     blocks the streams or buttons underneath. */
  .mini-hint {
    position: absolute;
    top: 3%;
    left: 50%;
    transform: translate(-50%, -8px);
    background: rgba(255,255,255,0.96);
    color: #7a3d1c;
    font-family: 'Lalezar', 'Comic Sans MS', system-ui, sans-serif;
    font-size: clamp(18px, 2.1vw, 30px);
    font-weight: 800;
    padding: 0.7% 2.4%;
    border-radius: 999px;
    border: 4px solid #fff;
    box-shadow: 0 6px 0 #c47a0a, 0 8px 14px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    z-index: 90;
    transition: opacity 220ms ease, transform 220ms ease;
    white-space: nowrap;
  }
  .mini-hint.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }
  .gameover-overlay h1 {
    color: #fff;
    font-family: 'Lalezar', 'Comic Sans MS', system-ui, sans-serif;
    font-size: clamp(34px, 5.2vw, 76px);
    text-shadow: 4px 4px 0 #8b3a1c, 0 0 18px rgba(0,0,0,0.55);
    text-align: center;
    letter-spacing: 1px;
  }
  .gameover-overlay p {
    color: #fff;
    font-family: 'Lalezar', 'Comic Sans MS', system-ui, sans-serif;
    font-size: clamp(18px, 2.2vw, 30px);
    text-shadow: 2px 2px 0 #8b3a1c;
    text-align: center;
  }
  .gameover-overlay .big-btn { font-family: 'Lalezar', 'Comic Sans MS', system-ui, sans-serif; }

  /* Synced vanish for genie + speech bubble. Both elements drop this
     class at the same moment, so they fade and lift away together.
     The genie keeps its translateX(-50%) anchor; the speech bubble
     uses its own (no horizontal centering) variant. */
  .genie.guide-vanish  { animation: guideVanishGenie  500ms ease forwards; }
  .speech.guide-vanish { animation: guideVanishSpeech 500ms ease forwards; }
  @keyframes guideVanishGenie {
    0%   { opacity: 1; transform: translateX(-50%) scale(1)    translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.92) translateY(-12px); }
  }
  @keyframes guideVanishSpeech {
    0%   { opacity: 1; transform: scale(1)    translateY(0); }
    100% { opacity: 0; transform: scale(0.92) translateY(-12px); }
  }
  /* Flip variant: the mirror now lives on .speech.flip::before (artwork only),
     so the bubble's own exit transform must NOT mirror, or the text would flip. */
  .speech.flip.guide-vanish { animation: guideVanishSpeech 500ms ease forwards; }
  /* Light, quick fade used BETWEEN auto-narration scenes so the bubble
     dissolves smoothly instead of snapping away, while Gogo stays on
     stage and glides to the next spot. Shorter than guide-vanish so the
     tutorial keeps a brisk, child-friendly pace. */
  .speech.soft-out      { animation: speechSoftOut 260ms ease forwards; }
  .speech.flip.soft-out { animation: speechSoftOut 260ms ease forwards; }
  @keyframes speechSoftOut {
    0%   { opacity: 1; transform: scale(1)    translateY(0); }
    100% { opacity: 0; transform: scale(0.96) translateY(-8px); }
  }

  .wrong-overlay {
    position: absolute;
    inset: 0;
    z-index: 80;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Dim sheet (50% black) sits behind the wrong-condition card so
       the popup pops against the gameplay. pointer-events stays
       `none` so the player can still tap the controls during the
       4-second hold — the dim is purely visual focus. */
    pointer-events: none;
    background: rgba(0, 0, 0, 0.5);
    transition: background 260ms ease;
  }
  .wrong-overlay.hidden { display: none !important; }
  /* Fade the dim sheet out in lockstep with the wrong-panel pop-out. */
  .wrong-overlay.fade-out { background: rgba(0, 0, 0, 0); }
  /* CSS card (was a baked-text PNG) so the "Oops!" line can type on live,
     synced to the voice-over. Cream fill + gold frame match the old art. */
  .wrong-panel {
    position: relative;
    width: min(52%, 760px);
    aspect-ratio: 1024 / 640;
    background: #fcf4da;
    border: 0.6vw solid #e3b92e;
    border-radius: 2.2vw;
    box-shadow: 0 1.6vw 2.6vw rgba(0, 0, 0, 0.28);
    transform: scale(0.86);
    opacity: 0;
    animation: wrongPopIn 260ms cubic-bezier(.2,1.4,.3,1) forwards;
  }
  /* Live "Oops! Not the correct stream." — types in step with the VO. The
     reserved min-height keeps the card from reflowing as characters appear. */
  .wrong-panel-text {
    position: absolute;
    left: 7%;
    right: 7%;
    bottom: 9%;
    text-align: center;
    white-space: pre-line;
    /* Match the speech bubble — readable Baloo 2, neutral bold. */
    font-family: 'Baloo 2', 'Comic Sans MS', 'Chalkboard SE', system-ui, sans-serif;
    font-weight: 600;
    font-size: clamp(20px, 2.6vw, 48px);
    line-height: 1.12;
    color: #9c4a1c;
    min-height: 2.3em;
    text-shadow: 0 1px 2px rgba(156, 74, 28, 0.14);
  }
  .wrong-overlay.fade-out .wrong-panel {
    animation: wrongPopOut 240ms ease forwards;
  }
  @keyframes wrongPopIn {
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes wrongPopOut {
    to { transform: scale(0.96); opacity: 0; }
  }
  /* Wrong-condition popup fish — sits ABOVE the text area inside the
     panel. Bigger than the previous 38%/1:1 sizing so kids can read
     which fish-color the popup is talking about. Correct aspect-ratio
     (860:600) prevents squish. */
  .wrong-panel-fish {
    position: absolute;
    left: 50%;
    top: 42%;
    width: 58%;
    aspect-ratio: 860 / 600;
    background-position: center center;
    background-repeat: no-repeat;
    background-size: contain;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
    transform-origin: center center;
    transform: translate(-50%, -50%);
    animation: wrongPanelFloat 4s ease-in-out infinite;
  }
  @keyframes wrongPanelFloat {
    0%, 100% { transform: translate(-50%, -50%)              rotate(0deg); }
    25%      { transform: translate(-50%, calc(-50% - 4px))  rotate(-2deg); }
    50%      { transform: translate(-50%, -50%)              rotate(0deg); }
    75%      { transform: translate(-50%, calc(-50% + 4px))  rotate(2deg); }
  }
  .wrong-panel-bubbles {
    display: none !important;
  }

  /* ===========================================================
     FINAL WINNING SCREEN — Arabian magical victory.
     A single fixed full-screen artwork (assets/final-screen.webp) is
     the entire pond/fish composition. We only overlay Gogo the genie,
     a glowing aura, a premium playful title and magical floating
     particles. NO JS-built ponds/fish, no confetti, no buttons.
     =========================================================== */
  .final-pond-screen {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 500;
    /* Gentle fade so the direct cut to the win screen still feels smooth. */
    opacity: 0;
    animation: finalFadeIn 460ms ease forwards;
  }

  .final-pond-screen.hidden { display: none !important; }

  .final-screen-art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    pointer-events: none;
  }

  /* ===========================================================
     VICTORY BANNER — "You Did It!"
     Premium kids-game reward header: blue magical-ocean ribbon with big
     white 3D text. HTML+CSS only (no images).
     Everything is sized with min(vw, vh) so it scales with the letterboxed
     16:9 .game stage — identical proportions on every device, not just 16:9
     screens. The reveal is driven purely by .final-pond-screen un-hiding
     (display:none → flex), which restarts these entrance animations once.
     =========================================================== */
  .victory-banner {
    position: absolute;
    top: 3%;
    left: 50%;
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
    /* Drop-from-top bounce on entrance, then a gentle continuous float.
       translateX(-50%) is carried in EVERY transform so the banner stays
       centred through both animations. */
    transform: translateX(-50%);
    animation:
      victoryDrop  0.9s cubic-bezier(.18,.9,.25,1.35) both,
      victoryFloat 3.6s ease-in-out 1s infinite;
  }
  /* Soft golden glow halo blooming behind the whole banner. */
  .victory-banner::before {
    content: '';
    position: absolute;
    top: 18%;
    left: 50%;
    width: 128%;
    height: 150%;
    transform: translateX(-50%);
    z-index: -2;
    background: radial-gradient(ellipse at center,
      rgba(255, 226, 140, .55) 0%,
      rgba(255, 205, 90, .28) 38%,
      rgba(255, 190, 60, 0) 70%);
    filter: blur(6px);
    pointer-events: none;
    animation: victoryHalo 2.8s ease-in-out infinite;
  }

  /* ---- The blue ribbon body ---- */
  .victory-ribbon {
    position: relative;
    padding: clamp(6px, min(1.1vw, 1.95vh), 18px) clamp(34px, min(5.4vw, 9.6vh), 104px);
    border-radius: 999px;
    /* Bright royal-blue ocean gradient with a top sheen. */
    background:
      linear-gradient(180deg,
        rgba(255, 255, 255, .35) 0%, rgba(255, 255, 255, 0) 26%),
      linear-gradient(180deg, #2a93ff 0%, #0077ff 46%, #004cc9 100%);
    /* Golden border + layered glow: outer gold aura, a dark-blue 3D drop,
       an inner top highlight and an inner bottom shade. */
    border: clamp(3px, min(0.5vw, 0.9vh), 9px) solid #ffd34d;
    box-shadow:
      0 0 clamp(10px, min(1.6vw, 2.85vh), 30px) rgba(255, 199, 70, .85),
      0 0 clamp(22px, min(3.4vw, 6vh), 60px) rgba(255, 199, 70, .45),
      inset 0 clamp(2px, min(0.32vw, 0.57vh), 6px) 0 rgba(255, 255, 255, .55),
      inset 0 calc(-1 * clamp(4px, min(0.62vw, 1.1vh), 11px)) 0 rgba(0, 38, 110, .55),
      0 clamp(6px, min(0.95vw, 1.7vh), 16px) 0 #00337f,
      0 clamp(12px, min(1.8vw, 3.2vh), 30px) clamp(16px, min(2.5vw, 4.45vh), 40px) rgba(0, 20, 60, .4);
    z-index: 1;
  }
  /* ---- Big white 3D "You Did It!" text ---- */
  .victory-ribbon h1 {
    margin: 0;
    display: inline-block;
    white-space: nowrap;       /* never let the "!" drop to a second line */
    font-family: 'Lilita One', 'Lalezar', 'Comic Sans MS', system-ui, sans-serif;
    font-size: clamp(46px, min(6.4vw, 11.4vh), 100px);
    font-weight: 400;
    letter-spacing: .02em;
    line-height: 1.05;
    /* WHITE letter face. The fill is pinned with -webkit-text-fill-color so the
       thin navy stroke can't tint it; paint-order keeps the stroke BEHIND the
       fill. A thin outline (was up to 8px, which ate the fill and made the
       letters read blue) keeps the white dominant. */
    color: #ffffff;
    -webkit-text-fill-color: #ffffff;
    -webkit-text-stroke: clamp(2px, min(0.32vw, 0.57vh), 5px) #00337f;
    paint-order: stroke fill;
    /* Downward navy extrusion for 3D depth + a soft cast shadow underneath. */
    text-shadow:
      0 clamp(2px, min(0.3vw, 0.53vh), 5px) 0 #0a4fb8,
      0 clamp(4px, min(0.55vw, 0.98vh), 9px) 0 #003a92,
      0 clamp(7px, min(1vw, 1.78vh), 16px) clamp(8px, min(1.2vw, 2.14vh), 18px) rgba(0, 18, 55, .45);
    animation: victoryTextPop 0.7s cubic-bezier(.2,.9,.3,1.5) 0.45s both;
  }

  @keyframes victoryDrop {
    0%   { transform: translateX(-50%) translateY(-180%) scale(.85); opacity: 0; }
    55%  { transform: translateX(-50%) translateY(7%)    scale(1.05); opacity: 1; }
    78%  { transform: translateX(-50%) translateY(-3%)   scale(.99); }
    100% { transform: translateX(-50%) translateY(0)     scale(1); opacity: 1; }
  }
  @keyframes victoryFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-2.4%); }
  }
  @keyframes victoryHalo {
    0%, 100% { opacity: .7; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1;  transform: translateX(-50%) scale(1.06); }
  }
  @keyframes victoryTextPop {
    0%   { transform: scale(.5); opacity: 0; }
    70%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ---- Slow golden light rays radiating behind Gogo ---- */
  .final-light-rays {
    position: absolute;
    left: 50%;
    bottom: -6%;
    width: 100vmin;
    height: 100vmin;
    transform: translateX(-50%);
    z-index: 1;
    pointer-events: none;
    background: repeating-conic-gradient(
      from 0deg,
      rgba(255,228,150,.18) 0deg 5deg,
      transparent 5deg 17deg
    );
    -webkit-mask-image: radial-gradient(circle, #000 0%, #000 26%, transparent 66%);
            mask-image: radial-gradient(circle, #000 0%, #000 26%, transparent 66%);
    animation:
      rayRotate 38s linear infinite,
      rayBreath 5s ease-in-out infinite;
  }
  @keyframes rayRotate {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(360deg); }
  }
  @keyframes rayBreath {
    0%, 100% { opacity: .45; }
    50%      { opacity: .8; }
  }

  /* ---- Magic aura glowing behind Gogo ---- */
  .final-magic-aura {
    position: absolute;
    left: 50%;
    bottom: 12%;
    width: 38vmin;
    height: 38vmin;
    transform: translateX(-50%);
    border-radius: 50%;
    z-index: 2;
    background:
      radial-gradient(circle,
        rgba(255,235,170,.95) 0%,
        rgba(255,210,120,.45) 32%,
        rgba(255,170,60,.12) 58%,
        transparent 74%);
    filter: blur(10px);
    animation: auraPulse 3s ease-in-out infinite;
  }
  @keyframes auraPulse {
    0%, 100% { transform: translateX(-50%) scale(1);    opacity: .85; }
    50%      { transform: translateX(-50%) scale(1.12); opacity: 1; }
  }

  /* ---- Grounding light circle at Gogo's feet ---- */
  .final-genie-floor-glow {
    position: absolute;
    left: 50%;
    bottom: 3%;
    width: 32%;
    aspect-ratio: 1;
    transform: translateX(-50%);
    border-radius: 50%;
    z-index: 3;
    background:
      radial-gradient(circle,
        rgba(255,235,170,.95) 0%,
        rgba(255,210,100,.42) 38%,
        rgba(255,180,60,.12) 62%,
        transparent 74%);
    filter: blur(10px);
    animation: floorGlowPulse 2.4s ease-in-out infinite;
  }
  @keyframes floorGlowPulse {
    0%, 100% { transform: translateX(-50%) scale(1);    opacity: .8; }
    50%      { transform: translateX(-50%) scale(1.1);  opacity: 1; }
  }

  /* ---- Gogo the genie: large focal point, centred + floating ---- */
  .final-genie {
    position: absolute;
    left: 50%;
    bottom: 22%;                 /* lowered further so he sits well below the title */
    transform: translateX(-50%);
    /* 28% (was 34%) keeps the genie the SAME proportion on every 16:9 size.
       At 34% the max-width cap only applied on large screens, so on smaller
       ones he ballooned to ~60% of the stage height and his head rammed the
       title; ~28% keeps him ~50% tall everywhere, leaving room for the title. */
    width: 28%;
    max-width: 560px;
    min-width: 220px;
    z-index: 8;
    pointer-events: none;
    user-select: none;
    /* Static fallback (used when motion is reduced; the pulse below
       carries an equivalent shadow during animation). */
    filter:
      drop-shadow(0 14px 22px rgba(0,0,0,.32))
      drop-shadow(0 0 28px rgba(255,220,120,.75));
    animation:
      genieFloat 3s ease-in-out infinite,
      genieGlow 2s ease-in-out infinite;
  }
  @keyframes genieFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-14px); }
  }
  /* Keep the depth shadow constant while the warm glow breathes, so the
     genie never loses its grounding during the pulse. */
  @keyframes genieGlow {
    0%, 100% {
      filter:
        drop-shadow(0 14px 22px rgba(0,0,0,.32))
        drop-shadow(0 0 18px rgba(255,220,140,.5));
    }
    50% {
      filter:
